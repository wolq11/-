<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云智社联 - 登录</title>
<link rel="icon" href="images/1.png" type="image/png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;height:100%;touch-action:none}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Microsoft YaHei','PingFang SC',sans-serif;display:flex;align-items:center;justify-content:center;background:url('images/school-bg.png') center/cover no-repeat;position:relative}
body::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.2) 0%,rgba(0,0,0,0.5) 60%,rgba(0,0,0,0.75) 100%);z-index:0}
body::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(102,126,234,0.1) 0%,transparent 70%);z-index:0}

.top-logo{position:fixed;top:-60px;left:0;z-index:10;height:180px;width:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.35))}
@media(max-width:480px){
  .top-logo{display:none!important}
  body{align-items:center;padding-top:0}
  .login-card{margin-top:0;height:auto;min-height:520px;max-height:calc(100vh - 40px);overflow-y:auto}
}

.bottom-text{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:10;color:rgba(255,255,255,0.55);font-size:0.75em;letter-spacing:0.5px}

.login-card{position:relative;z-index:5;width:420px;max-width:calc(100vw - 32px);background:rgba(255,255,255,0.92);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-radius:24px;padding:40px 36px;box-shadow:0 25px 80px rgba(0,0,0,0.25),0 8px 24px rgba(0,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.3);height:590px;overflow-y:hidden;touch-action:none}

.card-header{text-align:center;margin-bottom:18px}
.card-header img{height:44px;width:auto;margin-bottom:8px}
.card-header h1{font-size:1.4em;font-weight:700;color:#1d1d1f;letter-spacing:-0.3px;margin-bottom:3px}
.card-header p{font-size:0.78em;color:#86868b;font-weight:400}

.role-label{font-size:0.72em;font-weight:600;color:#86868b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;text-align:center}
.identity-row{display:flex;gap:8px;margin-bottom:16px}
.id-card{flex:1;padding:12px 6px;border-radius:14px;border:1.5px solid rgba(0,0,0,0.06);text-align:center;cursor:pointer;transition:all .2s cubic-bezier(0.4,0,0.2,1);background:rgba(255,255,255,0.6);position:relative}
.id-card:hover{border-color:rgba(0,0,0,0.12);background:#fff;transform:translateY(-1px)}
.id-card.active{border-color:#0071e3;background:#f0f7ff;box-shadow:0 2px 12px rgba(0,113,227,0.12)}
.id-card .id-emoji{font-size:1.4em;margin-bottom:4px;display:block}
.id-card .id-label{font-size:0.74em;font-weight:600;color:#1d1d1f;letter-spacing:-0.2px}
.id-card.active .id-label{color:#0071e3}
.id-card .id-hint{font-size:0.56em;color:#86868b;margin-top:2px}

.tab-row{display:flex;gap:0;margin-bottom:14px;background:#f2f2f7;border-radius:10px;padding:3px}
.tab-btn{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:0.78em;font-weight:600;cursor:pointer;transition:all .2s;color:#86868b;border:none;background:transparent}
.tab-btn.active{background:#fff;color:#1d1d1f;box-shadow:0 1px 4px rgba(0,0,0,0.08)}

.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:0.7em;font-weight:600;color:#86868b;margin-bottom:5px;letter-spacing:0.3px}
.form-group input,.form-group select{width:100%;padding:10px 0;font-size:16px;border:none;border-bottom:1.5px solid #d2d2d7;color:#1d1d1f;outline:none;transition:all .2s;background:transparent;border-radius:0}
.form-group input:focus,.form-group select:focus{border-bottom-color:#0071e3}
.form-group input::placeholder{color:#c4c4c7}
.form-group select option{background:#fff;color:#1d1d1f}

.club-check-list{display:flex;flex-direction:column;gap:6px;margin-top:4px;max-height:200px;overflow-y:auto;padding:10px;background:#f2f2f7;border-radius:12px}
.club-check-list label{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff;border-radius:10px;font-size:0.82em;cursor:pointer;color:#1d1d1f;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
.club-check-list label span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.club-check-list label input[type=checkbox]{flex-shrink:0;margin-left:8px;width:16px;height:16px;accent-color:#0071e3}
.club-check-list label:hover{background:#fafafa}

.btn-submit{width:100%;padding:13px;border-radius:100px;border:none;font-size:0.9em;cursor:pointer;font-weight:600;transition:all .2s;background:#0071e3;color:#fff;box-shadow:0 4px 16px rgba(0,113,227,0.25);margin-top:4px;letter-spacing:0.5px}
.btn-submit:hover{background:#0077ed;box-shadow:0 6px 20px rgba(0,113,227,0.35);transform:translateY(-1px)}
.btn-submit:active{transform:translateY(0);box-shadow:0 2px 8px rgba(0,113,227,0.25)}

.error-box{background:#fff0f0;border:1px solid #ffd1d1;border-radius:12px;padding:10px 14px;color:#d93025;font-size:0.78em;margin-bottom:14px;display:none;line-height:1.5}
#registerForm{display:none}
.club-field,.teacher-field{display:none}

.footer-link-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:12px}
.footer-text{font-size:0.68em;color:#86868b;text-align:center}
.admin-link{font-size:0.68em;color:#86868b;text-decoration:none;transition:color .2s}
.admin-link:hover{color:#0071e3}
.forgot-link{font-size:0.72em;color:#0071e3;text-decoration:none;font-weight:500}
.forgot-link:hover{text-decoration:underline}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:14px;font-size:0.84em;z-index:10000;animation:slideIn .3s;box-shadow:0 8px 32px rgba(0,0,0,0.12);max-width:calc(100vw - 32px);text-align:center;word-break:break-all;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border:1px solid rgba(0,0,0,0.06)}
.toast.success{color:#1d1d1f}
.toast.error{color:#d93025}
@keyframes slideIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

@media(max-width:768px){
  .login-card{padding:32px 24px;border-radius:20px;height:auto;min-height:590px}
  .top-logo{height:260px}
  .bottom-text{display:none}
}
@media(max-width:480px){
  .login-card{padding:24px 20px;border-radius:16px}
  .card-header h1{font-size:1.3em}
  .id-card{padding:12px 4px}
  .id-card .id-emoji{font-size:1.3em}
  .id-card .id-label{font-size:0.7em}
  .club-check-list{max-height:120px}
}
</style>
</head>
<body>
<img src="images/2.png" class="top-logo" alt="logo">

<div class="login-card">
    <div class="card-header">
        <img src="images/1.png" alt="">
        <h1>云智社联</h1>
        <p>社团活动管理系统</p>
    </div>

    <div class="identity-row">
        <div class="id-card active" data-role="user" onclick="selectRole('user')">
            <span class="id-emoji">🏫</span>
            <div class="id-label">社团负责人</div>
            <div class="id-hint">社团管理</div>
        </div>
        <div class="id-card" data-role="teacher" onclick="selectRole('teacher')">
            <span class="id-emoji">👨‍🏫</span>
            <div class="id-label">指导老师</div>
            <div class="id-hint">指导社团</div>
        </div>
        <div class="id-card" data-role="student" onclick="selectRole('student')">
            <span class="id-emoji">🎓</span>
            <div class="id-label">学生</div>
            <div class="id-hint">参与活动</div>
        </div>
    </div>

    <div class="tab-row">
        <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">登录</button>
        <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">注册</button>
    </div>

    <div class="error-box" id="errorMsg"></div>
    <form id="loginForm">
        <div class="form-group"><label>姓名</label><input type="text" id="loginUser" placeholder="请输入姓名" autocomplete="username" /></div>
        <div class="form-group"><label>密码</label><input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password" /></div>
        <div style="text-align:right;margin-bottom:4px"><a href="javascript:void(0)" class="forgot-link" onclick="switchTab('forgot')">忘记密码？</a></div>
        <button type="submit" class="btn-submit">登录</button>
    </form>
    <form id="registerForm">
        <div class="form-group"><label>用户名</label><input type="text" id="regUser" placeholder="请输入真实姓名" autocomplete="username" /></div>
        <div class="form-group"><label>密码</label><input type="password" id="regPass" placeholder="至少4位，需同时包含字母和数字" autocomplete="new-password" /></div>
        <div class="form-group"><label>确认密码</label><input type="password" id="regPass2" placeholder="再次输入密码" autocomplete="new-password" /></div>
        <div class="form-group student-user-field" id="studentIdField"><label>学号</label><input type="text" id="regStudentId" placeholder="请输入学号" /></div>
        <div class="form-group teacher-field" id="workIdField"><label>工号</label><input type="text" id="regWorkId" placeholder="请输入工号" /></div>
        <div class="form-group club-field" id="clubField"><label>所属社团</label><select id="regClub" onchange="onClubChange()"><option value="">— 选择社团 —</option></select></div>
        <div class="form-group club-field" id="newClubField" style="display:none"><label>新社团名称</label><input type="text" id="regNewClub" placeholder="请输入新的社团名称" /></div>
        <div class="form-group teacher-field" id="teacherClubField"><label>选择指导社团（可多选）</label><div class="club-check-list" id="teacherClubList"><span style="font-size:0.76em;color:#86868b">加载中...</span></div></div>
        <button type="submit" class="btn-submit">注册</button>
    </form>
    <form id="forgotForm" style="display:none">
        <div class="form-group"><label>邮箱</label><input type="email" id="forgotEmail" placeholder="请输入注册时绑定的邮箱" /></div>
        <div class="form-group"><label>验证码</label><div style="display:flex;gap:8px"><input type="text" id="forgotCode" placeholder="请输入邮箱验证码" style="flex:1" /><button type="button" id="sendCodeBtn" onclick="sendEmailCode()" style="white-space:nowrap;padding:0 12px;font-size:0.85em;border-radius:8px;border:1px solid #0071e3;background:#0071e3;color:#fff;cursor:pointer">发送验证码</button></div></div>
        <div id="verifyRow" style="display:none;text-align:center;margin-bottom:8px"><button type="button" onclick="verifyEmailCode()" style="padding:8px 24px;border-radius:8px;border:1px solid #34c759;background:#34c759;color:#fff;font-size:0.88em;cursor:pointer">验证验证码</button></div>
        <div id="forgotPwdFields" style="display:none">
        <div class="form-group"><label>新密码</label><input type="password" id="forgotNewPass" placeholder="至少4个字符" autocomplete="new-password" /></div>
        <div class="form-group"><label>确认新密码</label><input type="password" id="forgotNewPass2" placeholder="再次输入新密码" autocomplete="new-password" /></div>
        <button type="submit" class="btn-submit">重置密码</button>
        </div>
        <div style="text-align:center;margin-top:10px"><a href="javascript:void(0)" class="forgot-link" onclick="switchTab('login')">返回登录</a></div>
    </form>
    <div class="footer-link-row">
        <div class="footer-text">济南幼儿师范高等专科学校</div>
        <a href="javascript:void(0)" class="admin-link" onclick="selectRole('admin')">管理员入口</a>
    </div>
</div>

<div class="bottom-text">青春不设限，社团更精彩 · 一站式社团管理平台</div>

<script>
var api=window.location.origin;
var selectedRole='user';
var allClubs=[];

var testAccounts={admin:{user:'0066',pass:'0000'},user:{user:'张三',pass:'admin123'},teacher:{user:'孙七',pass:'456789'},student:{user:'张宇婷',pass:'123456'}};

function selectRole(role){
    selectedRole=role;
    document.querySelectorAll('.id-card').forEach(function(c){c.classList.toggle('active',c.dataset.role===role)});
    var cf=document.getElementById('clubField');
    var nf=document.getElementById('newClubField');
    var tf=document.querySelectorAll('.teacher-field');
    var sf=document.getElementById('studentIdField');
    cf.style.display=role==='user'?'block':'none';
    if(role!=='user')nf.style.display='none';
    tf.forEach(function(el){el.style.display=role==='teacher'?'block':'none'});
    sf.style.display=(role==='user'||role==='student')?'block':'none';
    var tabReg=document.getElementById('tabRegister');
    var tabRow=document.querySelector('.tab-row');
    if(role==='admin'){
        tabReg.style.display='none';
        tabRow.style.display='none';
        switchTab('login');
    }else{
        tabReg.style.display='';
        tabRow.style.display='';
    }
    // 自动填充测试账号
    var acc=testAccounts[role];
    if(acc){
        document.getElementById('loginUser').value=acc.user;
        document.getElementById('loginPass').value=acc.pass;
    }
}

function switchTab(tab){
    document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
    document.getElementById('registerForm').style.display=tab==='register'?'block':'none';
    document.getElementById('forgotForm').style.display=tab==='forgot'?'block':'none';
    document.getElementById('tabLogin').className='tab-btn'+(tab==='login'?' active':'');
    document.getElementById('tabRegister').className='tab-btn'+(tab==='register'?' active':'');
    document.getElementById('errorMsg').style.display='none';
    var card=document.querySelector('.login-card');
    var allowScroll=(tab==='register'||tab==='forgot');
    card.style.overflowY=allowScroll?'auto':'hidden';
    card.style.touchAction=allowScroll?'pan-y':'none';
    // 重置忘记密码表单状态
    if(tab==='forgot'){
        document.getElementById('forgotPwdFields').style.display='none';
        document.getElementById('verifyRow').style.display='none';
        document.getElementById('forgotEmail').value='';
        document.getElementById('forgotCode').value='';
        document.getElementById('forgotNewPass').value='';
        document.getElementById('forgotNewPass2').value='';
    }
}

function showError(msg){var e=document.getElementById('errorMsg');e.textContent=msg;e.style.display='block'}
function toast(msg,type){var d=document.createElement('div');d.className='toast '+type;d.textContent=msg;document.body.appendChild(d);setTimeout(function(){d.remove()},3000)}

function loadClubs(){
    fetch(api+'/api/all-clubs').then(function(r){return r.json()}).then(function(res){
        if(!res.success)return;
        allClubs=res.data||[];
        var sel=document.getElementById('regClub');
        allClubs.forEach(function(cn){var opt=document.createElement('option');opt.value=cn;opt.textContent=cn;sel.appendChild(opt)});
        var otherOpt=document.createElement('option');otherOpt.value='__other__';otherOpt.textContent='✏️ 其他社团（手动输入）';sel.appendChild(otherOpt);
        renderTeacherClubList();
    });
}

function renderTeacherClubList(){
    var box=document.getElementById('teacherClubList');
    if(!allClubs.length){box.innerHTML='<span style="font-size:0.76em;color:#86868b">暂无可选社团</span>';return}
    var h='';
    allClubs.forEach(function(cn){
        h+='<label><span>'+cn+'</span><input type="checkbox" value="'+cn+'" class="teacherClubCb" /></label>';
    });
    box.innerHTML=h;
}

function onClubChange(){
    var sel=document.getElementById('regClub');
    var nf=document.getElementById('newClubField');
    nf.style.display=sel.value==='__other__'?'block':'none';
}

loadClubs();
selectRole('user');

document.getElementById('loginForm').addEventListener('submit',function(e){
    e.preventDefault();
    var u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();
    if(!u||!p){showError('请输入姓名和密码');return}
    fetch(api+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,role:selectedRole})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){showError(res.error);return}
        if(res.user&&res.user.role!==selectedRole){
            var names={admin:'管理员',user:'社团负责人',student:'学生',teacher:'指导老师'};
            showError('该账号身份为「'+names[res.user.role]+'」，请选择正确的身份登录');
            fetch(api+'/api/logout',{method:'POST'});
            return;
        }
        var pages={admin:'/dashboard.html',user:'/dashboard.html',teacher:'/club-teacher.html',student:'/dashboard.html'};
        window.location.replace(pages[res.user.role]||'/dashboard.html');
    }).catch(function(){showError('登录失败，请检查网络')});
});

document.getElementById('registerForm').addEventListener('submit',function(e){
    e.preventDefault();
    var u=document.getElementById('regUser').value.trim(),p=document.getElementById('regPass').value.trim(),p2=document.getElementById('regPass2').value.trim();
    if(!u||!p){showError('请输入姓名和密码');return}
    if(p!==p2){showError('两次密码不一致');return}
    if(p.length<4 || !/[a-zA-Z]/.test(p) || !/[0-9]/.test(p)){showError('密码至少4位，需同时包含字母和数字');return}
    if(selectedRole==='teacher'){
        var wid=document.getElementById('regWorkId').value.trim();
        if(!wid){showError('请输入工号');return}
        var selectedClubs=[];
        document.querySelectorAll('.teacherClubCb:checked').forEach(function(cb){selectedClubs.push(cb.value)});
        if(!selectedClubs.length){showError('请选择至少一个指导社团');return}
        fetch(api+'/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,role:'teacher',workId:wid,clubNames:selectedClubs})})
        .then(function(r){return r.json()}).then(function(res){
            if(res.error){showError(res.error);return}
            toast('注册成功，请登录','success');
            switchTab('login');
        }).catch(function(){showError('注册失败，请检查网络')});
    }else{
        var c=document.getElementById('regClub').value;
        if(selectedRole==='user'){
            if(c==='__other__'){c=document.getElementById('regNewClub').value.trim();if(!c){showError('请输入新社团名称');return}}
        }else{c=''}
        var sid=document.getElementById('regStudentId').value.trim();
        if(!sid){showError('请输入学号');return}
        fetch(api+'/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,clubName:c,role:selectedRole,studentId:sid})})
        .then(function(r){return r.json()}).then(function(res){
            if(res.error){showError(res.error);return}
            toast('注册成功，请登录','success');
            switchTab('login');
        }).catch(function(){showError('注册失败，请检查网络')});
    }
});

var codeCountdown=0;
function sendEmailCode(){
    var em=document.getElementById('forgotEmail').value.trim();
    if(!em||em.indexOf('@')<0){showError('请输入正确的邮箱地址');return}
    var btn=document.getElementById('sendCodeBtn');
    btn.disabled=true;
    btn.style.opacity='0.6';
    fetch(api+'/api/send-email-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){showError(res.error);btn.disabled=false;btn.style.opacity='1';return}
        toast('验证码已发送，请查收','success');
        document.getElementById('verifyRow').style.display='block';
        codeCountdown=60;
        var timer=setInterval(function(){
            codeCountdown--;
            if(codeCountdown<=0){clearInterval(timer);btn.textContent='发送验证码';btn.disabled=false;btn.style.opacity='1';return}
            btn.textContent=codeCountdown+'秒后重发';
        },1000);
        btn.textContent=codeCountdown+'秒后重发';
    }).catch(function(){showError('发送失败，请检查网络');btn.disabled=false;btn.style.opacity='1'});
}

function verifyEmailCode(){
    var em=document.getElementById('forgotEmail').value.trim();
    var code=document.getElementById('forgotCode').value.trim();
    if(!code){showError('请输入验证码');return}
    fetch(api+'/api/verify-email-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,code:code})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){showError(res.error);return}
        toast('验证成功，请输入新密码','success');
        document.getElementById('verifyRow').style.display='none';
        document.getElementById('forgotPwdFields').style.display='block';
    }).catch(function(){showError('验证失败，请检查网络')});
}

document.getElementById('forgotForm').addEventListener('submit',function(e){
    e.preventDefault();
    var pwdFields=document.getElementById('forgotPwdFields');
    if(pwdFields.style.display==='none'){showError('请先验证验证码');return}
    var em=document.getElementById('forgotEmail').value.trim();
    var c=document.getElementById('forgotCode').value.trim();
    var p=document.getElementById('forgotNewPass').value.trim();
    var p2=document.getElementById('forgotNewPass2').value.trim();
    if(!em||!c||!p){showError('请填写完整信息');return}
    if(p!==p2){showError('两次密码不一致');return}
    if(p.length<4 || !/[a-zA-Z]/.test(p) || !/[0-9]/.test(p)){showError('新密码至少4位，需同时包含字母和数字');return}
    fetch(api+'/api/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,code:c,newPassword:p})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){showError(res.error);return}
        toast('密码重置成功，请登录','success');
        switchTab('login');
    }).catch(function(){showError('重置失败，请检查网络')});
});
</script>
</body>
</html>
