        document.getElementById('financeList').innerHTML=h;
    });
}

function submitFinanceRecord(){
    var type=document.getElementById('finType').value;
    var category=document.getElementById('finCategory').value.trim();
    var amount=document.getElementById('finAmount').value;
    var recordDate=document.getElementById('finDate').value;
    var desc=document.getElementById('finDesc').value.trim();
    if(!category){toast('请填写分类','error');return}
    if(!amount||parseFloat(amount)<=0){toast('请填写有效金额','error');return}
    if(!recordDate){toast('请选择日期','error');return}
    fetch(api+'/api/finance-records',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clubName:currentClub,type:type,category:category,amount:parseFloat(amount),description:desc,recordDate:recordDate,recorder:currentUser.username})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('记录添加成功','success');
        document.getElementById('finCategory').value='';
        document.getElementById('finAmount').value='';
        document.getElementById('finDesc').value='';
        loadFinanceRecords();
    });
}

function loadFeedbacks(){
    fetch(api+'/api/my-feedbacks').then(function(r){return r.json()}).then(function(res){
        if(!res.success||!res.data||!res.data.length){document.getElementById('feedbackList').innerHTML='<div class="empty">暂无反馈记录</div>';return}
        var typeNames={'bug':'系统故障','suggestion':'功能建议','activity':'活动问题','data':'数据异常','account':'账号问题','other':'其他'};
        var typeColors={'bug':'#e74c3c','suggestion':'#3498db','activity':'#f39c12','data':'#9b59b6','account':'#1abc9c','other':'#95a5a6'};
        var h='';
        res.data.forEach(function(fb){
            var statusCls=fb.status==='resolved'?'resolved':'pending';
            var statusText=fb.status==='resolved'?'✅ 已处理':'⏳ 待处理';
            var t=fb.type||'other';
            var tName=typeNames[t]||'其他';
            var tColor=typeColors[t]||'#95a5a6';
            h+='<div class="feedback-item">';
            h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
            h+='<span style="background:'+tColor+'18;color:'+tColor+';padding:2px 8px;border-radius:4px;font-size:0.76em;font-weight:600">'+esc(tName)+'</span>';
            h+='<span class="fb-status '+statusCls+'">'+statusText+'</span>';
            h+='</div>';
            h+='<div class="fb-content">'+escHtml(fb.content||'')+'</div>';
            h+='<div class="fb-time">'+esc(fb.createdAt||'')+'</div>';
            if(fb.reply)h+='<div class="fb-reply">💬 '+escHtml(fb.reply)+'</div>';
            h+='</div>';
        });
        document.getElementById('feedbackList').innerHTML=h;
    }).catch(function(){document.getElementById('feedbackList').innerHTML='<div class="empty">加载失败</div>'});
}

function submitFeedback(){
    var content=document.getElementById('fbContent').value.trim();
    var fbType=(document.getElementById('fbType')||{}).value||'other';
    if(!content){toast('请输入反馈内容','error');return}
    fetch(api+'/api/submit-feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:content,type:fbType,clubName:currentClub})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('反馈提交成功','success');
        document.getElementById('fbContent').value='';
        loadFeedbacks();
    });
}

function loadClubHome(){
    if(!currentClub)return;
    fetch(api+'/api/club-detail/'+encodeURIComponent(currentClub)).then(function(r){return r.json()}).then(function(res){
        if(!res.success)return;
        var p=res.data.profile;
        var teachers=res.data.teachers||[];
        var infoBox=document.getElementById('clubHomeInfo');
        var h='';
        h+='<div class="club-info-section"><div class="ci-label">社团名称</div><div class="ci-value">'+esc(res.data.clubName)+'</div></div>';
        if(p.president)h+='<div class="club-info-section"><div class="ci-label">社长</div><div class="ci-value">'+esc(p.president)+'</div></div>';
        if(p.category)h+='<div class="club-info-section"><div class="ci-label">社团类型</div><div class="ci-value">'+esc(p.category)+'</div></div>';
        if(p.guidingUnit)h+='<div class="club-info-section"><div class="ci-label">业务指导单位</div><div class="ci-value">'+esc(p.guidingUnit)+'</div></div>';
        if(p.description)h+='<div class="club-info-section"><div class="ci-label">社团简介</div><div class="ci-value">'+safeHtml(p.description)+'</div></div>';
        if(p.emblemUrl)h+='<div class="club-info-section"><div class="ci-label">社团Logo</div><div class="ci-value"><img src="'+api+p.emblemUrl+'" style="max-width:80px;max-height:80px;border-radius:50%;border:1px solid #eee" /></div></div>';
        infoBox.innerHTML=h||'<div class="empty">暂无社团信息</div>';
        var tBox=document.getElementById('clubHomeTeachers');
        if(!teachers.length){tBox.innerHTML='<div class="empty">暂无指导老师信息</div>';return}
        var th='';
        teachers.forEach(function(t){
            th+='<div class="teacher-guidance-card">';
            th+='<div class="tg-avatar">'+(t.photo?'<img src="'+api+t.photo+'" />':'👤')+'</div>';
            th+='<div class="tg-info"><div class="tg-name">'+esc(t.name)+'</div>';
            if(t.introduction)th+='<div style="font-size:0.74em;color:#6b6d8a;margin-top:2px;line-height:1.6">'+escHtml(t.introduction)+'</div>';
            th+='</div></div>';
        });
        tBox.innerHTML=th;
        fetch(api+'/api/club-departments/'+encodeURIComponent(currentClub)).then(function(r){return r.json()}).then(function(dRes){
            var dBox=document.getElementById('clubHomeDepts');
            if(!dRes.success||!dRes.data||!dRes.data.length){dBox.innerHTML='<div class="empty">暂无部门信息</div>';return}
            var dh='';
            dRes.data.forEach(function(d){
                dh+='<div class="dept-item"><div class="di-name">'+esc(d.name)+'</div>';
                if(d.description)dh+='<div class="di-desc">'+escHtml(d.description)+'</div>';
                dh+='</div>';
            });
            dBox.innerHTML=dh;
        });
    });
}

function loadTeacherProfile(){
    fetch(api+'/api/teacher-profile').then(function(r){return r.json()}).then(function(res){
        if(!res.success)return;
        var d=res.data;
        document.getElementById('profileWorkId').value=d.workId||'';
        document.getElementById('profileRealName').value=d.realName||currentUser.realName||currentUser.username;
        document.getElementById('profilePhone').value=d.phone||'';
        document.getElementById('profileEmail').value=d.email||'';
        document.getElementById('profileIntro').value=d.introduction||'';
        var avatarEl=document.getElementById('avatarPreview');
        if(d.avatarPath){avatarEl.innerHTML='<img src="'+api+d.avatarPath+'" style="width:100%;height:100%;object-fit:cover" />'}
        else{avatarEl.innerHTML='👨‍🏫'}
        renderProfileClubList(d.clubs||[]);
    });
}

function renderProfileClubList(selectedClubs){
    var display=document.getElementById('profileClubDisplay');
    var editor=document.getElementById('profileClubList');
    if(display){
        if(!selectedClubs.length){
            display.innerHTML='<span style="font-size:0.82em;color:#a0a3bd">暂未选择指导社团</span>';
        }else{
            var dh='';
            selectedClubs.forEach(function(cn){
                dh+='<span style="display:inline-block;padding:4px 12px;background:rgba(102,126,234,0.08);color:#667eea;border-radius:6px;font-size:0.82em;font-weight:600">'+esc(cn)+'</span>';
            });
            display.innerHTML=dh;
        }
        display.style.display='flex';
    }
    if(editor){
        if(!allClubs.length){editor.innerHTML='<span style="font-size:0.76em;color:#c8cade">暂无可选社团</span>';return}
        var h='';
        allClubs.forEach(function(cn){
            var checked=selectedClubs.indexOf(cn)>=0?'checked':'';
            h+='<label><input type="checkbox" value="'+cn+'" class="profileClubCb" '+checked+' /><span>'+cn+'</span></label>';
        });
        editor.innerHTML=h;
    }
    var editorWrap=document.getElementById('profileClubEditor');
    if(editorWrap)editorWrap.style.display='none';
    var editBtn=document.getElementById('editClubBtn');
    if(editBtn)editBtn.style.display='';
}

function enableClubEdit(){
    var display=document.getElementById('profileClubDisplay');
    var editorWrap=document.getElementById('profileClubEditor');
    var editBtn=document.getElementById('editClubBtn');
    if(display)display.style.display='none';
    if(editorWrap)editorWrap.style.display='block';
    if(editBtn)editBtn.style.display='none';
}

function saveTeacherProfile(){
    var workId=document.getElementById('profileWorkId').value.trim();
    var realName=document.getElementById('profileRealName').value.trim();
    var phone=document.getElementById('profilePhone').value.trim();
    var email=document.getElementById('profileEmail').value.trim();
    var introduction=document.getElementById('profileIntro').value.trim();
    if(!workId){toast('请输入工号','error');return}
    if(phone&&!/^1\d{10}$/.test(phone)){toast('联系电话必须是11位手机号','error');return}
    var selectedClubs=[];
    document.querySelectorAll('.profileClubCb:checked').forEach(function(cb){selectedClubs.push(cb.value)});
    fetch(api+'/api/teacher-profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workId:workId,realName:realName,phone:phone,email:email,introduction:introduction,clubs:selectedClubs})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('保存成功','success');
        myClubs=selectedClubs;
        if(!currentClub&&myClubs.length){currentClub=myClubs[0]}
        renderClubSwitch();
    });
}

function uploadAvatar(input){
    if(!input.files.length)return;
    var fd=new FormData();fd.append('avatar',input.files[0]);
    fetch(api+'/api/teacher-avatar',{method:'POST',body:fd}).then(function(r){return r.json()}).then(function(res){
        if(res.success){
            toast('头像上传成功','success');
            var avatarEl=document.getElementById('avatarPreview');
            avatarEl.innerHTML='<img src="'+api+res.avatarUrl+'" style="width:100%;height:100%;object-fit:cover" />';
            var sbAvatar=document.querySelector('.sb-avatar');
            if(sbAvatar)sbAvatar.innerHTML='<img src="'+api+res.avatarUrl+'" />';
        }else{toast(res.error||'上传失败','error')}
    });
}

function pollTeacherAdminNotifyBadge(){
    fetch(api+'/api/nav-badges').then(function(r){return r.json()}).then(function(res){
        if(!res.success)return;
        var badges=res.badges||{};
        var alwaysShowKeys=['scoringReview'];
        Object.keys(badges).forEach(function(key){
            var count=badges[key];
            var b=document.getElementById('navBadge-'+key);
            if(!b)return;
            if(alwaysShowKeys.indexOf(key)>=0){
                var prevCount=_dismissedCounts[key]||0;
                if(count>0&&count>prevCount){b.textContent=count>99?'99+':count;b.classList.add('show');delete _dismissedCounts[key];_saveDismissed()}
                else if(count>0&&count<=prevCount){b.classList.remove('show')}
                else{b.classList.remove('show');if(_dismissedCounts[key]){delete _dismissedCounts[key];_saveDismissed()}}
            }else{
                var prevCount=_dismissedCounts[key]||0;
                if(count>0&&!_dismissedBadges[key]&&count>prevCount){b.textContent=count>99?'99+':count;b.classList.add('show');delete _dismissedCounts[key];_saveDismissed()}
                else if(count>0&&!_dismissedBadges[key]&&count<=prevCount){b.classList.remove('show')}
                else if(count<=0){b.classList.remove('show');if(_dismissedCounts[key]){delete _dismissedCounts[key];_saveDismissed()}}
                else{b.classList.remove('show')}
            }
        });
    }).catch(function(){});
}

function loadTeacherAdminNotify(){
    fetch(api+'/api/my-admin-notifications').then(function(r){return r.json()}).then(function(res){
        var box=document.getElementById('tanList');if(!box)return;
        if(!res.success||!res.data||!res.data.length){box.innerHTML='<div class="empty">暂无通知</div>';document.getElementById('tanCount').textContent='0';return}
        _tanAllData=res.data;
        var unread=res.data.filter(function(n){return!n.isRead}).length;
        document.getElementById('tanCount').textContent=unread?''+unread+'条未读':''+res.data.length+'条';
        var h='';
        res.data.forEach(function(n){
            var readCls=n.isRead?'':'background:rgba(102,126,234,0.03);border-left:3px solid #667eea;';
            h+='<div class="ni" style="cursor:pointer;display:flex;align-items:flex-start;gap:8px;'+readCls+'" onclick="expandTeacherNotify(this,'+n.id+')">';
            h+='<input type="checkbox" class="tan-cb" data-tanid="'+n.id+'" style="margin-top:4px;accent-color:#667eea;flex-shrink:0" onchange="updateTeacherAnBatchBtn()" onclick="event.stopPropagation()" />';
            h+='<div class="ni-body" style="flex:1;min-width:0"><div class="ni-title">';
            if(!n.isRead)h+='<span style="background:#e74c3c;color:#fff;padding:1px 5px;border-radius:3px;font-size:0.58em;margin-right:4px">新</span>';
            h+=esc(n.title)+'</div>';
            if(n.content)h+='<div class="ni-content-preview" style="font-size:0.78em;color:#6b6d8a;line-height:1.5;margin-top:3px" data-tanid="'+n.id+'" data-expanded="0">'+escHtml(n.content.substring(0,80))+(n.content.length>80?'<span style="color:#667eea;font-size:0.72em;margin-left:4px">...</span>':'')+'</div>';
            h+='<div class="ni-meta" style="margin-top:4px"><span style="font-size:0.72em;color:#c8cade">'+esc(n.time||'')+'</span></div>';
            h+='</div>';
            if(n.isRead)h+='<button style="border:none;background:rgba(231,76,60,0.06);color:#e74c3c;padding:2px 8px;border-radius:6px;cursor:pointer;font-size:0.72em;flex-shrink:0;margin-top:4px" onclick="event.stopPropagation();deleteTeacherNotify('+n.id+')">删除</button>';
            h+='</div>';
        });
        box.innerHTML=h;
        updateTeacherAnBatchBtn();
    });
}

var _tanAllData=[];
function expandTeacherNotify(el,id){
    var n=_tanAllData.find(function(x){return x.id===id});
    if(!n)return;
    var preview=el.querySelector('.ni-content-preview[data-tanid="'+id+'"]');
    if(preview&&preview.getAttribute('data-expanded')==='1'){
        preview.innerHTML=escHtml((n.content||'').substring(0,80))+((n.content||'').length>80?'<span style="color:#667eea;font-size:0.72em;margin-left:4px">...</span>':'');
        preview.setAttribute('data-expanded','0');
    }else if(preview){
        preview.innerHTML=escHtml(n.content||'');
        preview.setAttribute('data-expanded','1');
    }
    if(!n.isRead){
        n.isRead=true;
        fetch(api+'/api/admin-notifications/'+id+'/read',{method:'POST'});
        var card=el.closest('.ni');
        if(card){card.style.background='';card.style.borderLeft='';var badge=card.querySelector('span[style*="background:#e74c3c"]');if(badge)badge.remove()}
        pollTeacherAdminNotifyBadge();
    }
}

function clearTeacherReadNotify(){
    if(!confirm('确定清理所有已读管理员通知？'))return;
    fetch(api+'/api/my-admin-notifications/clear',{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('已清理已读通知','success');loadTeacherAdminNotify();
    });
}

function deleteTeacherNotify(id){
    fetch(api+'/api/my-admin-notifications/'+id+'/read',{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        loadTeacherAdminNotify();
    });
}

function updateTeacherAnBatchBtn(){
    var cbs=document.querySelectorAll('.tan-cb');
    var checked=document.querySelectorAll('.tan-cb:checked');
    var selectAll=document.getElementById('tanSelectAll');
    if(selectAll)selectAll.checked=cbs.length>0&&checked.length===cbs.length;
}

function toggleTeacherAnSelectAll(el){
    var cbs=document.querySelectorAll('.tan-cb');
    cbs.forEach(function(cb){cb.checked=el.checked});
    updateTeacherAnBatchBtn();
}

function batchDeleteTeacherAdminNotify(){
    var checked=document.querySelectorAll('.tan-cb:checked');
    if(!checked.length){toast('请先选择要删除的通知','error');return}
    var ids=[];
    checked.forEach(function(cb){ids.push(parseInt(cb.getAttribute('data-tanid')))});
    if(!confirm('确定删除选中的 '+ids.length+' 条通知？'))return;
    fetch(api+'/api/notifications/batch-delete-admin-read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:ids})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('已删除 '+res.deleted+' 条通知','success');
        loadTeacherAdminNotify();
        pollTeacherAdminNotifyBadge();
    }).catch(function(){toast('批量删除失败','error')});
}

function scoringReviewPage(){
    return '<div class="pg-title">赋分审核</div><div class="pg-desc">审核社团提交的赋分结果</div><div id="scoringReviewList"><div class="empty">加载中...</div></div>';
}

function loadScoringReviewList(){
    var srp='';
    if(currentClub)srp='club='+encodeURIComponent(currentClub);
    fetch(api+'/api/scoring/teacher-reviews'+(srp?'?'+srp:'')).then(function(r){return r.json()}).then(function(res){
        if(!res.success){document.getElementById('scoringReviewList').innerHTML='<div class="empty">加载失败</div>';return}
        var data=res.data;
        if(!data.length){document.getElementById('scoringReviewList').innerHTML='<div class="empty">暂无待审核的赋分</div>';return}
        var h='';
        data.forEach(function(d){
            var statusText={draft:'草稿',pending_teacher:'待审核',teacher_approved:'已通过',submitted_tuanwei:'已提交团委'};
            var statusColor={draft:'#a0a3bd',pending_teacher:'#f39c12',teacher_approved:'#00b894',submitted_tuanwei:'#667eea'};
            h+='<div class="card" style="margin-bottom:16px">';
            h+='<div class="card-title">'+esc(d.club_name)+' 赋分结果 <span class="badge" style="color:'+statusColor[d.submission_status]+';background:'+statusColor[d.submission_status]+'15">'+statusText[d.submission_status]+'</span></div>';
            if(d.items&&d.items.length>0){
                h+='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="score-review-table" style="width:100%;border-collapse:collapse;font-size:0.84em"><thead><tr>';
                h+='<th style="text-align:left;padding:8px 10px;border-bottom:2px solid #f0f0f8;color:#6b6d8a;font-size:0.76em;white-space:nowrap">学号</th>';
                h+='<th style="text-align:left;padding:8px 10px;border-bottom:2px solid #f0f0f8;color:#6b6d8a;font-size:0.76em;white-space:nowrap">姓名</th>';
                h+='<th style="text-align:left;padding:8px 10px;border-bottom:2px solid #f0f0f8;color:#6b6d8a;font-size:0.76em;white-space:nowrap">学院</th>';
                h+='<th style="text-align:left;padding:8px 10px;border-bottom:2px solid #f0f0f8;color:#6b6d8a;font-size:0.76em;white-space:nowrap">班级</th>';
                h+='<th style="text-align:left;padding:8px 10px;border-bottom:2px solid #f0f0f8;color:#6b6d8a;font-size:0.76em;white-space:nowrap">总工作量</th>';
                h+='<th style="text-align:left;padding:8px 10px;border-bottom:2px solid #f0f0f8;color:#6b6d8a;font-size:0.76em;white-space:nowrap">个人赋分</th>';
                h+='</tr></thead><tbody>';
                d.items.forEach(function(m){
                    h+='<tr style="border-bottom:1px solid #f5f5ff"><td style="padding:8px 10px;white-space:nowrap">'+esc(m.student_id_num||'-')+'</td><td style="padding:8px 10px;white-space:nowrap">'+esc(m.student_name||'-')+'</td><td style="padding:8px 10px;white-space:nowrap">'+esc(m.college||'-')+'</td><td style="padding:8px 10px;white-space:nowrap">'+esc(m.class_name||'-')+'</td><td style="padding:8px 10px;white-space:nowrap">'+m.total_workload+'</td><td style="padding:8px 10px;font-weight:700;color:#00b894;white-space:nowrap">'+m.final_score+'</td></tr>';
                });
                h+='</tbody></table></div>';
            }
            if(d.review){
                var rv=d.review;
                if(rv.status==='pending'){
                    h+='<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">';
                    h+='<button class="btn btn-success" onclick="scoringReviewAction('+rv.id+',\'approve\')">✅ 通过</button>';
                    h+='<button class="btn btn-danger" onclick="scoringReviewAction('+rv.id+',\'reject\')">❌ 驳回</button>';
                    h+='</div>';
                }else if(rv.status==='approved'){
                    h+='<div style="margin-top:12px;font-size:0.82em;color:#00b894">✅ 您已通过审核'+(rv.review_note?' ('+esc(rv.review_note)+')':'')+'</div>';
                }else if(rv.status==='rejected'){
                    h+='<div style="margin-top:12px;font-size:0.82em;color:#e74c3c">❌ 您已驳回'+(rv.review_note?' ('+esc(rv.review_note)+')':'')+'</div>';
                }
            }
            h+='</div>';
        });
        document.getElementById('scoringReviewList').innerHTML=h;
    });
}

function scoringReviewAction(reviewId,action){
    var oldModals=document.querySelectorAll('div[data-sr-modal]');
    for(var i=0;i<oldModals.length;i++)oldModals[i].remove();
    var overlay=document.createElement('div');
    overlay.setAttribute('data-sr-modal','1');
    overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:9999;display:flex;justify-content:center;align-items:center';
    var card=document.createElement('div');
    card.style.cssText='background:#fff;border-radius:20px;padding:0;max-width:400px;width:90%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.15)';
    var header=document.createElement('div');
    if(action==='approve'){
        header.style.cssText='background:linear-gradient(135deg,#00b894,#55efc4);padding:20px 24px';
        header.innerHTML='<div style="color:#fff;font-size:1em;font-weight:700">确认通过赋分</div><div style="color:rgba(255,255,255,0.8);font-size:0.78em;margin-top:4px">通过后赋分将进入下一环节</div>';
    }else{
        header.style.cssText='background:linear-gradient(135deg,#e74c3c,#c0392b);padding:20px 24px';
        header.innerHTML='<div style="color:#fff;font-size:1em;font-weight:700">驳回赋分</div><div style="color:rgba(255,255,255,0.8);font-size:0.78em;margin-top:4px">驳回后社团负责人可重新修改赋分</div>';
    }
    card.appendChild(header);
    var body=document.createElement('div');
    body.style.cssText='padding:24px';
    if(action==='reject'){
        var warn=document.createElement('div');
        warn.style.cssText='background:#fff8f0;border:1px solid #ffe0b2;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:0.82em;color:#e67e22;line-height:1.6';
        warn.textContent='驳回后赋分将退回草稿状态，社团负责人可重新修改并提交。';
        body.appendChild(warn);
    }
    var label=document.createElement('label');
    label.style.cssText='display:block;font-size:0.82em;font-weight:700;color:#1a1a2e;margin-bottom:8px';
    if(action==='reject'){
        label.innerHTML='驳回原因 <span style="color:#e74c3c">*</span>';
    }else{
        label.textContent='备注（可选）';
    }
    body.appendChild(label);
    var ta=document.createElement('textarea');
    ta.rows=action==='reject'?3:2;
    ta.placeholder=action==='reject'?'请说明驳回原因...':'可填写审核备注...';
    ta.style.cssText='width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid #e8e8f0;background:#fafaff;font-size:0.88em;resize:vertical;line-height:1.6;font-family:inherit;outline:none;box-sizing:border-box';
    if(action==='reject'){
        ta.onfocus=function(){ta.style.borderColor='#e74c3c'};
        ta.onblur=function(){ta.style.borderColor='#e8e8f0'};
    }
    body.appendChild(ta);
    var btnRow=document.createElement('div');
    btnRow.style.cssText='display:flex;gap:10px;justify-content:flex-end;margin-top:16px';
    var cancelBtn=document.createElement('button');
    cancelBtn.className='btn btn-ghost';
    cancelBtn.textContent='取消';
    cancelBtn.onclick=function(){overlay.remove()};
    btnRow.appendChild(cancelBtn);
    var confirmBtn=document.createElement('button');
    if(action==='approve'){
        confirmBtn.className='btn btn-success';
        confirmBtn.textContent='确认通过';
    }else{
        confirmBtn.className='btn btn-danger';
        confirmBtn.textContent='确认驳回';
    }
    confirmBtn.onclick=function(){
        var note=ta.value.trim();
        if(action==='reject'&&!note){toast('请填写驳回原因','error');ta.focus();return}
        confirmBtn.disabled=true;
        confirmBtn.textContent='提交中...';
        fetch(api+'/api/scoring/teacher-review/'+reviewId,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({action:action,review_note:note})
        }).then(function(r){return r.json()}).then(function(res){
            if(res.success){toast(res.message||'审核完成','success');overlay.remove();loadScoringReviewList()}
            else{toast(res.error||'操作失败','error');confirmBtn.disabled=false;confirmBtn.textContent=action==='approve'?'确认通过':'确认驳回'}
        }).catch(function(){toast('操作失败','error');confirmBtn.disabled=false;confirmBtn.textContent=action==='approve'?'确认通过':'确认驳回'});
    };
    btnRow.appendChild(confirmBtn);
    body.appendChild(btnRow);
    card.appendChild(body);
    overlay.appendChild(card);
    overlay.onclick=function(e){if(e.target===overlay)overlay.remove()};
    document.body.appendChild(overlay);
    if(action==='reject'){setTimeout(function(){ta.focus()},100)}
}
</script>
<script src="/ai-chat.js?v=5"></script>
<script>
// 全屏模式自动恢复（从登录页跳转后）
(function(){
    if(window.self!==window.top)return; // 在iframe内不执行，由父页面管理全屏
    function isFs(){return !!(document.fullscreenElement||document.webkitFullscreenElement)}
    function enterFs(){
        var el=document.documentElement;
        var req=el.requestFullscreen||el.webkitRequestFullscreen;
        if(req){req.call(el).then(function(){sessionStorage.setItem('fullscreenMode','1')}).catch(function(){})}
    }
    if(sessionStorage.getItem('fullscreenMode')==='1' && !isFs()){
        var hint=document.createElement('div');
        hint.id='fsHint';
        hint.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(180deg,rgba(0,0,0,0.75),rgba(0,0,0,0.55));color:#fff;text-align:center;padding:12px 16px;font-size:14px;cursor:pointer;font-family:Microsoft YaHei,sans-serif;letter-spacing:0.5px';
        hint.innerHTML='🖥️ 点击此处或页面任意位置进入全屏模式';
        hint.onclick=function(){enterFs()};
        document.body.appendChild(hint);
        var firstClick=function(){
            if(!isFs()){enterFs()}
            document.removeEventListener('click',firstClick);
        };
        setTimeout(function(){document.addEventListener('click',firstClick)},200);
    }
    document.addEventListener('fullscreenchange',function(){
        if(!isFs()){
            sessionStorage.removeItem('fullscreenMode');
            var h=document.getElementById('fsHint');
            if(h)h.remove();
        }else{
            var h=document.getElementById('fsHint');
            if(h)h.remove();
        }
    });
})();
</script>
