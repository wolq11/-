<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f4f5fb;color:#1a1a2e;display:flex}
a{text-decoration:none;color:inherit}

.sidebar{width:240px;background:#fff;height:100vh;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid #ececf5;position:relative;z-index:10}
.sb-head{padding:20px 18px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f0f0f8}
.sb-logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#00b894,#55efc4);display:flex;align-items:center;justify-content:center;font-size:1.1em;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(0,184,148,0.25)}
.sb-title{font-size:1.05em;font-weight:800;color:#1a1a2e;line-height:1.2}
.sb-subtitle{font-size:0.6em;color:#a0a3bd;font-weight:400;letter-spacing:1px}

.sb-role{padding:12px 18px;border-bottom:1px solid #f0f0f8}
.sb-role-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:0.74em;font-weight:700;background:linear-gradient(135deg,rgba(0,184,148,0.1),rgba(85,239,196,0.1));color:#00b894}

.sb-club{padding:10px 18px;border-bottom:1px solid #f0f0f8}
.sb-club-label{font-size:0.62em;font-weight:700;color:#c0c3d8;padding-bottom:6px;letter-spacing:1px}
.sb-club-chips{display:flex;gap:4px;flex-wrap:wrap}
.sb-club-chip{padding:4px 10px;border-radius:6px;font-size:0.72em;cursor:pointer;border:1px solid #eee;background:#fafaff;color:#a0a3bd;font-weight:600;transition:all .2s;word-break:break-all;max-width:100%}
.sb-club-chip:hover{border-color:#b2f0e0;color:#00b894}
.sb-club-chip.active{border-color:#00b894;background:rgba(0,184,148,0.06);color:#00b894}

.sb-nav{flex:1;overflow-y:auto;padding:10px 10px}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:#ececf5;border-radius:3px}
.nav-sec{margin-bottom:6px}
.nav-sec-label{font-size:0.62em;font-weight:700;color:#c0c3d8;padding:8px 10px 4px;text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:0.84em;color:#6b6d8a;cursor:pointer;transition:all .2s;margin-bottom:1px;font-weight:500;position:relative}
.nav-item:hover{background:#f0fdf9;color:#1a1a2e}
.nav-item.active{background:linear-gradient(135deg,rgba(0,184,148,0.08),rgba(85,239,196,0.08));color:#00b894;font-weight:700}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:2px;background:linear-gradient(180deg,#00b894,#55efc4)}
.nav-item .ni-emoji{font-size:1.1em;width:22px;text-align:center;flex-shrink:0}
.nav-badge{min-width:18px;height:18px;border-radius:9px;background:#e74c3c;color:#fff;font-size:0.58em;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 5px;margin-left:auto;flex-shrink:0;line-height:1}
.nav-badge.show{display:flex}

.sb-foot{padding:14px 18px;border-top:1px solid #f0f0f8}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-avatar{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#00b894,#55efc4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.82em;font-weight:700;flex-shrink:0;overflow:hidden}
.sb-avatar img{width:100%;height:100%;object-fit:cover}
.sb-uname{font-size:0.84em;font-weight:700;color:#1a1a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-uclub{font-size:0.64em;color:#a0a3bd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{width:100%;padding:9px;border-radius:10px;border:1.5px solid #ececf5;background:#fafaff;color:#6b6d8a;font-size:0.78em;cursor:pointer;transition:all .2s;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-logout:hover{background:#fff5f5;border-color:#ffd6d6;color:#e74c3c}

.main{flex:1;height:100vh;overflow-y:auto;padding:28px 32px;background:#f4f5fb}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
.page{display:none;animation:pageIn .3s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.pg-title{font-size:1.4em;font-weight:800;color:#1a1a2e;margin-bottom:4px}
.pg-desc{font-size:0.82em;color:#a0a3bd;margin-bottom:22px}

.iframe-wrap{width:100%;height:calc(100vh - 180px);border:none;border-radius:12px;background:#fff}

.card{background:#fff;border-radius:16px;padding:22px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.03);border:1px solid #f0f0f8}
.card-title{font-size:0.94em;font-weight:700;color:#1a1a2e;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title .badge{background:linear-gradient(135deg,rgba(0,184,148,0.08),rgba(85,239,196,0.08));color:#00b894;padding:3px 10px;border-radius:6px;font-size:0.68em;font-weight:700}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:linear-gradient(135deg,#f0fdf9,#e8faf5);border-radius:14px;padding:18px;text-align:center;border:1px solid #d1fae5;transition:all .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,184,148,0.08)}
.stat-card .sc-num{font-size:1.8em;font-weight:900;background:linear-gradient(135deg,#00b894,#55efc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .sc-label{font-size:0.72em;color:#a0a3bd;margin-top:3px;font-weight:500}

.cols-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.form-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.form-row .field{flex:1;min-width:180px}
.form-row .field:only-child{flex:1 1 100%;min-width:100%}
.form-row .field label{display:block;color:#6b6d8a;font-size:0.76em;margin-bottom:5px;font-weight:600}
.form-row .field input,.form-row .field textarea,.form-row .field select{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #eee;color:#1a1a2e;font-size:0.86em;outline:none;font-family:inherit;transition:all .2s;background:#fafaff}
.form-row .field input:focus,.form-row .field textarea:focus,.form-row .field select:focus{border-color:#00b894;background:#fff;box-shadow:0 0 0 3px rgba(0,184,148,0.08)}
.form-row .field textarea{min-height:60px;resize:vertical}
.form-row .field select option{background:#fff;color:#1a1a2e}

.btn{padding:9px 20px;border-radius:10px;border:none;font-size:0.84em;cursor:pointer;font-weight:700;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#00b894,#55efc4);color:#fff;box-shadow:0 3px 12px rgba(0,184,148,0.25)}
.btn-primary:hover{box-shadow:0 5px 20px rgba(0,184,148,0.35);transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,#00b894,#55efc4);color:#fff;box-shadow:0 3px 12px rgba(0,184,148,0.25)}
.btn-danger{background:#fff5f5;color:#e74c3c;border:1.5px solid #ffd6d6}
.btn-danger:hover{background:#ffe8e8}
.btn-ghost{background:transparent;color:#6b6d8a;border:1.5px solid #e8e8f0}
.btn-ghost:hover{background:#f5f5ff}
.btn-sm{padding:5px 12px;font-size:0.76em;border-radius:8px}

.session-row{padding:12px 14px;background:#fafaff;border-radius:10px;border:1px solid #f0f0f8;margin-bottom:6px;cursor:pointer;transition:all .2s}
.session-row:hover{border-color:#b2f0e0;background:#f0fdf9}
.session-row.active{border-color:#00b894;background:rgba(0,184,148,0.03)}
.session-info{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.ni{padding:10px 0;border-bottom:1px solid #f5f5ff;display:flex;align-items:flex-start;gap:12px}
.ni:last-child{border-bottom:none}
.ni-body{flex:1;min-width:0}
.ni .ni-title{font-size:0.82em;color:#1a1a2e;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:5px}
.session-name{font-size:0.88em;font-weight:600;color:#1a1a2e}
.session-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:0.74em;color:#a0a3bd;margin-top:4px}
.session-status{font-size:0.76em;font-weight:600;padding:4px 10px;border-radius:6px}
.session-status.open{background:rgba(0,184,148,0.08);color:#00b894}
.session-status.closed{background:rgba(108,117,125,0.08);color:#6c757d}
.session-detail{max-height:0;overflow:hidden;transition:max-height .3s}
.session-detail.show{max-height:3000px;margin-top:8px}

.checkin-action-area{margin-top:12px;padding:14px;background:#f0fdf9;border:1px solid #d1fae5;border-radius:12px}
.checkin-action-area h4{font-size:0.88em;font-weight:700;color:#1a1a2e;margin-bottom:10px}
.checkin-status-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:8px;font-size:0.76em;font-weight:700}
.checkin-status-tag.pending{background:rgba(253,203,110,0.12);color:#f39c12}
.checkin-status-tag.checked_in{background:rgba(0,184,148,0.1);color:#00b894}
.checkin-status-tag.checked_out{background:linear-gradient(135deg,rgba(102,126,234,0.1),rgba(118,75,162,0.1));color:#667eea}

.location-hint{font-size:0.76em;color:#a0a3bd;margin-top:6px;display:flex;align-items:center;gap:4px}
.location-hint .loc-ok{color:#00b894}
.location-hint .loc-far{color:#e74c3c}

.teacher-guidance-card{padding:14px;background:#fafaff;border-radius:10px;border:1px solid #f0f0f8;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.teacher-guidance-card .tg-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,rgba(0,184,148,0.1),rgba(85,239,196,0.1));display:flex;align-items:center;justify-content:center;font-size:1.2em;color:#00b894;flex-shrink:0;overflow:hidden;border:1px solid #f0f0f8}
.teacher-guidance-card .tg-avatar img{width:100%;height:100%;object-fit:cover}
.teacher-guidance-card .tg-info{flex:1;min-width:0}
.teacher-guidance-card .tg-name{font-size:0.88em;font-weight:600;color:#1a1a2e}
.teacher-guidance-card .tg-count{font-size:0.74em;color:#a0a3bd;margin-top:2px}
.teacher-guidance-card .tg-bar{height:6px;background:#f0f0f8;border-radius:3px;margin-top:6px;overflow:hidden}
.teacher-guidance-card .tg-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#00b894,#55efc4);transition:width .6s}

.club-info-section{background:#fafaff;border:1px solid #f0f0f8;border-radius:10px;padding:16px;margin-bottom:12px}
.club-info-section .ci-label{font-size:0.74em;color:#a0a3bd;font-weight:600;margin-bottom:4px}
.club-info-section .ci-value{font-size:0.86em;color:#1a1a2e;line-height:1.6}

.dept-item{padding:10px 14px;background:#fafaff;border-radius:8px;border:1px solid #f0f0f8;margin-bottom:6px}
.dept-item .di-name{font-size:0.86em;font-weight:600;color:#1a1a2e}
.dept-item .di-desc{font-size:0.74em;color:#6b6d8a;margin-top:4px;line-height:1.6}

.profile-avatar{width:72px;height:72px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,rgba(0,184,148,0.1),rgba(85,239,196,0.1));display:flex;align-items:center;justify-content:center;font-size:2em;color:#b2f0e0;flex-shrink:0;border:2px solid #f0f0f8}
.profile-avatar img{width:100%;height:100%;object-fit:cover}

.club-check-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;max-height:280px;overflow-y:auto;padding:8px;background:#fafaff;border-radius:10px;border:1.5px solid #eee}
.club-check-list label{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;background:#fff;border:1px solid #eee;border-radius:8px;font-size:0.82em;cursor:pointer;color:#1a1a2e;transition:all .2s;max-width:100%}
.club-check-list label span{word-break:break-all}
.club-check-list label:hover{border-color:#00b894;background:#f0fdf9}
.club-check-list input:checked+span{color:#00b894;font-weight:600}

.viz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:12px}
.viz-card{background:#fafaff;border:1px solid #f0f0f8;border-radius:8px;padding:12px;text-align:center}
.viz-card .vc-num{font-size:1.6em;font-weight:800;background:linear-gradient(90deg,#00b894,#55efc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.viz-card .vc-label{font-size:0.72em;color:#a0a3bd;margin-top:2px}

.chart-container{position:relative;height:260px;margin-top:12px}

.finance-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fafaff;border-radius:10px;border:1px solid #f0f0f8;margin-bottom:6px;transition:all .2s}
.finance-row:hover{border-color:#b2f0e0;background:#f0fdf9}
.finance-row .fr-type{font-size:0.68em;padding:3px 8px;border-radius:6px;font-weight:700}
.finance-row .fr-type.income{background:rgba(0,184,148,0.1);color:#00b894}
.finance-row .fr-type.expense{background:rgba(232,67,147,0.08);color:#e84393}
.finance-row .fr-info{flex:1;min-width:0}
.finance-row .fr-cat{font-size:0.86em;font-weight:600;color:#1a1a2e}
.finance-row .fr-desc{font-size:0.74em;color:#a0a3bd;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.finance-row .fr-amount{font-size:0.92em;font-weight:800;flex-shrink:0}
.finance-row .fr-amount.income{color:#00b894}
.finance-row .fr-amount.expense{color:#e84393}
.finance-row .fr-date{font-size:0.72em;color:#c8cade;flex-shrink:0}
.finance-summary{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.finance-summary .fs-card{flex:1;min-width:120px;padding:14px;border-radius:12px;text-align:center}
.finance-summary .fs-card.income{background:rgba(0,184,148,0.06);border:1px solid rgba(0,184,148,0.12)}
.finance-summary .fs-card.expense{background:rgba(232,67,147,0.04);border:1px solid rgba(232,67,147,0.08)}
.finance-summary .fs-card.balance{background:rgba(102,126,234,0.04);border:1px solid rgba(102,126,234,0.08)}
.finance-summary .fs-num{font-size:1.4em;font-weight:900}
.finance-summary .fs-num.income{color:#00b894}
.finance-summary .fs-num.expense{color:#e84393}
.finance-summary .fs-num.balance{color:#667eea}
.finance-summary .fs-label{font-size:0.68em;color:#a0a3bd;margin-top:2px}

.feedback-item{padding:14px;background:#fafaff;border-radius:10px;border:1px solid #f0f0f8;margin-bottom:8px}
.feedback-item .fb-status{font-size:0.68em;padding:3px 8px;border-radius:6px;font-weight:700;display:inline-block;margin-bottom:6px}
.feedback-item .fb-status.pending{background:rgba(253,203,110,0.12);color:#f39c12}
.feedback-item .fb-status.resolved{background:rgba(0,184,148,0.1);color:#00b894}
.feedback-item .fb-content{font-size:0.86em;color:#1a1a2e;line-height:1.6}
.feedback-item .fb-time{font-size:0.72em;color:#c8cade;margin-top:6px}
.feedback-item .fb-reply{margin-top:8px;padding:8px 12px;background:#f0fdf9;border-radius:8px;font-size:0.82em;color:#00b894;line-height:1.5}

.empty{text-align:center;padding:28px;color:#c8cade;font-size:0.86em}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:12px;font-size:0.84em;z-index:10000;animation:slideIn .3s;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.toast.success{background:#e8f8f0;border:1px solid #b8e6cc;color:#00b894}
.toast.error{background:#fff5f5;border:1px solid #ffd6d6;color:#e74c3c}
@keyframes slideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);z-index:10001;display:none;justify-content:center;align-items:center}
.modal-bg.show{display:flex}
.modal-box{background:#fff;border:1px solid #f0f0f8;border-radius:14px;padding:24px;width:90%;max-width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.1)}
.modal-box h3{font-size:0.95em;color:#1a1a2e;margin-bottom:14px}

.rec-list{max-height:400px;overflow-y:auto}
.rec-row{padding:10px 12px;background:#fafaff;border-radius:8px;border:1px solid #f0f0f8;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.rec-row .rr-info{flex:1;min-width:0}
.rec-row .rr-name{font-size:0.86em;font-weight:600;color:#1a1a2e}
.rec-row .rr-meta{font-size:0.72em;color:#a0a3bd;margin-top:2px}
.rec-status-tag{padding:2px 8px;border-radius:5px;font-size:0.68em;font-weight:600}
.rec-status-tag.pending{background:rgba(253,203,110,0.12);color:#f39c12}
.rec-status-tag.approved{background:rgba(0,184,148,0.1);color:#00b894}
.rec-status-tag.rejected{background:rgba(232,67,147,0.08);color:#e84393}

.carousel{position:relative;width:100%;height:340px;border-radius:16px;overflow:hidden;margin-bottom:24px;background:#1a1a2e}
.carousel-track{display:flex;height:100%;transition:transform .5s ease}
.carousel-slide{min-width:100%;height:100%;position:relative;background-size:cover;background-position:center}
.carousel-slide .cs-overlay{position:absolute;bottom:0;left:0;right:0;padding:24px 28px;background:linear-gradient(transparent,rgba(0,0,0,0.7))}
.carousel-slide .cs-title{color:#fff;font-size:1.4em;font-weight:700;margin-bottom:6px}
.carousel-slide .cs-desc{color:rgba(255,255,255,0.85);font-size:0.92em;line-height:1.5}
.carousel-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
.carousel-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer;transition:all .3s}
.carousel-dot.active{background:#fff;width:20px;border-radius:4px}
.carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:1.2em;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:background .2s}
.carousel-arrow:hover{background:rgba(255,255,255,0.4)}
.carousel-arrow.prev{left:14px}
.carousel-arrow.next{right:14px}
.club-news{flex:1;min-width:0}
.club-news .cn-item{padding:12px 0;border-bottom:1px solid #f0f0f8;cursor:pointer;transition:background .2s}
.club-news .cn-item:hover{background:#fafaff}
.club-news .cn-item:last-child{border-bottom:none}
.club-news .cn-title{font-size:0.92em;font-weight:600;color:#1a1a2e;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.club-news .cn-meta{font-size:0.74em;color:#a0a3bd}
.excellent-clubs{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:20px;padding:8px 0}

<body>
<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="sidebar">
    <div class="sb-head">
        <div class="sb-logo">👨‍🏫</div>
        <div><div class="sb-title">云智社联</div><div class="sb-subtitle">TEACHER PORTAL</div></div>
    </div>
    <div class="sb-role"><span class="sb-role-badge">👨‍🏫 <span>指导老师</span></span></div>
    <div class="sb-club" id="sbClub">
        <div class="sb-club-label">切换社团</div>
        <div class="sb-club-chips" id="sbClubChips"></div>
    </div>
    <div class="sb-nav" id="sbNav"></div>
    <div class="sb-foot">
        <div class="sb-user" id="sbUser"></div>
        <button class="btn-logout" onclick="doLogout()">🚪 <span>退出登录</span></button>
    </div>
</div>

<div class="main" id="mainArea"></div>

<div class="modal-bg" id="imageModal" onclick="closeModal('imageModal')">
    <div class="modal-box" onclick="event.stopPropagation()">
        <img id="imageModalSrc" style="max-width:100%;border-radius:8px" />
    </div>
</div>

<div class="modal-bg" id="checkoutQrModal" onclick="closeModal('checkoutQrModal')">
    <div class="modal-box" onclick="event.stopPropagation()" style="text-align:center">
        <h3>📱 签退码</h3>
        <div id="checkoutQrContainer" style="display:inline-block;padding:16px;background:#fff;border-radius:12px;border:2px solid #f0f0f8;margin-bottom:12px"></div>
        <div id="checkoutCodeDisplay" style="font-size:2.4em;font-weight:900;letter-spacing:8px;color:#00b894;background:rgba(0,184,148,0.06);padding:16px 32px;border-radius:12px;display:inline-block;border:2px dashed rgba(0,184,148,0.2)"></div>
        <div style="margin-top:12px;font-size:0.78em;color:#a0a3bd">请在活动地点200m范围内完成签退</div>
    </div>
</div>

<script>
function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('show')}
function closeSidebar(){document.querySelector('.sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show')}
var api=window.location.origin;
var currentUser=null;
var currentClub='';
var myClubs=[];
var allClubs=[];
var guidanceChart=null;
var guidanceClubChartInstance=null;
var _dismissedBadges={};
var _dismissedCounts={};
try{var _sd=localStorage.getItem('dismissedBadges');if(_sd)_dismissedCounts=JSON.parse(_sd)}catch(e){}
function _saveDismissed(){try{localStorage.setItem('dismissedBadges',JSON.stringify(_dismissedCounts))}catch(e){}}
function dismissBadge(feature){
    _dismissedBadges[feature]=true;
    var b=document.getElementById('navBadge-'+feature);
    if(b){_dismissedCounts[feature]=parseInt(b.textContent)||0;b.classList.remove('show')}
    _saveDismissed();
    fetch(api+'/api/feature-read/'+feature,{method:'POST'}).then(function(){delete _dismissedBadges[feature]}).catch(function(){delete _dismissedBadges[feature]});
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function escHtml(s){if(!s)return '';return esc(s).replace(/\n/g,'<br>')}
function safeHtml(h){if(!h)return '';var d=document.createElement('div');d.innerHTML=h;var scripts=d.querySelectorAll('script,iframe,object,embed,form');for(var i=0;i<scripts.length;i++){scripts[i].remove()}return d.innerHTML}
function toast(msg,type){var d=document.createElement('div');d.className='toast '+type;d.textContent=msg;document.body.appendChild(d);setTimeout(function(){d.remove()},3000)}
function showImageModal(src){document.getElementById('imageModalSrc').src=src;document.getElementById('imageModal').classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}

function buildSidebar(){
    var navs=[
        {sec:'首页',items:[
            {id:'home',emoji:'🏠',name:'首页'},
            {id:'personal',emoji:'👤',name:'个人中心'}
        ]},
        {sec:'活动',items:[
            {id:'checkin',emoji:'✅',name:'活动签到'},
            {id:'activity',emoji:'📋',name:'活动记录'},
            {id:'joint',emoji:'🤝',name:'联合活动'}
        ]},
        {sec:'数据',items:[
    {id:'guidance',emoji:'📊',name:'指导情况'},
            {id:'recruit',emoji:'👥',name:'成员管理'},
            {id:'cadres',emoji:'⭐',name:'社团骨干'},
            {id:'memberAnalysis',emoji:'📈',name:'成员分析'}
        ]},
        {sec:'管理',items:[
            {id:'clubInvite',emoji:'📨',name:'社团邀请'},
            {id:'clubHome',emoji:'🏫',name:'社团主页'},
            {id:'finance',emoji:'💰',name:'财务登记'},
            {id:'scoringReview',emoji:'⚖️',name:'赋分审核'},
            {id:'adminNotify',emoji:'📨',name:'管理员通知'},
            {id:'feedback',emoji:'💬',name:'问题反馈'}
        ]}
    ];
    var h='';
    navs.forEach(function(sec){
        h+='<div class="nav-sec"><div class="nav-sec-label">'+sec.sec+'</div>';
        sec.items.forEach(function(item){
            h+='<div class="nav-item'+(item.id==='home'?' active':'')+'" data-page="'+item.id+'" onclick="switchPage(\''+item.id+'\')">';
            h+='<span class="ni-emoji">'+item.emoji+'</span><span>'+item.name+'</span><span class="nav-badge" id="navBadge-'+item.id+'"></span></div>';
        });
        h+='</div>';
    });
    document.getElementById('sbNav').innerHTML=h;
}

function switchPage(id){
    document.querySelectorAll('.nav-item').forEach(function(n){n.classList.toggle('active',n.dataset.page===id)});
    document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
    var page=document.getElementById('page-'+id);
    if(page)page.classList.add('active');
    var _featureMap={'joint':'joint','recruit':'recruit','scoringReview':'scoringReview'};
    if(_featureMap[id])dismissBadge(_featureMap[id]);
    if(id==='joint'){
        var jf=document.querySelector('#page-joint iframe');
        if(jf){
            jf.onload=function(){if(window.innerWidth<=768){try{var d=this.contentDocument||this.contentWindow.document;this.style.height=d.documentElement.scrollHeight+'px'}catch(e){}}};
            jf.src='/club-tools.html?panel=joint&club='+encodeURIComponent(currentClub||'')+'&t='+Date.now();
        }
    }
    if(id==='home')loadTeacherHomeData();
    if(id==='checkin')loadCheckinSessions();
    if(id==='activity')loadActivityList();
    if(id==='guidance')loadGuidanceStats();
    if(id==='memberAnalysis')loadMemberAnalysis();
    if(id==='cadres')loadCadres();
    if(id==='adminNotify')loadTeacherAdminNotify();
    if(id==='finance')loadFinanceRecords();
    if(id==='feedback')loadFeedbacks();
    if(id==='clubInvite')loadClubInvites();
    if(id==='clubHome')loadClubHome();
    if(id==='personal')loadTeacherProfile();
    if(id==='scoringReview')loadScoringReviewList();
}

function renderClubSwitch(){
    var box=document.getElementById('sbClubChips');
    var h='';
    var orderedClubs=myClubs.slice();
    var idx1=orderedClubs.indexOf('羽毛球社');
    var idx2=orderedClubs.indexOf('合唱社团');
    if(idx1>=0&&idx2>=0){
        var tmp=orderedClubs[idx1];
        orderedClubs[idx1]=orderedClubs[idx2];
        orderedClubs[idx2]=tmp;
    }
    orderedClubs.forEach(function(cn){
        h+='<div class="sb-club-chip'+(cn===currentClub?' active':'')+'" onclick="switchClub(\''+esc(cn).replace(/'/g,"\\'")+'\')">'+esc(cn)+'</div>';
    });
    box.innerHTML=h;
}

function switchClub(cn){
    currentClub=cn;
    if(window.currentUser)window.currentUser.clubName=cn;
    renderClubSwitch();
    var sbUser=document.getElementById('sbUser');
    if(sbUser){
        var clubEl=sbUser.querySelector('.sb-uclub');
        if(clubEl)clubEl.textContent=cn;
    }
    var descEl=document.querySelector('#page-memberAnalysis .pg-desc');
    if(descEl)descEl.textContent=cn+' · 成员数据可视化';
    var cadresDescEl=document.querySelector('#page-cadres .pg-desc');
    if(cadresDescEl)cadresDescEl.textContent=cn+' · 管理社团骨干成员';
    var cadresPageActive=document.querySelector('#page-cadres.active');
    if(cadresPageActive)loadCadres();
    var jointIframe=document.querySelector('#page-joint iframe');
    if(jointIframe){
        jointIframe.onload=function(){if(window.innerWidth<=768){try{var d=this.contentDocument||this.contentWindow.document;this.style.height=d.documentElement.scrollHeight+'px'}catch(e){}}};
        jointIframe.src='/club-tools.html?panel=joint&club='+encodeURIComponent(cn)+'&t='+Date.now();
    }
    var recruitIframe=document.querySelector('#page-recruit iframe');
    if(recruitIframe){
        recruitIframe.onload=function(){if(window.innerWidth<=768){try{var d=this.contentDocument||this.contentWindow.document;this.style.height=d.documentElement.scrollHeight+'px'}catch(e){}}};
        recruitIframe.src='/club-tools.html?panel=recruit&club='+encodeURIComponent(cn);
    }
    var activePage=document.querySelector('.nav-item.active');
    if(activePage)switchPage(activePage.dataset.page);
}

function doLogout(){
    fetch(api+'/api/logout',{method:'POST'}).then(function(){window.location.replace('/')});
}

function buildPages(){
    var pages={
        home:teacherHomePage(),
        checkin:checkinPage(),
        activity:activityPage(),
        guidance:guidancePage(),
        recruit:recruitPage(),
        cadres:cadresPage(),
        memberAnalysis:memberAnalysisPage(),
        adminNotify:teacherAdminNotifyPage(),
        finance:financePage(),
        scoringReview:scoringReviewPage(),
        feedback:feedbackPage(),
        clubInvite:clubInvitePage(),
        clubHome:clubHomePage(),
        joint:'<div class="pg-title">联合活动广场</div><div class="pg-desc">社团合作与交流</div><iframe src="/club-tools.html?panel=joint&club='+encodeURIComponent(currentClub||'')+'" class="iframe-wrap"></iframe>',
        personal:personalPage()
    };
    var main=document.getElementById('mainArea');
    var h='';
    for(var id in pages){
        h+='<div class="page'+(id==='home'?' active':'')+'" id="page-'+id+'">'+pages[id]+'</div>';
    }
    main.innerHTML=h;
    ['joint','recruit'].forEach(function(pid){
        var iframe=document.querySelector('#page-'+pid+' iframe');
        if(iframe){
            iframe.onload=function(){if(window.innerWidth<=768){try{var d=this.contentDocument||this.contentWindow.document;this.style.height=d.documentElement.scrollHeight+'px'}catch(e){}}};
        }
    });
}

window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='resize-iframe'){
        var iframes=document.querySelectorAll('#page-joint iframe, #page-recruit iframe');
        for(var i=0;i<iframes.length;i++){
            if(iframes[i].contentWindow===e.source){
                if(window.innerWidth<=768) iframes[i].style.height=e.data.height+'px';
                break;
            }
        }
    }
});

function teacherHomePage(){
    return '<div class="carousel" id="homeCarousel">'+
    '<div class="carousel-track" id="carouselTrack"></div>'+
    '<button class="carousel-arrow prev" onclick="carouselPrev()">‹</button>'+
    '<button class="carousel-arrow next" onclick="carouselNext()">›</button>'+
    '<div class="carousel-dots" id="carouselDots"></div>'+
    '</div>'+
    '<div class="cols-2" style="margin-bottom:24px">'+
    '<div class="card"><div class="card-title">📰 热点资讯</div><div id="homeNews" class="club-news" style="max-height:400px;overflow-y:auto"><div class="empty">加载中...</div></div></div>'+
    '<div class="card"><div class="card-title">🌟 优秀社团活动</div><div id="homeActivities" class="club-news" style="max-height:400px;overflow-y:auto"><div class="empty">加载中...</div></div></div>'+
    '</div>'+
    '<div class="card"><div class="card-title">🏫 优秀社团</div><div id="homeExcellentClubs" class="excellent-clubs"><div class="empty">加载中...</div></div></div>';
}

var carouselSlides=[];
var carouselIdx=0;
var carouselTimer=null;
var carouselTransitioning=false;

function loadTeacherHomeData(){
    fetch(api+'/api/notices').then(function(r){return r.json()}).then(function(res){
        var box=document.getElementById('homeNews');if(!box)return;
        if(!res.success||!res.data||!res.data.length){box.innerHTML='<div class="empty">暂无资讯</div>';return}
        var h='';res.data.slice(0,8).forEach(function(n){
            h+='<div class="cn-item" style="cursor:pointer" onclick="showNoticeDetail(\''+n.id+'\')">';
            h+='<div class="cn-title">';
            if(n.isTop)h+='<span style="background:linear-gradient(135deg,#fd79a8,#e84393);color:#fff;padding:1px 5px;border-radius:3px;font-size:0.6em;margin-right:4px">置顶</span>';
            h+=esc(n.title)+'</div><div class="cn-meta">'+esc(n.time||'')+'</div></div>';
        });box.innerHTML=h;
    });
    fetch(api+'/api/excellent-activities').then(function(r){return r.json()}).then(function(res){
        var box=document.getElementById('homeActivities');if(!box)return;
        if(res.success&&res.data&&res.data.length){
            var h='';res.data.forEach(function(d){
                var emblemHtml='<span style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:0.88em;color:#fff;flex-shrink:0">'+esc((d.clubName||'社')[0])+'</span>';
                if(d.emblemUrl){emblemHtml='<img src="'+d.emblemUrl+'" style="width:32px;height:32px;border-radius:8px;object-fit:cover;flex-shrink:0" />'}
                h+='<div class="cn-item" style="cursor:pointer;display:flex;align-items:center;gap:10px" onclick="showMaterialDetail(\''+esc(d.groupId)+'\')">';
                h+=emblemHtml;
                h+='<div style="flex:1;min-width:0"><div class="cn-title">'+esc(d.title||d.clubName+'的活动')+'</div><div class="cn-meta">'+esc(d.clubName||'')+' · '+esc(d.time||'')+'</div></div></div>';
            });box.innerHTML=h;
        }else{
            fetch(api+'/api/all-materials').then(function(r2){return r2.json()}).then(function(res2){
                if(!res2.success||!res2.data||!res2.data.length){box.innerHTML='<div class="empty">暂无活动</div>';return}
                var approved=res2.data.filter(function(m){return m.status==='approved'}).slice(0,8);
                if(!approved.length){box.innerHTML='<div class="empty">暂无优秀活动</div>';return}
                var h='';approved.forEach(function(m){
                    h+='<div class="cn-item" style="cursor:pointer;display:flex;align-items:center;gap:10px" onclick="showMaterialDetail(\''+esc(m.groupId)+'\')">';
                    h+='<span style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:0.88em;color:#fff;flex-shrink:0">'+esc((m.clubName||'社')[0])+'</span>';
                    h+='<div style="flex:1;min-width:0"><div class="cn-title">'+esc(m.title||m.clubName+'的活动')+'</div><div class="cn-meta">'+esc(m.clubName||'')+' · '+esc(m.time||'')+'</div></div></div>';
                });box.innerHTML=h;
            });
        }
    });
    fetch(api+'/api/excellent-clubs').then(function(r){return r.json()}).then(function(res){
        var box=document.getElementById('homeExcellentClubs');if(!box)return;
        if(!res.success||!res.data||!res.data.length){box.innerHTML='<div class="empty">暂无优秀社团</div>';return}
        var h='';res.data.forEach(function(d){
            var emblem='<span>'+esc((d.clubName||'社')[0])+'</span>';
            if(d.emblemUrl)emblem='<img src="'+d.emblemUrl+'" />';
            h+='<div class="ec-card" onclick="showClubIntro(\''+esc(d.clubName).replace(/'/g,"\\'")+'\')">';
            h+='<div class="ec-emblem">'+emblem+'</div>';
            h+='<div class="ec-name">'+esc(d.clubName)+'</div>';
            if(d.starRating&&d.starRating>0)h+='<div style="color:#f39c12;font-size:0.72em;margin-top:2px">'+'★'.repeat(d.starRating)+'☆'.repeat(5-d.starRating)+'</div>';
            h+='</div>';
        });box.innerHTML=h;
    });
    fetch(api+'/api/showcase').then(function(r){return r.json()}).then(function(res){
        carouselSlides=[];
        if(res.success&&res.data&&res.data.length){
            res.data.forEach(function(s){carouselSlides.push({title:s.clubName,desc:s.description||'',img:s.imageUrl||''})});
        }
        if(!carouselSlides.length){
            carouselSlides=[{title:'欢迎来到云智社联',desc:'发现精彩社团活动',img:''}];
        }
        renderCarousel();
        startCarouselTimer();
    });
}

function renderCarousel(){
    var track=document.getElementById('carouselTrack');if(!track)return;
    var dots=document.getElementById('carouselDots');if(!dots)return;
    if(carouselSlides.length<=1){
        var h='';carouselSlides.forEach(function(s){
            var bg=s.img?'background-image:url('+api+s.img+')':'background:linear-gradient(135deg,#00b894,#55efc4)';
            h+='<div class="carousel-slide" style="'+bg+'"><div class="cs-overlay"><div class="cs-title">'+esc(s.title)+'</div>';
            if(s.desc)h+='<div class="cs-desc">'+safeHtml(s.desc)+'</div>';
            h+='</div></div>';
        });track.innerHTML=h;dots.innerHTML='';return;
    }
    var h='';
    var last=carouselSlides[carouselSlides.length-1];
    var bgL=last.img?'background-image:url('+api+last.img+')':'background:linear-gradient(135deg,#00b894,#55efc4)';
    h+='<div class="carousel-slide" style="'+bgL+'"><div class="cs-overlay"><div class="cs-title">'+esc(last.title)+'</div>';
    if(last.desc)h+='<div class="cs-desc">'+safeHtml(last.desc)+'</div>';
    h+='</div></div>';
    carouselSlides.forEach(function(s){
        var bg=s.img?'background-image:url('+api+s.img+')':'background:linear-gradient(135deg,#00b894,#55efc4)';
        h+='<div class="carousel-slide" style="'+bg+'"><div class="cs-overlay"><div class="cs-title">'+esc(s.title)+'</div>';
        if(s.desc)h+='<div class="cs-desc">'+safeHtml(s.desc)+'</div>';
        h+='</div></div>';
    });
    var first=carouselSlides[0];
    var bgF=first.img?'background-image:url('+api+first.img+')':'background:linear-gradient(135deg,#00b894,#55efc4)';
    h+='<div class="carousel-slide" style="'+bgF+'"><div class="cs-overlay"><div class="cs-title">'+esc(first.title)+'</div>';
    if(first.desc)h+='<div class="cs-desc">'+safeHtml(first.desc)+'</div>';
    h+='</div></div>';
    track.innerHTML=h;
    var dh='';carouselSlides.forEach(function(_,i){
        dh+='<div class="carousel-dot'+(i===0?' active':'')+'" onclick="carouselGo('+i+')"></div>';
    });dots.innerHTML=dh;
    carouselGo(0,true);
    track.addEventListener('transitionend',function(){
        carouselTransitioning=false;
        if(carouselIdx===carouselSlides.length){
            track.style.transition='none';
            carouselIdx=0;
            track.style.transform='translateX(0%)';
            track.offsetHeight;
            track.style.transition='transform .5s ease';
            updateCarouselDots();
        }else if(carouselIdx===-1){
            track.style.transition='none';
            carouselIdx=carouselSlides.length-1;
            track.style.transform='translateX(-'+carouselIdx*100+'%)';
            track.offsetHeight;
            track.style.transition='transform .5s ease';
            updateCarouselDots();
        }
    });
}

function updateCarouselDots(){
    var realIdx=carouselIdx;
    if(realIdx<0)realIdx=carouselSlides.length-1;
    if(realIdx>=carouselSlides.length)realIdx=0;
    document.querySelectorAll('.carousel-dot').forEach(function(d,i){d.classList.toggle('active',i===realIdx)});
}

function carouselGo(idx,instant){
    carouselIdx=idx;
    var track=document.getElementById('carouselTrack');if(!track)return;
    if(instant){
        track.style.transition='none';
        track.style.transform='translateX(-'+(idx+1)*100+'%)';
        track.offsetHeight;
        track.style.transition='transform .5s ease';
    }else{
        carouselTransitioning=true;
        track.style.transform='translateX(-'+(idx+1)*100+'%)';
    }
    updateCarouselDots();
}
function carouselPrev(){if(carouselTransitioning)return;carouselGo(carouselIdx-1);resetCarouselTimer()}
function carouselNext(){if(carouselTransitioning)return;carouselGo(carouselIdx+1);resetCarouselTimer()}
function startCarouselTimer(){carouselTimer=setInterval(function(){if(!carouselTransitioning)carouselNext()},8000)}
function resetCarouselTimer(){clearInterval(carouselTimer);startCarouselTimer()}

    var url=api+'/api/club-cadres';
    if(currentClub)url+='?club='+encodeURIComponent(currentClub);
    fetch(url).then(function(r){return r.json()}).then(function(res){
        if(res.error){var box=document.getElementById('cadreList');if(box)box.innerHTML='<div class="empty">'+esc(res.error)+'</div>';return}
        var list=res.data||[];

function addCadre(){
    var name=document.getElementById('cadreName').value.trim();
    var sid=document.getElementById('cadreSid').value.trim();
    if(!name||!sid){toast('请填写姓名和学号','error');return}
    if(!currentClub){toast('未关联社团，无法添加骨干','error');return}

function loadCheckinSessions(){
    if(!currentClub&&!myClubs.length)return;
    var clubs=currentClub?[currentClub]:myClubs;
    var allSessions=[];
    var pending=clubs.length;
    clubs.forEach(function(cn){
        fetch(api+'/api/checkin-sessions?club='+encodeURIComponent(cn)).then(function(r){return r.json()}).then(function(res){
            if(res.success&&res.data){
                res.data.forEach(function(s){allSessions.push(s)});
            }
            pending--;
            if(pending===0)renderCheckinSessions(allSessions);
        }).catch(function(){
            pending--;
            if(pending===0)renderCheckinSessions(allSessions);
        });
    });
}

function renderCheckinSessions(sessions){
    var openH='',closedH='';
    sessions.sort(function(a,b){return b.id-a.id});
    var openSessions=sessions.filter(function(s){return s.status==='open'});
    window._teacherOpenSessions=openSessions;
    var quickBox=document.getElementById('checkinQuickAction');
    if(quickBox&&openSessions.length){
        var qh='<div style="background:linear-gradient(135deg,rgba(0,184,148,0.06),rgba(85,239,196,0.06));border:1.5px solid rgba(0,184,148,0.15);border-radius:14px;padding:18px">';
        qh+='<div style="font-size:0.94em;font-weight:700;color:#1a1a2e;margin-bottom:10px">🔔 当前有 '+openSessions.length+' 个活动正在进行</div>';
        openSessions.forEach(function(s){
            qh+='<div id="quickAct-'+s.id+'" style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border:1px solid #d1fae5;border-radius:10px;margin-bottom:6px;flex-wrap:wrap">';
            qh+='<span style="font-size:0.84em;font-weight:600;color:#00b894;cursor:pointer" onclick="toggleCheckinSession('+s.id+')">✅ '+esc(s.activityName||'未命名活动')+' <span style="color:#a0a3bd;font-weight:400">('+esc(s.clubName||'')+')</span></span>';
            qh+='<span id="quickActStatus-'+s.id+'" style="font-size:0.76em;color:#a0a3bd">加载中...</span>';
            qh+='</div>';
        });
        qh+='</div>';
        quickBox.innerHTML=qh;
        // Load teacher checkin status for each open session
        openSessions.forEach(function(s){
            fetch(api+'/api/teacher-checkin-status?sessionId='+s.id).then(function(r){return r.json()}).then(function(res){
                if(!res.success)return;
                var statusLine=document.getElementById('quickActStatus-'+s.id);
                if(!statusLine)return;
                var row=document.getElementById('quickAct-'+s.id);
                if(res.status==='none'){
                    statusLine.innerHTML='<span style="color:#f39c12">⏳ 未签到</span>';
                    if(row){
                        var btn=document.createElement('button');
                        btn.className='btn btn-primary btn-sm';
                        btn.style.cssText='margin-left:auto;padding:4px 14px;font-size:0.78em';
                        btn.textContent='✅ 签到';
                        btn.onclick=function(){toggleCheckinSession(s.id)};
                        row.appendChild(btn);
                    }
                }else if(res.status==='checked_in'){
                    statusLine.innerHTML='<span style="color:#00b894">已签到</span>';
                }else if(res.status==='checked_out'){
                    statusLine.innerHTML='<span style="color:#667eea">已签退</span>';
                }
            });
        });
    }else if(quickBox){
        quickBox.innerHTML='';
    }
    sessions.forEach(function(s){
        if(s.status!=='open'){
            var sessionDate=new Date(s.time);
            if(isNaN(sessionDate.getTime()))sessionDate=new Date(s.createdAt||'');
            if(!isNaN(sessionDate.getTime())){
                var now=new Date();
                var diffMs=now-sessionDate;
                var diffDays=diffMs/(1000*60*60*24);
                if(diffDays>7)return;
            }
        }
        var isExpired=false;
        if(s.status==='open'){
            var endTime=s.endTime||'';
            if(!endTime&&s.activityTime){
                var parts=s.activityTime.split('~');
                if(parts.length>1)endTime=parts[parts.length-1].trim();
            }
            if(endTime){
                var et=new Date(endTime.replace(/-/g,'/'));
                if(!isNaN(et.getTime())&&et<new Date())isExpired=true;
            }
        }
        var statusCls=(s.status==='open'&&!isExpired)?'open':'closed';
        var statusText='';
        if(s.status==='open'&&isExpired){
            statusText='⏹ 活动已结束';
        }else if(s.status==='open'){
            statusText='🟢 进行中';
        }else if(s.isCompleted){
            statusText='✅ 已完成';
        }else{
            statusText='⏹ 已结束';
        }
        var methodTag=s.checkinMethod==='code'?'🔢 签到码':s.checkinMethod==='location'?'📍 定位':'📱 二维码';
        var row='<div class="session-row" id="csRow-'+s.id+'" onclick="if(event.target.closest(\'input,select,textarea,button,a,.checkin-action-area,.session-detail\'))return;toggleCheckinSession('+s.id+')">';
        row+='<div class="session-info">';
        row+='<div><div class="session-name">'+esc(s.activityName||'未命名活动')+'</div>';
        row+='<div class="session-meta">';
        row+='<span>🏫 '+esc(s.clubName||'')+'</span>';
        row+='<span>'+methodTag+'</span>';
        if(s.locationName)row+='<span>📍 '+esc(s.locationName)+'</span>';
        if(s.activityTime)row+='<span>📅 '+esc(s.activityTime)+'</span>';
        row+='<span>🕐 '+s.time+'</span>';
        row+='</div></div>';
        row+='<div class="session-status '+statusCls+'">'+statusText+'</div>';
        row+='</div>';
        row+='<div class="session-detail" id="csDetail-'+s.id+'" onclick="event.stopPropagation()"></div>';
        row+='</div>';
        if(s.status==='open'&&!isExpired)openH+=row;
        else closedH+=row;
    });
    document.getElementById('openSessionList').innerHTML=openH||'<div class="empty">暂无进行中的活动</div>';
    document.getElementById('closedSessionList').innerHTML=closedH||'<div class="empty">暂无已结束的活动</div>';
}

function toggleCheckinSession(sid){
    var detail=document.getElementById('csDetail-'+sid);
    var row=document.getElementById('csRow-'+sid);
    if(!detail)return;
    var isShown=detail.classList.contains('show');
    document.querySelectorAll('.session-detail').forEach(function(d){d.classList.remove('show')});
    document.querySelectorAll('.session-row').forEach(function(r){r.classList.remove('active')});
    if(!isShown){
        detail.classList.add('show');
        row.classList.add('active');
        loadCheckinSessionDetail(sid);
    }
}

function loadCheckinSessionDetail(sid){
    var detail=document.getElementById('csDetail-'+sid);
    if(!detail)return;
    var clubs=myClubs.length?myClubs:[currentClub];
    var found=null;
    var pending=clubs.length;
    clubs.forEach(function(cn){
        if(found)return;
        fetch(api+'/api/checkin-sessions?club='+encodeURIComponent(cn)).then(function(r){return r.json()}).then(function(res){
            if(found)return;
            if(res.success&&res.data){
                var session=res.data.find(function(s){return String(s.id)===String(sid)});
                if(session){found=session}
            }
            pending--;
            if(pending===0||found){
                if(!found){detail.innerHTML='<div class="empty">会话不存在</div>';return}
                renderCheckinSessionDetail(found,detail);
            }
        }).catch(function(){
            pending--;
            if(pending===0&&!found){detail.innerHTML='<div class="empty">会话不存在</div>'}
        });
    });
}

var cachedLocation={lat:0,lng:0,ready:false,address:''};
var locationWatchId=null;
var locationError='';
var isSecureContext=window.isSecureContext;

// WGS-84 → GCJ-02 坐标转换
function wgs84ToGcj02(lat,lng){
    var PI=Math.PI;var a=6378245.0;var ee=0.00669342162296594323;
    if(lng<72.004||lng>137.8347||lat<0.8293||lat>55.8271){return {lat:lat,lng:lng}}
    var dLat=_tLat(lng-105.0,lat-35.0);var dLng=_tLng(lng-105.0,lat-35.0);
    var radLat=lat/180.0*PI;var magic=Math.sin(radLat);magic=1-ee*magic*magic;var sqrtMagic=Math.sqrt(magic);
    dLat=(dLat*180.0)/((a*(1-ee))/(magic*sqrtMagic)*PI);dLng=(dLng*180.0)/(a/sqrtMagic*Math.cos(radLat)*PI);
    return {lat:lat+dLat,lng:lng+dLng};
}
function _tLat(x,y){var r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;r+=(20*Math.sin(y*Math.PI)+40*Math.sin(y/3*Math.PI))*2/3;r+=(160*Math.sin(y/12*Math.PI)+320*Math.sin(y*Math.PI/30))*2/3;return r}
function _tLng(x,y){var r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;r+=(20*Math.sin(x*Math.PI)+40*Math.sin(x/3*Math.PI))*2/3;r+=(150*Math.sin(x/12*Math.PI)+300*Math.sin(x/30*Math.PI))*2/3;return r}

function startLocationWatch(){
    if(!navigator.geolocation){
        locationError='浏览器不支持定位功能';
        return;
    }
    if(!isSecureContext){
        locationError='定位需要HTTPS安全环境，当前为HTTP访问，定位功能不可用。请使用 https:// 访问或使用 localhost';
        return;
    }
    var opts={enableHighAccuracy:true,timeout:15000,maximumAge:0};
    navigator.geolocation.getCurrentPosition(function(pos){
        var gcj=wgs84ToGcj02(pos.coords.latitude,pos.coords.longitude);
        cachedLocation={lat:gcj.lat,lng:gcj.lng,ready:true,address:''};
        locationError='';
        reverseGeocode(gcj.lat,gcj.lng,function(addr){
            if(addr)cachedLocation.address=addr;
            refreshAllLocHints();
        });
        refreshAllLocHints();
    },function(err){
        cachedLocation.ready=false;
        if(err.code===1)locationError='定位权限被拒绝，请在浏览器设置中允许定位权限';
        else if(err.code===2)locationError='无法获取位置信息，请检查设备定位是否开启';
        else if(err.code===3)locationError='定位超时，请稍后重试';
        else locationError='定位失败，错误码：'+err.code;
        refreshAllLocHints();
    },opts);
    if(locationWatchId!==null){navigator.geolocation.clearWatch(locationWatchId)}
    locationWatchId=navigator.geolocation.watchPosition(function(pos){
        var gcj=wgs84ToGcj02(pos.coords.latitude,pos.coords.longitude);
        cachedLocation={lat:gcj.lat,lng:gcj.lng,ready:true,address:''};
        locationError='';
        reverseGeocode(gcj.lat,gcj.lng,function(addr){
            if(addr)cachedLocation.address=addr;
            refreshAllLocHints();
        });
        refreshAllLocHints();
    },function(err){
        cachedLocation.ready=false;
        if(err.code===1)locationError='定位权限被拒绝，请在浏览器设置中允许定位权限';
        else if(err.code===2)locationError='无法获取位置信息，请检查设备定位是否开启';
        else if(err.code===3)locationError='定位超时，请稍后重试';
        else locationError='定位失败';
        refreshAllLocHints();
    },opts);
}

function refreshAllLocHints(){

function reverseGeocode(lat,lng,callback){
    var url='https://restapi.amap.com/v3/geocode/regeo?key=2454fd77342fd22574cbe266eb5c647b&location='+lng+','+lat+'&extensions=all&output=JSON';
    console.log('[逆地理编码] 请求URL:', url);
    fetch(url).then(function(r){return r.json()}).then(function(res){
        console.log('[逆地理编码] 返回数据:', JSON.stringify(res));
        if(res.status==='1'&&res.regeocode){
            var addr=res.regeocode.formatted_address||'';
            var comp=res.regeocode.addressComponent||{};
            var nb=comp.neighborhood||{};
            if(typeof nb==='object'&&nb.name){addr+='（附近：'+nb.name+'）'}
            else if(typeof nb==='string'&&nb){addr+='（附近：'+nb+'）'}
            console.log('[逆地理编码] 解析地址:', addr);
            callback(addr);
        }else{
            console.warn('[逆地理编码] 接口返回失败:', res);
            // 备用：通过后端代理
            fetch(api+'/api/reverse-geocode?lat='+lat+'&lng='+lng).then(function(r2){return r2.json()}).then(function(res2){
                if(res2.success&&res2.address){callback(res2.address)}else{callback('')}
            }).catch(function(){callback('')});
        }
    }).catch(function(err){
        console.error('[逆地理编码] 请求失败:', err);
        // 备用：通过后端代理
        fetch(api+'/api/reverse-geocode?lat='+lat+'&lng='+lng).then(function(r2){return r2.json()}).then(function(res2){
            if(res2.success&&res2.address){callback(res2.address)}else{callback('')}
        }).catch(function(){callback('')});
    });
}

var sessionLocations={};

function haversineDistance(lat1,lng1,lat2,lng2){
    var R=6371000;
    var dLat=(lat2-lat1)*Math.PI/180;
    var dLng=(lng2-lng1)*Math.PI/180;
    var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function getLocation(sid){
    var hint=document.getElementById('locHint-'+sid);
    var checkinBtn=document.getElementById('checkinBtn-'+sid);
    var checkoutBtn=document.getElementById('checkoutBtn-'+sid);
    var directCheckoutBtn=document.getElementById('directCheckoutBtn-'+sid);
    if(!hint)return;
    if(cachedLocation.ready){
        var addrText=cachedLocation.address?' ('+esc(cachedLocation.address)+')':'';
        var info='📍 已获取位置 <span class="loc-ok">✔</span>'+addrText;
        info+='<br/><span style="font-size:0.9em;color:#6b6d8a">经纬度：'+cachedLocation.lat.toFixed(4)+', '+cachedLocation.lng.toFixed(4)+'</span>';
        var sloc=sessionLocations[sid];
        if(sloc&&sloc.lat&&sloc.lng){
            var dist=haversineDistance(cachedLocation.lat,cachedLocation.lng,sloc.lat,sloc.lng);
            info+='<br/><span style="font-size:0.9em;color:'+(dist>500?'#e74c3c':'#00b894')+'">距离签到点：'+Math.round(dist)+' 米</span>';
        }
        hint.innerHTML=info;
        if(checkinBtn){checkinBtn.disabled=false;checkinBtn.textContent='✅ 签到'}
        if(checkoutBtn){checkoutBtn.disabled=false;checkoutBtn.textContent='🔑 签退码签退'}
        if(directCheckoutBtn){directCheckoutBtn.disabled=false;directCheckoutBtn.textContent='🏁 直接签退'}
    }else if(locationError){
        hint.innerHTML='<span class="loc-far">⚠️ '+esc(locationError)+'</span>';
        if(checkinBtn){checkinBtn.disabled=true;checkinBtn.textContent='⚠️ 定位失败'}
        if(checkoutBtn){checkoutBtn.disabled=true;checkoutBtn.textContent='⚠️ 定位失败'}
        if(directCheckoutBtn){directCheckoutBtn.disabled=true;directCheckoutBtn.textContent='⚠️ 定位失败'}
    }else{
        hint.innerHTML='📍 正在获取位置...';
    }
}

function doTeacherCheckin(sid){
    var btn=document.getElementById('checkinBtn-'+sid);
    var hint=document.getElementById('locHint-'+sid);
    if(btn){btn.disabled=true;btn.textContent='定位中...'}
    function doCheckin(lat,lng,addr){
        showTeacherLocMap(lat,lng,addr);
        if(hint){hint.innerHTML='<span style="color:#00b894">📍 已获取位置：'+esc(addr||'经纬度:'+lat.toFixed(4)+','+lng.toFixed(4))+'</span>'}
        if(btn){btn.textContent='签到中...'}
        console.log('[老师签到] sessionId:', sid, '位置:', lat, lng, '地址:', addr);
        fetch(api+'/api/teacher-checkin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:sid,lat:lat,lng:lng,address:addr})})
        .then(function(r){
            console.log('[老师签到] 响应状态:', r.status);
            return r.json().then(function(res){return {status:r.status,data:res}}).catch(function(){return {status:r.status,data:{error:'服务器返回异常(status:'+r.status+')'}}});
        }).then(function(result){
            var res=result.data;
            console.log('[老师签到] 响应数据:', JSON.stringify(res));
            if(res.error){toast(res.error,'error');if(btn){btn.disabled=false;btn.textContent='✅ 签到'}return}
            var successMsg='签到成功！';
            if(addr){successMsg+=' 当前位置：'+addr}
            toast(successMsg,'success');
            if(hint){hint.innerHTML='<span style="color:#00b894">✅ 已签到 | 位置：'+esc(addr||'未知')+'</span>'}
            loadCheckinSessions();
        }).catch(function(err){console.error('[老师签到] 请求失败:', err);toast('签到失败，请重试','error');if(btn){btn.disabled=false;btn.textContent='✅ 签到'}});
    }
    function tryIpFallback(errMsg){
        if(btn){btn.textContent='IP定位中...'}
        if(hint)hint.innerHTML='<span style="color:#f0ad4e">⚠️ GPS定位失败，正在尝试网络定位...</span>';
        fetchIpLocation(function(ipLat,ipLng,ipAddr){
            if(ipLat!==null&&ipLng!==null){
                if(hint)hint.innerHTML='<span style="color:#f0ad4e">📍 已通过网络获取大致位置 '+esc(ipAddr||'')+'</span>';
                cachedLocation={lat:ipLat,lng:ipLng,ready:true,address:ipAddr||''};
                doCheckin(ipLat,ipLng,ipAddr||'');
            }else{
                if(hint)hint.innerHTML='<span style="color:#e74c3c">⚠️ 定位不可用，无法签到，请确保开启定位权限后重试</span>';
                if(btn){btn.disabled=false;btn.textContent='✅ 签到'}
            }
        });
    }
    if(cachedLocation.ready){
        doCheckin(cachedLocation.lat,cachedLocation.lng,cachedLocation.address||'');
    }else if(isSecureContext&&navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(pos){
            var gcj=wgs84ToGcj02(pos.coords.latitude,pos.coords.longitude);
            var lat=gcj.lat,lng=gcj.lng;
            reverseGeocode(lat,lng,function(addr){
                cachedLocation={lat:lat,lng:lng,ready:true,address:addr||''};
                doCheckin(lat,lng,addr||'');
            });
        },function(err){
            var msg=err.code===1?'定位权限被拒绝':err.code===2?'无法获取位置信息':'定位超时';
            tryIpFallback(msg);
        },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
    }else{
        tryIpFallback(isSecureContext?'浏览器不支持定位':'当前非HTTPS环境，无法使用GPS定位');
    }
}

    h+='<video id="teacherScanVideo" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover"></video>';
    h+='<canvas id="teacherScanCanvas" style="display:none"></canvas>';
    h+='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid rgba(0,184,148,0.6);border-radius:12px;pointer-events:none"></div>';

    document.body.insertAdjacentHTML('beforeend',h);
    startTeacherScanner();

function startTeacherScanner(){
    var video=document.getElementById('teacherScanVideo');
    var canvas=document.getElementById('teacherScanCanvas');
    if(!video||!canvas)return;
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
        var res=document.getElementById('teacherScanResult');
        if(res)res.innerHTML='<span style="color:#e74c3c">您的浏览器不支持摄像头扫码，请使用签到码方式</span>';
        return;
    }
    var constraints={video:{facingMode:'environment'}};
    navigator.mediaDevices.getUserMedia(constraints).then(function(stream){
        teacherScannerStream=stream;
        video.srcObject=stream;
        var playPromise=video.play();
        if(playPromise!==undefined){
            playPromise.catch(function(e){console.warn('video.play() rejected:',e.message)});
        }
        var ctx=canvas.getContext('2d');
        function scanFrame(){
            if(!teacherScannerStream){return}
            try{
                if(video.readyState>=video.HAVE_CURRENT_DATA&&video.videoWidth>0){
                    canvas.width=video.videoWidth;
                    canvas.height=video.videoHeight;
                    ctx.drawImage(video,0,0,canvas.width,canvas.height);
                    var imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
                    var code=null;
                    if(typeof jsQR==='function'){code=jsQR(imageData.data,imageData.width,imageData.height)}
                    if(code&&code.data){
                        var url=code.data;
                        var codeMatch=url.match(/code=([A-Za-z0-9]{4,6})/);
                        if(codeMatch){
                            closeTeacherScanner();
                            document.getElementById('quickCheckinCode').value=codeMatch[1];
                            quickCheckinOrCheckout();
                            return;
                        }
                        if(/^[A-Za-z0-9]{4,6}$/.test(url)){
                            closeTeacherScanner();
                            document.getElementById('quickCheckinCode').value=url;
                            quickCheckinOrCheckout();
                            return;
                        }
                    }
                }
            }catch(e){}
            teacherScannerAnim=requestAnimationFrame(scanFrame);
        }
        scanFrame();
    }).catch(function(err){
        var res=document.getElementById('teacherScanResult');
        var msg='无法打开摄像头';
        if(err.name==='NotAllowedError')msg='摄像头权限被拒绝，请在浏览器设置中允许';
        else if(err.name==='NotFoundError')msg='未检测到摄像头设备';
        else if(err.name==='NotReadableError')msg='摄像头被其他应用占用';
        else if(err.name==='OverconstrainedError')msg='摄像头不支持请求的配置';
        else if(err.message)msg+='：'+err.message;
        if(res)res.innerHTML='<span style="color:#e74c3c">'+esc(msg)+'</span>';
    });
}

function closeTeacherScanner(){
    if(teacherScannerStream){teacherScannerStream.getTracks().forEach(function(t){t.stop()});teacherScannerStream=null}
    if(teacherScannerAnim){cancelAnimationFrame(teacherScannerAnim);teacherScannerAnim=null}
    var modal=document.getElementById('teacherScannerModal');
    if(modal)modal.remove();
}

function doTeacherDirectCheckout(sid){
    var btn=document.getElementById('directCheckoutBtn-'+sid);
    var hint=document.getElementById('locHint-'+sid);
    if(btn){btn.disabled=true;btn.textContent='定位中...'}
    function doCheckout(lat,lng,addr){
        showTeacherLocMap(lat,lng,addr);
        if(hint){hint.innerHTML='<span style="color:#667eea">📍 已获取位置：'+esc(addr||'经纬度:'+lat.toFixed(4)+','+lng.toFixed(4))+'</span>'}
        if(btn){btn.textContent='签退中...'}
        fetch(api+'/api/teacher-checkout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:sid,lat:lat,lng:lng,address:addr})})
        .then(function(r){return r.json()}).then(function(res){
            if(res.error){toast(res.error,'error');if(btn){btn.disabled=false;btn.textContent='🏁 直接签退'}return}
            var checkoutMsg='签退成功！本次指导已记录';
            if(addr){checkoutMsg+=' 当前位置：'+addr}
            toast(checkoutMsg,'success');
            if(hint){hint.innerHTML='<span style="color:#667eea">✅ 已签退 | 位置：'+esc(addr||'未知')+'</span>'}
            toggleCheckinSession(sid);
            setTimeout(function(){toggleCheckinSession(sid)},100);
        }).catch(function(){toast('签退失败','error');if(btn){btn.disabled=false;btn.textContent='🏁 直接签退'}});
    }
    function tryIpFallback(errMsg){
        if(btn){btn.textContent='IP定位中...'}
        if(hint)hint.innerHTML='<span style="color:#f0ad4e">⚠️ GPS定位失败，正在尝试网络定位...</span>';
        fetchIpLocation(function(ipLat,ipLng,ipAddr){
            if(ipLat!==null&&ipLng!==null){
                if(hint)hint.innerHTML='<span style="color:#f0ad4e">📍 已通过网络获取大致位置 '+esc(ipAddr||'')+'</span>';
                cachedLocation={lat:ipLat,lng:ipLng,ready:true,address:ipAddr||''};
                doCheckout(ipLat,ipLng,ipAddr||'');
            }else{
                if(hint)hint.innerHTML='<span style="color:#e74c3c">⚠️ 定位不可用，无法签退，请确保开启定位权限后重试</span>';
                if(btn){btn.disabled=false;btn.textContent='🏁 直接签退'}
            }
        });
    }
    if(cachedLocation.ready){
        doCheckout(cachedLocation.lat,cachedLocation.lng,cachedLocation.address||'');
    }else if(isSecureContext&&navigator.geolocation){
        navigator.geolocation.getCurrentPosition(function(pos){
            var gcj=wgs84ToGcj02(pos.coords.latitude,pos.coords.longitude);
            var lat=gcj.lat,lng=gcj.lng;
            reverseGeocode(lat,lng,function(addr){
                cachedLocation={lat:lat,lng:lng,ready:true,address:addr||''};
                doCheckout(lat,lng,addr||'');
            });
        },function(err){
            var msg=err.code===1?'定位权限被拒绝':err.code===2?'无法获取位置信息':'定位超时';
            tryIpFallback(msg);
        },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
    }else{
        tryIpFallback(isSecureContext?'浏览器不支持定位':'当前非HTTPS环境，无法使用GPS定位');
    }
}

function loadActivityList(){
    if(!currentClub&&!myClubs.length)return;
    var clubs=currentClub?[currentClub]:myClubs;
    var actStart=(document.getElementById('actStartDate')||{}).value||'';
    var actEnd=(document.getElementById('actEndDate')||{}).value||'';
    var allSessions=[];
    var pending=clubs.length;
    clubs.forEach(function(cn){
        var url=api+'/api/checkin-sessions?club='+encodeURIComponent(cn);
        if(actStart)url+='&start_date='+encodeURIComponent(actStart);
        if(actEnd)url+='&end_date='+encodeURIComponent(actEnd);
        fetch(url).then(function(r){return r.json()}).then(function(res){
            if(res.success&&res.data){
                res.data.forEach(function(s){allSessions.push(s)});
            }
            pending--;
            if(pending===0){
                if(!allSessions.length){document.getElementById('allSessionList').innerHTML='<div class="empty">暂无活动记录</div>';return}
                allSessions.sort(function(a,b){return b.id-a.id});
                var h='';
                allSessions.forEach(function(s){
                    var isExpired2=false;
                    if(s.status==='open'){
                        var et2=s.endTime||'';
                        if(!et2&&s.activityTime){var p2=s.activityTime.split('~');if(p2.length>1)et2=p2[p2.length-1].trim()}
                        if(et2){var etd=new Date(et2.replace(/-/g,'/'));if(!isNaN(etd.getTime())&&etd<new Date())isExpired2=true}
                    }
                    var statusCls=(s.status==='open'&&!isExpired2)?'open':'closed';
                    var statusText='';
                    if(s.status==='open'&&isExpired2){statusText='⏹ 活动已结束'}
                    else if(s.status==='open'){statusText='🟢 进行中'}
                    else if(s.isCompleted){statusText='✅ 已完成'}
                    else{statusText='⏹ 已结束'}
                    h+='<div class="session-row" id="actRow-'+s.id+'" onclick="if(event.target.closest(\'input,select,textarea,button,a,.session-detail\'))return;toggleActivityDetail('+s.id+')">';
                    h+='<div class="session-info">';
                    h+='<div><div class="session-name">'+esc(s.activityName||'未命名活动')+'</div>';
                    h+='<div class="session-meta">';
                    h+='<span>🏫 '+esc(s.clubName||'')+'</span>';
                    if(s.locationName)h+='<span>📍 '+esc(s.locationName)+'</span>';
                    if(s.activityTime)h+='<span>📅 '+esc(s.activityTime)+'</span>';
                    h+='<span>🕐 '+s.time+'</span>';
                    h+='</div></div>';
                    h+='<div class="session-status '+statusCls+'">'+statusText+'</div>';
                    h+='</div>';
                    h+='<div class="session-detail" id="actDetail-'+s.id+'" onclick="event.stopPropagation()"></div>';
                    h+='</div>';
                });
                document.getElementById('allSessionList').innerHTML=h;
            }
        });
    });
}

function toggleActivityDetail(sid){
    var detail=document.getElementById('actDetail-'+sid);
    var row=document.getElementById('actRow-'+sid);
    if(!detail)return;
    var isShown=detail.classList.contains('show');
    document.querySelectorAll('#allSessionList .session-detail').forEach(function(d){d.classList.remove('show')});
    document.querySelectorAll('#allSessionList .session-row').forEach(function(r){r.classList.remove('active')});
    if(!isShown){
        detail.classList.add('show');
        row.classList.add('active');
        loadActivitySessionDetail(sid);
    }
}

function loadActivitySessionDetail(sid){
    var detail=document.getElementById('actDetail-'+sid);
    var clubs=currentClub?[currentClub]:myClubs;
    var found=null;
    var pending=clubs.length;
    clubs.forEach(function(cn){
        if(found)return;
        fetch(api+'/api/checkin-sessions?club='+encodeURIComponent(cn)).then(function(r){return r.json()}).then(function(res){
            if(found)return;
            if(!res.success||!res.data)return;
            var session=res.data.find(function(s){return String(s.id)===String(sid)});
            if(session){found=session}
            pending--;
            if(pending===0||found){
                if(!found){detail.innerHTML='<div class="empty">会话不存在</div>';return}
                var h='<div style="margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f8">';
                if(found.activityContent)h+='<div style="font-size:0.82em;color:#4a4d6a;background:#fafaff;padding:8px 12px;border-radius:8px;margin-bottom:8px;line-height:1.6"><strong>📝 活动内容：</strong>'+escHtml(found.activityContent.substring(0,500))+'</div>';
                if(found.planText||found.planPath){
                    h+='<div style="margin-bottom:8px">';
                    if(found.planPath){
                        var planFn2=found.planPath.replace(/^.*[\\\/]/,'');
                        h+='<a href="'+api+'/api/activity-plan-file/'+encodeURIComponent(planFn2)+'" target="_blank" style="display:inline-block;font-size:0.82em;color:#667eea;text-decoration:none;padding:6px 14px;background:rgba(102,126,234,0.06);border-radius:8px;border:1px solid rgba(102,126,234,0.15)">📎 下载活动计划文件</a>';
                    }else{
                        h+='<button class="btn btn-sm" style="font-size:0.82em;color:#667eea;background:rgba(102,126,234,0.06);border:1px solid rgba(102,126,234,0.15);padding:6px 14px;border-radius:8px;cursor:pointer" onclick="downloadPlanText('+found.id+')">📎 下载活动计划</button>';
                    }
                    h+='</div>';
                }
                if(found.summaryText||found.summaryPath){
                    h+='<div style="margin-bottom:8px">';
                    if(found.summaryPath){
                        var summaryFn2=found.summaryPath.replace(/^.*[\\\/]/,'');
                        h+='<a href="'+api+'/api/activity-summary-file/'+encodeURIComponent(summaryFn2)+'" target="_blank" style="display:inline-block;font-size:0.82em;color:#00b894;text-decoration:none;padding:6px 14px;background:rgba(0,184,148,0.06);border-radius:8px;border:1px solid rgba(0,184,148,0.15)">📎 下载活动总结文件</a>';
                    }else{
                        h+='<button class="btn btn-sm" style="font-size:0.82em;color:#00b894;background:rgba(0,184,148,0.06);border:1px solid rgba(0,184,148,0.15);padding:6px 14px;border-radius:8px;cursor:pointer" onclick="downloadSummaryText('+found.id+')">📎 下载活动总结</button>';
                    }
                    h+='</div>';
                }
                if(found.completionPhoto){
                    var photoFn=found.completionPhoto.replace(/^.*[\\\/]/,'');
                    h+='<div style="margin-top:8px"><img src="'+api+'/api/activity-photo/'+encodeURIComponent(photoFn)+'" style="max-width:240px;max-height:180px;border-radius:8px;border:1px solid #eee;cursor:pointer" onclick="showImageModal(this.src)" /></div>';
                }
                h+='</div>';
                detail.innerHTML=h;
            }
        });
    });
}

function loadGuidanceStats(){
    var gdStart=(document.getElementById('gdStartDate')||{}).value||'';
    var gdEnd=(document.getElementById('gdEndDate')||{}).value||'';
    var dp='';
    if(currentClub)dp+=(dp?'&':'')+'club='+encodeURIComponent(currentClub);
    if(gdStart)dp+=(dp?'&':'')+'start_date='+encodeURIComponent(gdStart);
    if(gdEnd)dp+=(dp?'&':'')+'end_date='+encodeURIComponent(gdEnd);
    fetch(api+'/api/teacher-guidance-stats?'+dp,{cache:'no-store'}).then(function(r){return r.json()}).then(function(res){
        if(!res.success)return;
        var data=res.data||{};
        var total=data.totalGuidance||0;
        var totalClubs=Object.keys(data.byClub||{}).length;
        var thisMonth=data.thisMonth||0;
        var totalHours=data.totalHours||0;
        document.getElementById('guidanceStatGrid').innerHTML=
            '<div class="stat-card"><div class="sc-num">'+total+'</div><div class="sc-label">总指导次数</div></div>'+
            '<div class="stat-card"><div class="sc-num">'+totalClubs+'</div><div class="sc-label">指导社团数</div></div>'+
            '<div class="stat-card"><div class="sc-num">'+thisMonth+'</div><div class="sc-label">本月指导次数</div></div>'+
            '<div class="stat-card"><div class="sc-num">'+totalHours+'</div><div class="sc-label">指导时长(h)</div></div>';
        renderGuidanceCharts(data);
    });
    fetch(api+'/api/teacher-guidance-records?'+dp,{cache:'no-store'}).then(function(r){return r.json()}).then(function(res){
        if(!res.success||!res.data||!res.data.length){document.getElementById('guidanceRecordList').innerHTML='<div class="empty">暂无指导记录</div>';return}
        var h='';
        res.data.forEach(function(rec){
            h+='<div class="session-row" style="cursor:default">';
            h+='<div class="session-info">';
            h+='<div><div class="session-name">'+esc(rec.activityName||'活动指导')+'</div>';
            h+='<div class="session-meta">';
            h+='<span>🏫 '+esc(rec.clubName||'')+'</span>';
            if(rec.checkinTime)h+='<span>签到：'+esc(rec.checkinTime)+'</span>';
            if(rec.checkoutTime)h+='<span>签退：'+esc(rec.checkoutTime)+'</span>';
            h+='</div></div>';
            h+='<span class="checkin-status-tag checked_out">✅ 已完成</span>';
            h+='</div></div>';
        });
        document.getElementById('guidanceRecordList').innerHTML=h;
    });
}

function renderGuidanceCharts(data){
    var byClub=data.byClub||{};
    var byMonth=data.byMonth||{};
    var clubLabels=Object.keys(byClub);
    var clubValues=clubLabels.map(function(k){return byClub[k]});
    var monthLabels=Object.keys(byMonth).sort();
    var monthValues=monthLabels.map(function(k){return byMonth[k]});
    if(guidanceChart)guidanceChart.destroy();
    if(guidanceClubChartInstance)guidanceClubChartInstance.destroy();
    guidanceChart=null;
    guidanceClubChartInstance=null;
    var trendCtx=document.getElementById('guidanceTrendChart');
    if(trendCtx&&monthLabels.length){
        guidanceChart=new Chart(trendCtx,{type:'line',data:{labels:monthLabels,datasets:[{label:'指导次数',data:monthValues,borderColor:'#00b894',backgroundColor:'rgba(0,184,148,0.1)',fill:true,tension:0.4,pointBackgroundColor:'#00b894'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
    }
    var clubCtx=document.getElementById('guidanceClubChart');
    if(clubCtx&&clubLabels.length){
        guidanceClubChartInstance=new Chart(clubCtx,{type:'doughnut',data:{labels:clubLabels,datasets:[{data:clubValues,backgroundColor:['#00b894','#667eea','#f39c12','#e84393','#0984e3','#6c5ce7','#fdcb6e','#74b9ff']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});
    }
}

function loadFinanceRecords(){

        document.getElementById('financeSummary').innerHTML=
            '<div class="fs-card income"><div class="fs-num income">'+(summary.totalIncome||0).toFixed(2)+'</div><div class="fs-label">总收入</div></div>'+

        records.forEach(function(r){
            h+='<div class="finance-row">';
            h+='<span class="fr-type '+r.type+'">'+(r.type==='income'?'收入':'支出')+'</span>';
            h+='<div class="fr-info"><div class="fr-cat">'+esc(r.category||'')+'</div>';
