function submitWarn(sid){
    var reason=document.getElementById('warnReasonInput').value.trim();
    if(!reason){toast('请填写警告原因','error');return}
    fetch(api+'/api/activity-warning/'+sid,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'warn',reason:reason})}).then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('已发送警告','success');
        var modal=document.getElementById('activityWarnModal');if(modal)modal.remove();
        _allActivities=[];
        loadAdminActivityList();
    }).catch(function(){toast('操作失败','error')});
}

function unwarnActivity(sid){
    if(!confirm('确定撤销该活动的警告？'))return;
    fetch(api+'/api/activity-warning/'+sid,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'unwarn'})}).then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('已撤销警告','success');
        _allActivities=[];
        loadAdminActivityList();
    }).catch(function(){toast('操作失败','error')});
}

var umDebounceTimer=null;
function debounceLoadAdminUsers(){
    clearTimeout(umDebounceTimer);
    umDebounceTimer=setTimeout(function(){loadAdminUsers(1)},400);
}

var umCurrentPage=1;
function loadAdminUsers(page){
    if(!page)page=1;
    umCurrentPage=page;
    var search=(document.getElementById('umSearch')||{}).value||'';
    var role=(document.getElementById('umRole')||{}).value||'';
    var grade=(document.getElementById('umGrade')||{}).value||'';
    var params=[];
    params.push('page='+page);
    if(search)params.push('search='+encodeURIComponent(search));
    if(role)params.push('role='+encodeURIComponent(role));
    if(grade)params.push('grade='+encodeURIComponent(grade));
    var url=api+'/api/admin/users?'+params.join('&');
    fetch(url).then(function(r){return r.json()}).then(function(res){
        if(!res.success){document.getElementById('umList').innerHTML='<div class="empty">'+esc(res.error||'加载失败')+'</div>';return}
        var users=res.data||[];
        var total=res.total||0;
        var totalPages=res.totalPages||1;
        var el=function(id){return document.getElementById(id)};
        if(el('umTotal'))el('umTotal').textContent=total;
        var rs=res.roleStats||{};
        if(el('umAdmin'))el('umAdmin').textContent=rs.admin||0;
        if(el('umLeader'))el('umLeader').textContent=rs.user||0;
        if(el('umTeacher'))el('umTeacher').textContent=rs.teacher||0;
        if(el('umStudent'))el('umStudent').textContent=rs.student||0;
        if(el('umCount'))el('umCount').textContent=total;
        var list=document.getElementById('umList');
        if(!users.length){list.innerHTML='<div class="empty">暂无用户</div>';document.getElementById('umPager').innerHTML='';return}
        var h='<table style="width:100%;border-collapse:collapse;font-size:0.82em"><thead><tr style="background:#fafaff;border-bottom:2px solid #eee">'+
            '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">用户</th>'+
            '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">角色</th>'+
            '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">社团</th>'+
            '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">真实姓名</th>'+
            '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">学号/工号</th>'+
            '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">学院</th>'+
            '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">班级</th>'+
            '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">手机</th>'+
            '<th style="padding:8px 10px;text-align:center;color:#6b6d8a;font-weight:600">操作</th></tr></thead><tbody>';
        users.forEach(function(u){
            var roleMap={admin:'管理员',user:'社团负责人',student:'学生',teacher:'指导老师'};
            var roleColor={admin:'#e84393',user:'#667eea',student:'#00b894',teacher:'#f39c12'};
            var roleBg={admin:'rgba(232,67,147,0.08)',user:'rgba(102,126,234,0.08)',student:'rgba(0,184,148,0.08)',teacher:'rgba(243,156,18,0.08)'};
            h+='<tr style="border-bottom:1px solid #f5f5ff">';
            h+='<td style="padding:8px 10px"><div style="font-weight:600;color:#1a1a2e">'+esc(u.username)+'</div><div style="font-size:0.72em;color:#a0a3bd">ID: '+u.id+'</div></td>';
            h+='<td style="padding:8px 10px"><span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.76em;font-weight:600;color:'+(roleColor[u.role]||'#6b6d8a')+';background:'+(roleBg[u.role]||'#f5f5ff')+'">'+(roleMap[u.role]||u.role)+'</span></td>';
            var clubDisplay='-';
            if((u.role==='student'||u.role==='teacher')&&u.clubs){
                clubDisplay=u.clubs.length?u.clubs.map(function(c){return esc(c)}).join('<br>'):'-';
            }else{
                clubDisplay=esc(u.clubName||'-');
            }
            h+='<td style="padding:8px 10px;color:#1a1a2e;font-size:0.82em">'+clubDisplay+'</td>';
            h+='<td style="padding:8px 10px;color:#1a1a2e">'+esc(u.realName||'-')+'</td>';
            var idDisplay=esc(u.studentId||'-');
            if(u.role==='teacher')idDisplay=esc(u.workId||'-');
            h+='<td style="padding:8px 10px;color:#6b6d8a">'+idDisplay+'</td>';
            h+='<td style="padding:8px 10px;color:#6b6d8a">'+esc(u.college||'-')+'</td>';
            h+='<td style="padding:8px 10px;color:#6b6d8a">'+esc(u.className||'-')+'</td>';
            h+='<td style="padding:8px 10px;color:#6b6d8a">'+esc(u.phone||'-')+'</td>';
            h+='<td style="padding:8px 10px;text-align:center;white-space:nowrap">';
            h+='<button class="btn btn-sm btn-primary" style="margin-right:4px;font-size:0.72em;padding:3px 8px" onclick="editAdminUser('+u.id+')">编辑</button>';
            h+='<button class="btn btn-sm" style="margin-right:4px;font-size:0.72em;padding:3px 8px;background:#f39c12;color:#fff" onclick="resetAdminPassword('+u.id+')">重置密码</button>';
            if(u.id!==currentUser.id){
                h+='<button class="btn btn-sm btn-danger" style="font-size:0.72em;padding:3px 8px" onclick="deleteAdminUser('+u.id+')">删除</button>';
            }
            h+='</td></tr>';
        });
        h+='</tbody></table>';
        list.innerHTML=h;
        var pager=document.getElementById('umPager');
        if(totalPages<=1){pager.innerHTML='';return}
        var ph='';
        if(page>1)ph+='<button class="btn btn-sm" style="background:#f0f0f8;color:#667eea" onclick="loadAdminUsers('+(page-1)+')">上一页</button>';
        var startPage=Math.max(1,page-3);
        var endPage=Math.min(totalPages,page+3);
        for(var p=startPage;p<=endPage;p++){
            if(p===page)ph+='<button class="btn btn-sm btn-primary">'+p+'</button>';
            else ph+='<button class="btn btn-sm" style="background:#f0f0f8;color:#667eea" onclick="loadAdminUsers('+p+')">'+p+'</button>';
        }
        if(page<totalPages)ph+='<button class="btn btn-sm" style="background:#f0f0f8;color:#667eea" onclick="loadAdminUsers('+(page+1)+')">下一页</button>';
        pager.innerHTML=ph;
    }).catch(function(){document.getElementById('umList').innerHTML='<div class="empty">加载失败</div>'});
}

function submitEditUser(uid){
    var data={
        role:(document.getElementById('euRole')||{}).value||'',
        clubName:(document.getElementById('euClub')||{}).value||'',
        realName:(document.getElementById('euRealName')||{}).value||'',
        studentId:(document.getElementById('euStudentId')||{}).value||'',
        college:(document.getElementById('euCollege')||{}).value||'',
        className:(document.getElementById('euClassName')||{}).value||'',
        phone:(document.getElementById('euPhone')||{}).value||''
    };
    fetch(api+'/api/admin/users/'+uid,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){return r.json()}).then(function(res){
        if(res.success){toast('用户信息已更新','success');var o=document.getElementById('editUserOverlay');if(o)o.remove();loadAdminUsers()}
        else{toast(res.error||'更新失败','error')}
    }).catch(function(){toast('操作失败','error')});
}

function deleteAdminUser(uid){
    if(!confirm('确定删除该用户？此操作不可恢复，将同时删除该用户的所有数据！'))return;
    fetch(api+'/api/admin/users/'+uid,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){
        if(res.success){toast('用户已删除','success');loadAdminUsers()}else{toast(res.error||'删除失败','error')}
    }).catch(function(){toast('操作失败','error')});
}

function submitResetPwd(uid){
    var pwd=(document.getElementById('rpNewPwd')||{}).value||'';
    var adminPass=(document.getElementById('rpAdminPass')||{}).value||'';
    if(!adminPass){toast('请输入您的管理员密码','error');return}
    if(!pwd||pwd.length<4){toast('密码至少4位','error');return}
    fetch(api+'/api/admin/reset-password/'+uid,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd,adminPassword:adminPass})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.success){toast('密码已重置','success');var o=document.getElementById('resetPwdOverlay');if(o)o.remove()}
        else{toast(res.error||'重置失败','error')}
    }).catch(function(){toast('操作失败','error')});
}

function loadStudentFinanceList(){
    var clubs=[];
    fetch(api+'/api/my-club-memberships').then(function(r){return r.json()}).then(function(res){
        if(res.success&&res.data&&res.data.length){clubs=res.data.map(function(m){return m.clubName})}
    }).catch(function(){}).finally(function(){
        var applySel=document.getElementById('sfApplyClub');
        if(applySel&&applySel.options.length<=1&&clubs.length){
            clubs.forEach(function(cn){var opt=document.createElement('option');opt.value=cn;opt.textContent=cn;applySel.appendChild(opt)});
        }
        fetch(api+'/api/my-finance-permissions').then(function(r){return r.json()}).then(function(pRes){
            var managedClubs=pRes.managedClubs||[];
            var applications=pRes.applications||[];
            var permEl=document.getElementById('sfPermStatus');
            var applyCard=document.getElementById('sfApplyCard');
            var manageArea=document.getElementById('sfManageArea');
            if(managedClubs.length){
                if(permEl)permEl.innerHTML='<div style="background:rgba(0,184,148,0.06);border:1px solid rgba(0,184,148,0.12);border-radius:8px;padding:10px 14px;font-size:0.82em;color:#00b894">✅ 您已拥有以下社团的财务管理权限：'+managedClubs.map(function(c){return '<strong>'+esc(c)+'</strong>'}).join('、')+'</div>';
                if(manageArea)manageArea.style.display='block';
                if(applyCard)applyCard.style.display='none';
            }else{
                if(permEl)permEl.innerHTML='';
                if(manageArea)manageArea.style.display='none';
                if(applyCard)applyCard.style.display='block';
            }
            if(applications.length){
                var statusEl=document.getElementById('sfApplyStatus');
                if(statusEl){
                    var ah='<div style="margin-top:8px;font-size:0.78em;color:#6b6d8a">我的申请：</div>';
                    applications.forEach(function(a){
                        var st=a.status==='pending'?'⏳ 待审批':a.status==='approved'?'✅ 已通过':'❌ 已拒绝';
                        ah+='<div style="font-size:0.76em;color:#6b6d8a;padding:4px 0">'+esc(a.clubName)+' — '+st+' ('+esc(a.createdAt||'')+'</div>';
                    });
                    statusEl.innerHTML=ah;
                }
            }
            if(!clubs.length){document.getElementById('sfList').innerHTML='<div class="empty">您还未加入任何社团</div>';document.getElementById('sfSummary').innerHTML='';return}
            var club=managedClubs.length?managedClubs[0]:clubs[0];
            window._sfManagedClub=managedClubs.length?managedClubs[0]:'';
            fetch(api+'/api/finance-records?club='+encodeURIComponent(club)).then(function(r){return r.json()}).then(function(res){
                if(res.error){document.getElementById('sfList').innerHTML='<div class="empty">'+esc(res.error)+'</div>';return}
                var s=res.summary||{};
                document.getElementById('sfSummary').innerHTML=
                    '<div style="flex:1;min-width:140px;background:linear-gradient(135deg,rgba(0,184,148,0.08),rgba(85,239,196,0.08));border:1px solid rgba(0,184,148,0.15);border-radius:10px;padding:12px 16px;text-align:center">'+
                    '<div style="font-size:0.72em;color:#00b894;font-weight:600">总收入</div><div style="font-size:1.2em;font-weight:700;color:#00b894">¥'+(s.totalIncome||0).toFixed(2)+'</div></div>'+
                    '<div style="flex:1;min-width:140px;background:linear-gradient(135deg,rgba(232,67,147,0.08),rgba(253,121,168,0.08));border:1px solid rgba(232,67,147,0.15);border-radius:10px;padding:12px 16px;text-align:center">'+
                    '<div style="font-size:0.72em;color:#e84393;font-weight:600">总支出</div><div style="font-size:1.2em;font-weight:700;color:#e84393">¥'+(s.totalExpense||0).toFixed(2)+'</div></div>'+
                    '<div style="flex:1;min-width:140px;background:linear-gradient(135deg,rgba(102,126,234,0.08),rgba(118,75,162,0.08));border:1px solid rgba(102,126,234,0.15);border-radius:10px;padding:12px 16px;text-align:center">'+
                    '<div style="font-size:0.72em;color:#667eea;font-weight:600">余额</div><div style="font-size:1.2em;font-weight:700;color:#667eea">¥'+(s.balance||0).toFixed(2)+'</div></div>';
                var c=document.getElementById('sfList');
                if(!res.data||!res.data.length){c.innerHTML='<div class="empty">暂无财务记录</div>';return}
                var h='<table style="width:100%;border-collapse:collapse;font-size:0.82em"><thead><tr style="background:#fafaff;border-bottom:2px solid #eee">'+
                    '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">日期</th>'+
                    '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">类型</th>'+
                    '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">分类</th>'+
                    '<th style="padding:8px 10px;text-align:right;color:#6b6d8a;font-weight:600">金额</th>'+
                    '<th style="padding:8px 10px;text-align:left;color:#6b6d8a;font-weight:600">说明</th></tr></thead><tbody>';
                res.data.forEach(function(r){
                    var isIncome=r.type==='income';
                    h+='<tr style="border-bottom:1px solid #f5f5ff">';
                    h+='<td style="padding:8px 10px;color:#1a1a2e">'+esc(r.recordDate)+'</td>';
                    h+='<td style="padding:8px 10px"><span style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.76em;font-weight:600;color:'+(isIncome?'#00b894':'#e84393')+';background:'+(isIncome?'rgba(0,184,148,0.08)':'rgba(232,67,147,0.08)')+'">'+(isIncome?'收入':'支出')+'</span></td>';
                    h+='<td style="padding:8px 10px;color:#1a1a2e">'+esc(r.category)+'</td>';
                    h+='<td style="padding:8px 10px;text-align:right;font-weight:600;color:'+(isIncome?'#00b894':'#e84393')+'">¥'+Number(r.amount).toFixed(2)+'</td>';
                    h+='<td style="padding:8px 10px;color:#6b6d8a">'+escHtml(r.description)+'</td>';
                    h+='</tr>';
                });
                h+='</tbody></table>';
                c.innerHTML=h;
            }).catch(function(){document.getElementById('sfList').innerHTML='<div class="empty">加载失败</div>'});
        });
    });
}

function applyFinPermission(){
    var club=document.getElementById('sfApplyClub').value;
    var reason=document.getElementById('sfApplyReason').value.trim();
    if(!club){toast('请选择社团','error');return}
    fetch(api+'/api/finance-permission-apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clubName:club,reason:reason})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('申请已提交，等待审批','success');
        loadStudentFinanceList();
    }).catch(function(){toast('提交失败','error')});
}

function showStuFinForm(){
    document.getElementById('stuFinFormCard').style.display='block';
    document.getElementById('sfDate').value=new Date().toISOString().split('T')[0];
    document.getElementById('sfRecorder').value=currentUser?currentUser.username:'';
}

function submitStuFinRecord(){
    var club=window._sfManagedClub||'';
    if(!club){toast('无管理权限','error');return}
    var type=document.getElementById('sfType').value;
    var category=document.getElementById('sfCategory').value.trim();
    var amount=document.getElementById('sfAmount').value;
    var date=document.getElementById('sfDate').value;
    var desc=document.getElementById('sfDesc').value.trim();
    var recorder=document.getElementById('sfRecorder').value.trim();
    if(!category){toast('请填写分类','error');return}
    if(!amount||parseFloat(amount)<=0){toast('请输入有效金额','error');return}
    if(!date){toast('请选择日期','error');return}
    fetch(api+'/api/finance-records',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clubName:club,type:type,category:category,amount:amount,description:desc,recordDate:date,recorder:recorder})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){
            toast(res.error,'error');
            if(res.error.indexOf('权限')>=0){
                window._sfManagedClub='';
                var ma=document.getElementById('sfManageArea');if(ma)ma.style.display='none';
                var pc=document.getElementById('sfApplyCard');if(pc)pc.style.display='block';
            }
            return;
        }
        toast('记录添加成功','success');
        document.getElementById('stuFinFormCard').style.display='none';
        loadStudentFinanceList();
    }).catch(function(){toast('添加失败','error')});
}

function exportStuFinance(){
    var club=window._sfManagedClub||currentUser.clubName||'';
    if(!club){toast('未关联社团','error');return}
    window.open(api+'/api/export-finance/'+encodeURIComponent(club));
}

function loadCadres(){
    fetch(api+'/api/club-cadres').then(function(r){return r.json()}).then(function(res){
        if(res.error){document.getElementById('cadreList').innerHTML='<div class="empty">'+esc(res.error)+'</div>';return}
        var list=res.data||[];
        var el=document.getElementById('cadreCount');
        if(el)el.textContent=list.length;
        var box=document.getElementById('cadreList');
        if(!list.length){box.innerHTML='<div class="empty">暂无骨干成员</div>';return}
        var h='<table class="data-table"><thead><tr><th>姓名</th><th>学号</th><th>添加时间</th><th>操作</th></tr></thead><tbody>';
        list.forEach(function(c){
            h+='<tr><td>'+esc(c.real_name)+'</td><td>'+esc(c.student_id_num)+'</td><td>'+(c.created_at||'')+'</td>';
            h+='<td><button class="btn btn-danger btn-sm" onclick="removeCadre('+c.id+')">移除</button></td></tr>';
        });
        h+='</tbody></table>';
        box.innerHTML=h;
    });
}

function addCadre(){
    var name=document.getElementById('cadreName').value.trim();
    var sid=document.getElementById('cadreSid').value.trim();
    if(!name||!sid){toast('请填写姓名和学号','error');return}
    fetch(api+'/api/club-cadres',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({real_name:name,student_id_num:sid})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('添加成功','success');
        document.getElementById('cadreName').value='';
        document.getElementById('cadreSid').value='';
        loadCadres();
    });
}

function removeCadre(id){
    if(!confirm('确认移除该骨干？'))return;
    fetch(api+'/api/club-cadres/'+id,{method:'DELETE'}).then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('已移除','success');
        loadCadres();
    });
}

function loadCadreApprovalList(club){
    fetch(api+'/api/club-registrations/'+encodeURIComponent(club)).then(function(r){return r.json()}).then(function(res){
        var safeId=club.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_');
        var box=document.getElementById('cadreApprovalList_'+safeId);
        if(!box)return;
        if(!res.success||!res.data||!res.data.length){box.innerHTML='<div class="empty">暂无报名记录</div>';return}
        var pending=res.data.filter(function(r){return r.status==='pending'});
        if(!pending.length){box.innerHTML='<div class="empty">所有报名已处理完毕</div>';return}
        var h='<div style="margin-bottom:8px"><label style="font-size:0.76em;cursor:pointer"><input type="checkbox" onchange="toggleCadreAll(this,\''+esc(club)+'\')" /> 全选</label></div>';
        pending.forEach(function(r){
            h+='<div style="padding:10px 12px;background:#fafaff;border-radius:10px;border:1px solid #f0f0f8;margin-bottom:6px">';
            h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
            h+='<input type="checkbox" class="cadreRegChk" data-id="'+r.id+'" data-club="'+esc(club)+'" />';
            h+='<span style="font-size:0.9em;font-weight:600;color:#667eea">'+esc(r.studentName)+'</span>';
            h+='<span class="reg-status pending">待审批</span>';
            h+='</div>';
            h+='<div style="display:flex;gap:12px;font-size:0.76em;color:#a0a3bd;flex-wrap:wrap">';
            if(r.studentClass)h+='<span>'+esc(r.studentClass)+'</span>';
            if(r.studentIdNum)h+='<span>'+esc(r.studentIdNum)+'</span>';
            if(r.studentPhone)h+='<span>'+esc(r.studentPhone)+'</span>';
            h+='</div>';
            h+='<div style="margin-top:8px;display:flex;gap:6px">';
            h+='<button class="btn btn-sm btn-success" onclick="cadreApproveOne('+r.id+',\''+esc(club)+'\',\'approve\')">通过</button>';
            h+='<button class="btn btn-sm btn-danger" onclick="cadreApproveOne('+r.id+',\''+esc(club)+'\',\'reject\')">拒绝</button>';
            h+='</div></div>';
        });
        box.innerHTML=h;
    });
}

function toggleCadreAll(el,club){
    document.querySelectorAll('.cadreRegChk[data-club="'+club+'"]').forEach(function(c){c.checked=el.checked});
}

function cadreApproveOne(regId,club,action){
    fetch(api+'/api/registration-approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:[regId],action:action})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast(action==='approve'?'已通过':'已拒绝','success');
        loadCadreApprovalList(club);
    });
}

function batchCadreApprove(club,action){
    var ids=[];
    document.querySelectorAll('.cadreRegChk[data-club="'+club+'"]:checked').forEach(function(c){ids.push(parseInt(c.dataset.id))});
    if(!ids.length){toast('请先选择','error');return}
    fetch(api+'/api/registration-approve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:ids,action:action})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('批量操作成功','success');
        loadCadreApprovalList(club);
    });
}

function submitFeedback(){
    var type=(document.getElementById('fbType')||{}).value||'';
    if(!type){toast('请选择问题类型','error');return}
    var title='',body='',actName='',actTime='';
    var fileInput=document.getElementById('fbFile');
    if(type==='teacher_checkin'){
        actName=(document.getElementById('fbActName')||{}).value||'';
        actTime=(document.getElementById('fbActTime')||{}).value||'';
        title=(document.getElementById('fbTitle')||{}).value||'';
        body=(document.getElementById('fbBody')||{}).value||'';
        if(!actName.trim()||!actTime||!title.trim()||!body.trim()){toast('请填写完整信息','error');return}
    }else if(type==='daily_activity'){
        actName=(document.getElementById('fbActName')||{}).value||'';
        actTime=(document.getElementById('fbActTime')||{}).value||'';
        body=(document.getElementById('fbBody')||{}).value||'';
        title=actName;
        if(!actName.trim()||!actTime||!body.trim()){toast('请填写完整信息','error');return}
    }else{
        title=(document.getElementById('fbTitle')||{}).value||'';
        body=(document.getElementById('fbBody')||{}).value||'';
        if(!title.trim()||!body.trim()){toast('请填写完整信息','error');return}
    }
    var fd=new FormData();
    fd.append('type',type);
    fd.append('title',title.trim());
    fd.append('body',body.trim());
    fd.append('activityName',actName.trim());
    fd.append('activityTime',actTime);
    if(fileInput&&fileInput.files&&fileInput.files[0])fd.append('file',fileInput.files[0]);
    fetch(api+'/api/submit-feedback',{method:'POST',body:fd})
    .then(function(r){return r.json()}).then(function(res){
        if(res.success){toast('反馈提交成功','success');document.getElementById('fbType').value='';document.getElementById('fbFormArea').innerHTML='';loadMyFeedbacks()}
        else{toast(res.error||'提交失败','error')}
    }).catch(function(){toast('提交失败','error')});
}

function filterAdminFeedbacks(){
    var box=document.getElementById('adminFbList');if(!box)return;
    var q=(document.getElementById('afbSearch')||{}).value||'';
    q=q.trim().toLowerCase();
    var filtered=_fbAdminAll;
    if(fbAdminFilter!=='all')filtered=filtered.filter(function(fb){return fb.type===fbAdminFilter});
    var fbStart=(document.getElementById('fbStartDate')||{}).value||'';
    var fbEnd=(document.getElementById('fbEndDate')||{}).value||'';
    if(fbStart)filtered=filtered.filter(function(fb){var t=(fb.time||'').substring(0,10);return t>=fbStart});
    if(fbEnd)filtered=filtered.filter(function(fb){var t=(fb.time||'').substring(0,10);return t<=fbEnd});
    if(q)filtered=filtered.filter(function(fb){
        return (fb.clubName||'').toLowerCase().indexOf(q)>=0||(fb.title||'').toLowerCase().indexOf(q)>=0||(fb.body||'').toLowerCase().indexOf(q)>=0;
    });

                var statusCls=fb.status==='resolved'?'color:#00b894':'color:#f39c12';
                h+='<span style="font-size:0.72em;font-weight:600;'+statusCls+'">'+(fb.status==='resolved'?'已处理':'待处理')+'</span></div>';
                if(fb.activityName)h+='<div style="font-size:0.82em;color:#4a4d6a;margin-bottom:2px">活动：'+esc(fb.activityName)+'</div>';
                if(fb.activityTime)h+='<div style="font-size:0.82em;color:#4a4d6a;margin-bottom:2px">时间：'+esc(fb.activityTime)+'</div>';
                h+='<div style="font-size:0.9em;font-weight:600;color:#1a1a2e;margin-bottom:4px">'+esc(fb.title)+'</div>';
                if(fb.body)h+='<div style="font-size:0.82em;color:#6b6d8a;line-height:1.5">'+escHtml(fb.body)+'</div>';
                if(fb.fileName){

var carouselIdx=0;
var carouselTimer=null;
var carouselSlides=[];
var carouselTransitioning=false;
var actCarouselIdx=0;
var actCarouselData=[];

function renderActCarousel(data){
    actCarouselData=data;
    actCarouselIdx=0;
    var track=document.getElementById('actTrack');if(!track)return;
    var dots=document.getElementById('actDots');if(!dots)return;
    if(!data.length){track.innerHTML='';dots.innerHTML='';return}
    var perPage=4;
    if(window.innerWidth<=480)perPage=3;
    else if(window.innerWidth<=768)perPage=4;
    var pages=[];
    for(var i=0;i<data.length;i+=perPage){pages.push(data.slice(i,i+perPage))}
    if(!pages.length){track.innerHTML='<div class="empty">暂无活动</div>';dots.innerHTML='';return}
    var h='';
    pages.forEach(function(page){
        h+='<div class="act-carousel-page">';
        page.forEach(function(d){
            var icon='🎯';
            if(d.clubName){icon=d.clubName[0]}
            h+='<div class="act-card" onclick="showMaterialDetail(\''+esc(d.groupId)+'\')">';
            h+='<div class="act-icon">'+esc(icon)+'</div>';
            h+='<div class="act-info">';
            h+='<div class="act-title">'+esc(d.title||d.clubName+'的活动')+'</div>';
            h+='<div class="act-meta"><span class="act-club">'+esc(d.clubName||'')+'</span> · '+esc(d.time||'')+'</div>';
            h+='</div></div>';
        });
        h+='</div>';
    });
    track.innerHTML=h;
    var dh='';
    pages.forEach(function(_,i){dh+='<div class="act-carousel-dot'+(i===0?' active':'')+'" onclick="actCarouselGo('+i+')"></div>'});
    dots.innerHTML=dh;
    track.style.transform='translateX(0)';
}

function actCarouselGo(idx){
    var track=document.getElementById('actTrack');if(!track)return;
    var pages=track.querySelectorAll('.act-carousel-page');if(!pages.length)return;
    if(idx<0)idx=pages.length-1;
    if(idx>=pages.length)idx=0;
    actCarouselIdx=idx;
    track.style.transform='translateX(-'+idx*100+'%)';
    var dots=document.getElementById('actDots');if(dots){
        dots.querySelectorAll('.act-carousel-dot').forEach(function(d,i){d.classList.toggle('active',i===idx)});
    }
}

function actCarouselPrev(){actCarouselGo(actCarouselIdx-1)}
function actCarouselNext(){actCarouselGo(actCarouselIdx+1)}

// Touch swipe support for activity carousel
document.addEventListener('DOMContentLoaded',function(){
    var touchStartX=0,touchEndX=0,touchTarget=null;
    document.addEventListener('touchstart',function(e){
        var t=e.target.closest('.act-carousel');if(!t)return;
        touchTarget=t;touchStartX=e.changedTouches[0].screenX;
    },{passive:true});
    document.addEventListener('touchend',function(e){
        if(!touchTarget)return;
        touchEndX=e.changedTouches[0].screenX;
        var diff=touchStartX-touchEndX;
        if(Math.abs(diff)>50){
            if(diff>0)actCarouselNext();else actCarouselPrev();
        }
        touchTarget=null;
    },{passive:true});
});

function renderCarousel(){
    var track=document.getElementById('carouselTrack');if(!track)return;
    var dots=document.getElementById('carouselDots');if(!dots)return;
    if(carouselSlides.length<=1){
        var h='';carouselSlides.forEach(function(s){
            var bg=s.img?'background-image:url('+api+s.img+')':'background:linear-gradient(135deg,#667eea,#764ba2)';
            h+='<div class="carousel-slide" style="'+bg+'"><div class="cs-overlay"><div class="cs-title">'+esc(s.title)+'</div>';
            if(s.desc)h+='<div class="cs-desc">'+safeHtml(s.desc)+'</div>';
            h+='</div></div>';
        });track.innerHTML=h;dots.innerHTML='';return;
    }
    var h='';
    var last=carouselSlides[carouselSlides.length-1];
    var bgL=last.img?'background-image:url('+api+last.img+')':'background:linear-gradient(135deg,#667eea,#764ba2)';
    h+='<div class="carousel-slide" style="'+bgL+'"><div class="cs-overlay"><div class="cs-title">'+esc(last.title)+'</div>';
    if(last.desc)h+='<div class="cs-desc">'+safeHtml(last.desc)+'</div>';
    h+='</div></div>';
    carouselSlides.forEach(function(s){
        var bg=s.img?'background-image:url('+api+s.img+')':'background:linear-gradient(135deg,#667eea,#764ba2)';
        h+='<div class="carousel-slide" style="'+bg+'"><div class="cs-overlay"><div class="cs-title">'+esc(s.title)+'</div>';
        if(s.desc)h+='<div class="cs-desc">'+safeHtml(s.desc)+'</div>';
        h+='</div></div>';
    });
    var first=carouselSlides[0];
    var bgF=first.img?'background-image:url('+api+first.img+')':'background:linear-gradient(135deg,#667eea,#764ba2)';
    h+='<div class="carousel-slide" style="'+bgF+'"><div class="cs-overlay"><div class="cs-title">'+esc(first.title)+'</div>';
    if(first.desc)h+='<div class="cs-desc">'+safeHtml(first.desc)+'</div>';
    h+='</div></div>';
    track.innerHTML=h;
    var dh='';carouselSlides.forEach(function(_,i){
        dh+='<div class="carousel-dot'+(i===0?' active':'')+'" onclick="carouselGo('+i+')"></div>';
    });dots.innerHTML=dh;
    carouselGo(0,true);
    if(window._carouselTransitionHandler){
        track.removeEventListener('transitionend',window._carouselTransitionHandler);
    }
    window._carouselTransitionHandler=function(){
        carouselTransitioning=false;
        if(carouselIdx===carouselSlides.length){
            track.style.transition='none';
            carouselIdx=0;
            track.style.transform='translateX(-100%)';
            track.offsetHeight;
            track.style.transition='transform .5s ease';
            updateCarouselDots();
        }else if(carouselIdx===-1){
            track.style.transition='none';
            carouselIdx=carouselSlides.length-1;
            track.style.transform='translateX(-'+carouselSlides.length*100+'%)';
            track.offsetHeight;
            track.style.transition='transform .5s ease';
            updateCarouselDots();
        }
    };
    track.addEventListener('transitionend',window._carouselTransitionHandler);
}

function updateCarouselDots(){
    var realIdx=carouselIdx;
    if(realIdx<0)realIdx=carouselSlides.length-1;
    if(realIdx>=carouselSlides.length)realIdx=0;
    document.querySelectorAll('.carousel-dot').forEach(function(d,i){d.classList.toggle('active',i===realIdx)});
}

function carouselGo(idx,instant){
    carouselIdx=idx;
    var track=document.getElementById('carouselTrack');if(!track)return;
    if(instant){
        track.style.transition='none';
        track.style.transform='translateX(-'+(idx+1)*100+'%)';
        track.offsetHeight;
        track.style.transition='transform .5s ease';
    }else{
        carouselTransitioning=true;
        track.style.transform='translateX(-'+(idx+1)*100+'%)';
    }
    updateCarouselDots();
}

function carouselPrev(){
    if(carouselTransitioning)return;
    carouselGo(carouselIdx-1);resetCarouselTimer();
}
function carouselNext(){
    if(carouselTransitioning)return;
    carouselGo(carouselIdx+1);resetCarouselTimer();
}
function startCarouselTimer(){carouselTimer=setInterval(function(){if(!carouselTransitioning)carouselNext()},8000)}
function resetCarouselTimer(){clearInterval(carouselTimer);startCarouselTimer()}

function pollUnreadNotif(){
    fetch(api+'/api/nav-badges').then(function(r){return r.json()}).then(function(res){
        if(!res.success)return;
        var badges=res.badges||{};
        var featureKeys=['materials','offcampus','feedback','scoringRules','workload','recruit','joint','clubnotice','volunteer','member','enroll','checkin','quitManage','scoring'];
        var alwaysShowKeys=['scoring','quitManage','scoringRules'];
        featureKeys.forEach(function(key){
            if(key in badges){
                var count=badges[key];
                var b=document.getElementById('navBadge-'+key);
                if(b){
                    if(alwaysShowKeys.indexOf(key)>=0){
                        var prevCount=_dismissedCounts[key]||0;
                        if(count>0&&count>prevCount){b.textContent=count>99?'99+':count;b.classList.add('show');delete _dismissedCounts[key];_saveDismissed()}
                        else if(count>0&&count<=prevCount){b.classList.remove('show')}
                        else{b.classList.remove('show');if(_dismissedCounts[key]){delete _dismissedCounts[key];_saveDismissed()}}
                    }else{
                        var dismissed=_dismissedBadges[key];

function filterNotifList(){

    var q=(document.getElementById('nlSearch')||{}).value||'';
    q=q.trim().toLowerCase();
    var filtered=_notifAllData;
    if(q)filtered=filtered.filter(function(n){
        return (n.title||'').toLowerCase().indexOf(q)>=0||(n.content||'').toLowerCase().indexOf(q)>=0;
    });
    if(!filtered.length){box.innerHTML='<div class="empty">暂无消息通知</div>';return}
    renderPagination('notifList',filtered,function(list){
        var h='';list.forEach(function(n){

function toggleNotifContent(el){
    var parent=el.parentElement;
    var nid=parent.querySelector('[data-nid]');
    if(!nid)return;
    var id=parseInt(nid.getAttribute('data-nid'));
    var n=_notifAllData.find(function(x){return x.id===id});
    if(!n)return;
    if(el.getAttribute('data-expanded')==='1'){
        el.innerHTML=escHtml((n.content||'').substring(0,80))+((n.content||'').length>80?'<span style="color:#667eea;font-size:0.72em;margin-left:4px">...</span>':'');
        el.setAttribute('data-expanded','0');
    }else{
        el.innerHTML=escHtml(n.content||'');
        el.setAttribute('data-expanded','1');
    }
}

var lowActivityData=null;
function loadLowActivityClubs(){
    var ovStart=(document.getElementById('ovStartDate')||{}).value||'';
    var ovEnd=(document.getElementById('ovEndDate')||{}).value||'';
    var threshold=(document.getElementById('lowActThreshold')||{}).value||'2';
    var params='threshold='+encodeURIComponent(threshold);
    if(ovStart)params+='&start_date='+encodeURIComponent(ovStart);
    if(ovEnd)params+='&end_date='+encodeURIComponent(ovEnd);
    fetch(api+'/api/low-activity-clubs?'+params).then(function(r){return r.json()}).then(function(res){
        if(!res.success){toast(res.error||'查询失败','error');return}
        lowActivityData=res.data||[];
        var totalClubs=res.totalClubs||0;
        var zeroCount=lowActivityData.filter(function(c){return c.activityCount===0}).length;
        var el1=document.getElementById('lowActCount');if(el1)el1.textContent=lowActivityData.length;
        var el2=document.getElementById('zeroActCount');if(el2)el2.textContent=zeroCount;
        var el3=document.getElementById('lowActTotal');if(el3)el3.textContent=totalClubs;

        var chartBox=document.getElementById('lowActChart');
        if(chartBox){
            var activeCount=totalClubs-lowActivityData.length;
            var zeroAct=zeroCount;
            var lowAct=lowActivityData.length-zeroCount;
            var maxVal=Math.max(activeCount,lowAct,zeroAct,1);
            var bars=[
                {label:'达标',val:activeCount,color:'#00b894'},
                {label:'低活动',val:lowAct,color:'#f39c12'},
                {label:'零活动',val:zeroAct,color:'#e74c3c'}
            ];
            var chartH='';
            bars.forEach(function(b){
                var pct=Math.round(b.val/maxVal*100);
                chartH+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
                chartH+='<div style="width:42px;font-size:0.7em;color:#a0a3bd;flex-shrink:0">'+b.label+'</div>';
                chartH+='<div style="flex:1;height:22px;background:#f5f5fa;border-radius:6px;overflow:hidden;position:relative">';
                chartH+='<div style="height:100%;width:'+Math.max(pct,2)+'%;background:'+b.color+';border-radius:6px;transition:width 0.5s"></div>';
                chartH+='<span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:0.72em;font-weight:600;color:'+(pct>20?'#fff':b.color)+'">'+b.val+'</span>';
                chartH+='</div></div>';
            });
            chartBox.innerHTML=chartH;
        }

        var listBox=document.getElementById('lowActList');
        if(listBox){
            if(!lowActivityData.length){listBox.innerHTML='<div class="empty" style="color:#00b894">✅ 所在时间段内所有社团活动次数均达标</div>';return}
            var h='<table class="tbl" style="border-spacing:0 6px"><thead><tr><th style="padding:8px 12px">社团名称</th><th style="padding:8px 12px">活动次数</th><th style="padding:8px 12px">社团类型</th><th style="padding:8px 12px">业务指导单位</th><th style="padding:8px 12px">指导老师</th><th style="padding:8px 12px">社长</th></tr></thead><tbody>';
            lowActivityData.forEach(function(c){
                var cntTag=c.activityCount===0?'<span style="background:#e74c3c;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.76em;font-weight:600">0次</span>':'<span style="background:#f39c12;color:#fff;padding:2px 8px;border-radius:10px;font-size:0.76em;font-weight:600">'+c.activityCount+'次</span>';
                h+='<tr style="'+(c.activityCount===0?'background:rgba(231,76,60,0.04)':'background:rgba(243,156,18,0.03)')+'">';
                h+='<td style="padding:8px 12px">'+esc(c.clubName)+'</td><td style="padding:8px 12px">'+cntTag+'</td><td style="font-size:0.82em;padding:8px 12px">'+esc(c.category||'-')+'</td><td style="font-size:0.82em;padding:8px 12px">'+esc(c.guidingUnit||'-')+'</td><td style="font-size:0.82em;padding:8px 12px">'+esc(c.teacherNames||'-')+'</td><td style="font-size:0.82em;padding:8px 12px">'+esc(c.president||'-')+'</td></tr>';
            });
            h+='</tbody></table>';
            listBox.innerHTML=h;
        }
    }).catch(function(){toast('查询失败','error')});
}

function sendAdminNotify(){
    var title=document.getElementById('anTitle').value.trim();

    var targetType=document.getElementById('anTargetType').value;
    var targetClubs=[];
    var targetTeachers=[];
    if(targetType==='specific_leader'){
        document.querySelectorAll('.anClubCb:checked').forEach(function(cb){targetClubs.push(cb.value)});
        if(!targetClubs.length){toast('请选择至少一个社团','error');return}
    }
    if(targetType==='specific_teacher'){
        document.querySelectorAll('.anTeacherCb:checked').forEach(function(cb){targetTeachers.push(cb.value)});
        if(!targetTeachers.length){toast('请选择至少一位指导老师','error');return}

    fetch(api+'/api/admin-notifications',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title,content:content,targetType:targetType,targetClubs:targetClubs,targetTeachers:targetTeachers})})

var _anAllData=[];
function toggleAnContent(el,anid){
    if(!_anAllData.length){
        fetch(api+'/api/admin-notifications').then(function(r){return r.json()}).then(function(res){
            if(res.success&&res.data)_anAllData=res.data;
            doToggleAnContent(el,anid);
        });
    }else{
        doToggleAnContent(el,anid);
    }
}
function doToggleAnContent(el,anid){
    var n=_anAllData.find(function(x){return x.id===anid});
    if(!n)return;
    if(el.getAttribute('data-expanded')==='1'){
        el.innerHTML=escHtml((n.content||'').substring(0,80))+((n.content||'').length>80?'<span style="color:#667eea;font-size:0.72em;margin-left:4px">...</span>':'');
        el.setAttribute('data-expanded','0');
    }else{
        el.innerHTML=escHtml(n.content||'');
        el.setAttribute('data-expanded','1');
    }
}

        if(dateStartEl)dateStartEl.value=ds;
        if(dateEndEl)dateEndEl.value=de;
        initSemesterSelect();
    });
}

function initSemesterSelect(){
    var sel=document.getElementById('semesterSelect');
    if(!sel)return;
    sel.innerHTML='<option value="">-- 不选择 --</option>';
    var now=new Date();
    var curYear=now.getFullYear();
    for(var y=curYear-2;y<=curYear+1;y++){
        sel.innerHTML+='<option value="'+y+'-1">'+y+'-'+(y+1)+'学年第一学期</option>';
        sel.innerHTML+='<option value="'+y+'-2">'+y+'-'+(y+1)+'学年第二学期</option>';
    }
}

function applySemester(){
    var sel=document.getElementById('semesterSelect');
    if(!sel)return;
    var val=sel.value;
    if(!val)return;
    var parts=val.split('-');
    var year=parseInt(parts[0]);
    var sem=parseInt(parts[1]);
    var dateStartEl=document.getElementById('scoringDateStart');
    var dateEndEl=document.getElementById('scoringDateEnd');
    if(sem===1){
        if(dateStartEl)dateStartEl.value=year+'-09-01';
        if(dateEndEl)dateEndEl.value=(year+1)+'-02-28';
    }else{
        if(dateStartEl)dateStartEl.value=(year+1)+'-03-01';
        if(dateEndEl)dateEndEl.value=(year+1)+'-08-31';
    }
}

function saveClubOverrides(starLevel){
    var rule=scoringRulesData.find(function(r){return r.star_level===starLevel});
    if(!rule)return;
    fetch(api+'/api/club-structures').then(function(r){return r.json()}).then(function(res){
        if(!res.success||!res.data)return;
        var clubs=res.data.filter(function(c){return (c.starRating||0)===starLevel});
        var overrides=[];
        clubs.forEach(function(c){
            var collEl=document.getElementById('ovColl_'+encodeURIComponent(c.clubName));
            var indivEl=document.getElementById('ovIndiv_'+encodeURIComponent(c.clubName));
            var coll=collEl?collEl.value:'';
            var indiv=indivEl?indivEl.value:'';
            if(coll!==''||indiv!==''){
                overrides.push({club_name:c.clubName,collective_limit:coll===''?null:coll,individual_limit:indiv===''?null:indiv});
            }
        });
        fetch(api+'/api/scoring-club-overrides',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({overrides:overrides})})
        .then(function(r){return r.json()}).then(function(res2){
            if(res2.success){toast(res2.message,'success');loadScoringRules();loadScoringPreview()}
            else toast(res2.error,'error');
        });
    });
}

function removeClubOverride(clubName,starLevel){
    if(!confirm('确认恢复"'+clubName+'"为星级默认值？'))return;
    fetch(api+'/api/scoring-club-overrides/'+encodeURIComponent(clubName),{method:'DELETE'})
    .then(function(r){return r.json()}).then(function(res){
        if(res.success){toast(res.message,'success');loadScoringRules();loadScoringPreview()}
        else toast(res.error,'error');
    });
}

function saveScoringRules(){
    var rules=scoringRulesData.map(function(r){
        var collEl=document.getElementById('srColl_'+r.star_level);
        var indivEl=document.getElementById('srIndiv_'+r.star_level);
        return {star_level:r.star_level,collective_limit:collEl?parseFloat(collEl.value)||0:0,individual_limit:indivEl?parseFloat(indivEl.value)||0:0};
    });
    var dateStartEl=document.getElementById('scoringDateStart');
    var dateEndEl=document.getElementById('scoringDateEnd');
    var date_start=dateStartEl?dateStartEl.value:'';
    var date_end=dateEndEl?dateEndEl.value:'';
    fetch(api+'/api/scoring-rules',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rules:rules,date_start:date_start,date_end:date_end})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.success){toast(res.message,'success');loadScoringRules();loadScoringPreview()}
        else toast(res.error,'error');
    });
}

    card.appendChild(header);
    var body=document.createElement('div');
    body.style.cssText='padding:24px';
    if(action==='reject'){
        var warn=document.createElement('div');
        warn.style.cssText='background:#fff8f0;border:1px solid #ffe0b2;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:0.82em;color:#e67e22;line-height:1.6';
        warn.textContent='驳回后赋分将退回指导老师确认阶段，社团负责人需重新提交。';
        body.appendChild(warn);
    }
    var label=document.createElement('label');
    label.style.cssText='display:block;font-size:0.82em;font-weight:700;color:#1a1a2e;margin-bottom:8px';
    label.textContent=action==='reject'?'驳回原因（可选）':'备注（可选）';
    body.appendChild(label);

    ta.placeholder=action==='reject'?'请说明驳回原因...':'可填写审核备注...';
    ta.style.cssText='width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid #e8e8f0;background:#fafaff;font-size:0.88em;resize:vertical;line-height:1.6;font-family:inherit;outline:none;box-sizing:border-box';
    body.appendChild(ta);
    var btnRow=document.createElement('div');
    btnRow.style.cssText='display:flex;gap:10px;justify-content:flex-end;margin-top:16px';
    var cancelBtn=document.createElement('button');
    cancelBtn.className='btn btn-ghost';
    cancelBtn.textContent='取消';
    cancelBtn.onclick=function(){overlay.remove()};
    btnRow.appendChild(cancelBtn);
    var confirmBtn=document.createElement('button');
    if(action==='approve'){
        confirmBtn.className='btn btn-success';
        confirmBtn.textContent='确认通过';
    }else{
        confirmBtn.className='btn';
        confirmBtn.style.cssText='background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;box-shadow:0 3px 12px rgba(231,76,60,0.25)';
        confirmBtn.textContent='确认驳回';
    }
    confirmBtn.onclick=function(){
        var note=ta.value.trim();
        confirmBtn.disabled=true;
        confirmBtn.textContent='提交中...';
        fetch(api+'/api/scoring/tuanwei-review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({club_name:clubName,action:action,review_note:note})})
        .then(function(r){return r.json()}).then(function(res){
            if(res.success){toast(res.message,'success');overlay.remove();loadTuanweiReviewList2();loadScoringPreview()}
            else{toast(res.error,'error');confirmBtn.disabled=false;confirmBtn.textContent=action==='approve'?'确认通过':'确认驳回'}
        }).catch(function(){toast('操作失败','error');confirmBtn.disabled=false;confirmBtn.textContent=action==='approve'?'确认通过':'确认驳回'});
    };
    btnRow.appendChild(confirmBtn);
    body.appendChild(btnRow);
    card.appendChild(body);
    overlay.appendChild(card);
    overlay.onclick=function(e){if(e.target===overlay)overlay.remove()};
    document.body.appendChild(overlay);
    if(action==='reject'){setTimeout(function(){ta.focus()},100)}
}

function tuanweiReviewAction(clubName,action){
    var actionText=action==='approve'?'通过':'驳回';
    var rejectNote='';
    if(action==='reject'){
        rejectNote=prompt('请输入驳回原因（可选）：')||'';
    }
    if(!confirm('确认'+actionText+'"'+clubName+'"的赋分？'+(action==='reject'?'驳回后将退回指导老师确认阶段。':'')))return;
    fetch(api+'/api/scoring/tuanwei-review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({club_name:clubName,action:action,review_note:rejectNote})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.success){toast(res.message,'success');loadTuanweiReviewList();loadFinalCreditsStatus()}
        else toast(res.error,'error');
    });
}

function filterFcTable(){

    });

        var topTags=(d.top_tags||[]).slice(0,8);
        topTags.forEach(function(t){
            h+='<div style="padding:6px 12px;background:rgba(102,126,234,0.06);border-radius:8px;font-size:0.76em;color:#667eea;cursor:pointer" onclick="document.getElementById(\'docSearchInput\').value=\''+esc(t[0])+'\';smartSearchDoc()">'+esc(t[0])+' <span style="opacity:0.6">'+t[1]+'</span></div>';
        });
        bar.innerHTML=h;
    });
}

function loadDocClubFilter(){
    fetch(api+'/api/agent/doc-index/stats').then(function(r){return r.json()}).then(function(res){
        if(!res.success)return;
        var sel=document.getElementById('docClubFilter');
        if(!sel)return;
        (res.data.by_club||[]).forEach(function(c){
            var o=document.createElement('option');o.value=c.club_name;o.textContent=c.club_name+' ('+c.c+')';sel.appendChild(o);
        });
    });
}

function loadDocCatFilter(){
    fetch(api+'/api/agent/doc-index/stats').then(function(r){return r.json()}).then(function(res){
        if(!res.success)return;
        var sel=document.getElementById('docCatFilter');
        if(!sel)return;
        (res.data.by_category||[]).forEach(function(c){
            var o=document.createElement('option');o.value=c.category;o.textContent=c.category+' ('+c.c+')';sel.appendChild(o);
        });
    });
}

function smartSearchDoc(){
    var q=(document.getElementById('docSearchInput')||{}).value||'';
    var club=(document.getElementById('docClubFilter')||{}).value||'';
    var cat=(document.getElementById('docCatFilter')||{}).value||'';
    var box=document.getElementById('docResults');
    if(!box)return;
    box.innerHTML='<div class="empty">搜索中...</div>';
    var url=api+'/api/agent/doc-index/search?q='+encodeURIComponent(q)+'&club='+encodeURIComponent(club)+'&category='+encodeURIComponent(cat);
    fetch(url).then(function(r){return r.json()}).then(function(res){
        if(!res.success){box.innerHTML='<div class="empty">搜索失败</div>';return}
        renderDocResults(res.results||[]);
        if(q.length>=2){
            fetch(api+'/api/agent/doc-index/smart-search?q='+encodeURIComponent(q)).then(function(r2){return r2.json()}).then(function(res2){
                if(res2.success&&res2.data&&res2.data.ai_summary){
                    var sm=document.getElementById('docAiSummary');
                    if(sm){sm.style.display='block';sm.textContent=res2.data.ai_summary}
                }
            });
        }
    });
}

function filterDocIndex(){smartSearchDoc()}

function renderDocResults(items){
    var box=document.getElementById('docResults');
    if(!items.length){box.innerHTML='<div class="empty">未找到匹配的文件</div>';return}
    var h='';
    items.forEach(function(item){
        h+='<div style="padding:12px 14px;background:#fafaff;border-radius:10px;border:1px solid #f0f0f8;margin-bottom:6px">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
        h+='<div style="font-weight:600;color:#1a1a2e;font-size:0.88em">'+esc(item.file_name||item.description||'未知文件')+'</div>';
        if(item.relevance>0)h+='<span style="font-size:0.7em;color:#667eea;background:rgba(102,126,234,0.06);padding:2px 6px;border-radius:4px">相关度 '+item.relevance+'</span>';
        h+='</div>';
        if(item.description&&item.file_name)h+='<div style="font-size:0.78em;color:#6b6d8a;margin-bottom:4px">'+esc(item.description.substring(0,100))+'</div>';
        h+='<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
        if(item.club_name)h+='<span style="font-size:0.72em;color:#667eea;background:rgba(102,126,234,0.06);padding:2px 6px;border-radius:4px">'+esc(item.club_name)+'</span>';
        if(item.category)h+='<span style="font-size:0.72em;color:#f39c12;background:rgba(243,156,18,0.06);padding:2px 6px;border-radius:4px">'+esc(item.category)+'</span>';
        var tags=(item.tags||'').split(',');
        tags.forEach(function(t){
            t=t.trim();if(t)h+='<span style="font-size:0.68em;color:#a0a3bd;background:#f5f5ff;padding:2px 6px;border-radius:4px">'+esc(t)+'</span>';
        });
        h+='<span style="font-size:0.7em;color:#c0c0d0;margin-left:auto">'+(item.created_at||'')+'</span>';
        h+='</div>';
        if(item.file_exists){
            h+='<div style="margin-top:8px;display:flex;gap:8px;align-items:center">';
            h+='<a href="'+api+'/api/agent/doc-index/download/'+item.id+'" style="display:inline-block;font-size:0.78em;color:#667eea;text-decoration:none;padding:4px 12px;background:rgba(102,126,234,0.06);border-radius:6px;border:1px solid rgba(102,126,234,0.15)">📥 下载文件</a>';
            var ext=(item.file_name||'').split('.').pop().toLowerCase();
            var imgExts=['jpg','jpeg','png','gif','webp','bmp'];
            if(imgExts.indexOf(ext)>=0){
                h+='<a href="'+api+'/api/agent/doc-index/download/'+item.id+'" target="_blank" style="font-size:0.78em;color:#6b6d8a;text-decoration:none">🔍 预览</a>';
            }
            h+='</div>';
        }else if(item.file_path){
            h+='<div style="margin-top:8px"><span style="font-size:0.76em;color:#e74c3c;background:rgba(231,76,60,0.06);padding:3px 10px;border-radius:6px">⚠️ 文件已丢失</span></div>';
        }
        h+='</div>';
    });
    box.innerHTML=h;
}

function rebuildDocIndex(){
    if(!confirm('重建索引将重新扫描所有文件并更新标签，确认？'))return;
    fetch(api+'/api/agent/doc-index/rebuild',{method:'POST'}).then(function(r){return r.json()}).then(function(res){
        if(res.success){toast('索引重建完成，共索引 '+res.indexed+' 份文件','success');docIndexInited=false;initDocIndexPage()}
        else toast('索引重建失败','error');
    });
}

function checkAlerts(){
    var box=document.getElementById('alertList');
    if(box)box.innerHTML='<div class="empty">正在巡检...</div>';
    fetch(api+'/api/agent/notification/check').then(function(r){return r.json()}).then(function(res){
        if(!res.success){if(box)box.innerHTML='<div class="empty">巡检失败</div>';return}
        var alerts=res.alerts||[];
        if(!alerts.length){if(box)box.innerHTML='<div style="text-align:center;padding:40px;color:#00b894;font-size:0.9em">系统运行正常，暂无异常预警</div>';return}
        var h='';
        var sevMap={high:{color:'#e74c3c',bg:'#fff5f5',label:'紧急'},warning:{color:'#f39c12',bg:'#fffbf0',label:'警告'},info:{color:'#3498db',bg:'#f0f8ff',label:'提示'}};
        alerts.forEach(function(a){
            var sv=sevMap[a.severity]||sevMap.info;
            h+='<div style="padding:12px 14px;background:'+sv.bg+';border-radius:10px;border-left:4px solid '+sv.color+';margin-bottom:8px">';
            h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">';
            h+='<span style="font-size:0.7em;padding:2px 8px;border-radius:4px;background:'+sv.color+';color:#fff;font-weight:600">'+sv.label+'</span>';
            h+='<span style="font-size:0.82em;font-weight:600;color:#1a1a2e">'+esc(a.type)+'</span>';
            if(a.club_name)h+='<span style="font-size:0.72em;color:#667eea">'+esc(a.club_name)+'</span>';
            h+='</div>';
            h+='<div style="font-size:0.82em;color:#4a4d6a">'+esc(a.message)+'</div>';
            h+='</div>';
        });
        if(box)box.innerHTML=h;
    });
}

function sendAlerts(){
    if(!confirm('将预警通知发送给所有管理员？'))return;
    fetch(api+'/api/agent/notification/send',{method:'POST'}).then(function(r){return r.json()}).then(function(res){
        if(res.success)toast(res.data.message,'success');
        else toast('发送失败','error');
    });
}

function loadInsightReport(){
    var box=document.getElementById('insightReport');
    if(!box)return;
    box.innerHTML='<div class="empty">正在生成分析报告...</div>';
    fetch(api+'/api/agent/insight/report').then(function(r){return r.json()}).then(function(res){
        if(!res.success){box.innerHTML='<div class="empty">生成失败</div>';return}
        var d=res.data;
        var h='<div style="font-size:0.72em;color:#a0a3bd;margin-bottom:10px">生成时间：'+esc(d.generated_at)+'</div>';
        (d.sections||[]).forEach(function(s){
            h+='<div style="margin-bottom:12px;padding:10px 14px;background:#fafaff;border-radius:10px;border-left:3px solid #667eea">';
            h+='<div style="font-weight:600;color:#667eea;margin-bottom:4px;font-size:0.86em">'+esc(s.title)+'</div>';
            h+='<div style="color:#4a4d6a;white-space:pre-wrap">'+esc(s.content)+'</div>';
            h+='</div>';
        });
        box.innerHTML=h;
    });
}
</script>
