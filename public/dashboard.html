<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>济幼社团 - 管理系统</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
<script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f4f5fb;color:#1a1a2e;display:flex}
a{text-decoration:none;color:inherit}

.sidebar{width:240px;background:#fff;height:100vh;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid #ececf5;position:relative;z-index:10}
.mobile-menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:99;width:44px;height:44px;border-radius:12px;background:#fff;border:1px solid #f0f0f8;align-items:center;justify-content:center;font-size:1.2em;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:99}
.sidebar-overlay.show{display:block}
.sb-head{padding:20px 18px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f0f0f8}
.sb-logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:1.1em;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(102,126,234,0.25)}
.sb-title{font-size:1.05em;font-weight:800;color:#1a1a2e;line-height:1.2}
.sb-subtitle{font-size:0.6em;color:#a0a3bd;font-weight:400;letter-spacing:1px}

.sb-role{padding:12px 18px;border-bottom:1px solid #f0f0f8}
.sb-role-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:0.74em;font-weight:700}
.sb-role-badge.admin{background:linear-gradient(135deg,rgba(253,121,168,0.1),rgba(232,67,147,0.1));color:#e84393}
.sb-role-badge.user{background:linear-gradient(135deg,rgba(102,126,234,0.1),rgba(118,75,162,0.1));color:#667eea}
.sb-role-badge.teacher{background:linear-gradient(135deg,rgba(253,203,110,0.1),rgba(243,156,18,0.1));color:#f39c12}
.sb-role-badge.student{background:linear-gradient(135deg,rgba(0,206,209,0.1),rgba(0,184,148,0.1));color:#00b894}

.sb-nav{flex:1;overflow-y:auto;padding:10px 10px}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:#ececf5;border-radius:3px}
.nav-sec{margin-bottom:6px}
.nav-sec-label{font-size:0.62em;font-weight:700;color:#c0c3d8;padding:8px 10px 4px;text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:0.84em;color:#6b6d8a;cursor:pointer;transition:all .2s;margin-bottom:1px;font-weight:500;position:relative}
.nav-item:hover{background:#f5f5ff;color:#1a1a2e}
.nav-item.active{background:linear-gradient(135deg,rgba(102,126,234,0.08),rgba(118,75,162,0.08));color:#667eea;font-weight:700}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:2px;background:linear-gradient(180deg,#667eea,#764ba2)}
.nav-item .ni-emoji{font-size:1.1em;width:22px;text-align:center;flex-shrink:0}
.nav-badge{min-width:18px;height:18px;border-radius:9px;background:#e74c3c;color:#fff;font-size:0.58em;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 5px;margin-left:auto;flex-shrink:0;line-height:1}
.nav-badge.show{display:flex}
.collapsed{display:none!important}
.fb-toggle.open{transform:rotate(180deg)}
.nav-arrow{margin-left:auto;font-size:0.7em;color:#c0c3d8;transition:transform .2s}
.nav-item.has-children.open .nav-arrow{transform:rotate(180deg)}
.nav-children{max-height:0;overflow:hidden;transition:max-height .25s ease}
.nav-children.open{max-height:200px}
.nav-item.nav-sub{padding-left:44px;font-size:0.8em}

.sb-foot{padding:14px 18px;border-top:1px solid #f0f0f8}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-avatar{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.82em;font-weight:700;flex-shrink:0}
.sb-uname{font-size:0.84em;font-weight:700;color:#1a1a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-uclub{font-size:0.64em;color:#a0a3bd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{width:100%;padding:9px;border-radius:10px;border:1.5px solid #ececf5;background:#fafaff;color:#6b6d8a;font-size:0.78em;cursor:pointer;transition:all .2s;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-logout:hover{background:#fff5f5;border-color:#ffd6d6;color:#e74c3c}

.main{flex:1;height:100vh;overflow-y:auto;padding:28px 32px;background:#f4f5fb}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
.page{display:none;animation:pageIn .3s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.pg-title{font-size:1.4em;font-weight:800;color:#1a1a2e;margin-bottom:4px}
.pg-desc{font-size:0.82em;color:#a0a3bd;margin-bottom:22px}

.card{background:#fff;border-radius:16px;padding:22px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.03);border:1px solid #f0f0f8}
.card-title{font-size:0.94em;font-weight:700;color:#1a1a2e;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title .badge{background:linear-gradient(135deg,rgba(102,126,234,0.08),rgba(118,75,162,0.08));color:#667eea;padding:3px 10px;border-radius:6px;font-size:0.68em;font-weight:700}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:linear-gradient(135deg,#fafaff,#f5f5ff);border-radius:14px;padding:18px;text-align:center;border:1px solid #f0f0f8;transition:all .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(102,126,234,0.08)}
.stat-card .sc-num{font-size:1.8em;font-weight:900;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .sc-label{font-size:0.72em;color:#a0a3bd;margin-top:3px;font-weight:500}

.cols-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.form-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.form-row .field{flex:1;min-width:180px}
.form-row .field:only-child{flex:1 1 100%;min-width:100%}
.form-row .field label{display:block;color:#6b6d8a;font-size:0.76em;margin-bottom:5px;font-weight:600}
.form-row .field input,.form-row .field textarea,.form-row .field select{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #eee;color:#1a1a2e;font-size:0.86em;outline:none;font-family:inherit;transition:all .2s;background:#fafaff}
.form-row .field input:focus,.form-row .field textarea:focus,.form-row .field select:focus{border-color:#667eea;background:#fff;box-shadow:0 0 0 3px rgba(102,126,234,0.08)}
.form-row .field textarea{min-height:60px;resize:vertical}
.form-row .field select option{background:#fff;color:#1a1a2e}
.rec-desc-view img{max-width:100%;border-radius:8px;margin:6px 0}
.rec-desc-view p{margin:4px 0}
.rec-desc-view ul,.rec-desc-view ol{padding-left:20px;margin:4px 0}
.rec-desc-view blockquote{border-left:3px solid #ddd;padding-left:10px;color:#888;margin:6px 0}
.rec-desc-view h1,.rec-desc-view h2,.rec-desc-view h3,.rec-desc-view h4,.rec-desc-view h5,.rec-desc-view h6{margin:8px 0 4px;color:#1a1a2e}
.rec-desc-view a{color:#667eea;text-decoration:underline}

.btn{padding:9px 20px;border-radius:10px;border:none;font-size:0.84em;cursor:pointer;font-weight:700;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 3px 12px rgba(102,126,234,0.25)}
.btn-primary:hover{box-shadow:0 5px 20px rgba(102,126,234,0.35);transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,#00b894,#55efc4);color:#fff;box-shadow:0 3px 12px rgba(0,184,148,0.25)}
.btn-success:hover{box-shadow:0 5px 20px rgba(0,184,148,0.35)}
.btn-danger{background:#fff5f5;color:#e74c3c;border:1.5px solid #ffd6d6}
.btn-danger:hover{background:#ffe8e8}
.btn-sm{padding:5px 12px;font-size:0.76em;border-radius:8px}
.btn-ghost{background:#f0f0f8;color:#6b6d8a;border:1.5px solid #e8e8f0}
.btn-ghost:hover{background:#e8e8f0}

.rank-list{display:flex;flex-direction:column;gap:4px}
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;transition:all .2s;cursor:default}
.rank-item:hover{background:#f5f5ff}
.rank-pos{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:0.72em;font-weight:800;flex-shrink:0}
.rank-pos.p1{background:linear-gradient(135deg,#fdcb6e,#f39c12);color:#fff;box-shadow:0 2px 8px rgba(243,156,18,0.3)}
.rank-pos.p2{background:linear-gradient(135deg,#b2bec3,#95a5a6);color:#fff}
.rank-pos.p3{background:linear-gradient(135deg,#e17055,#d63031);color:#fff;box-shadow:0 2px 8px rgba(214,48,49,0.3)}
.rank-pos.pn{background:#f0f0f8;color:#c0c3d8}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:0.86em;color:#1a1a2e;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-teachers{font-size:0.66em;color:#667eea;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-bar-wrap{display:flex;align-items:center;gap:8px;margin-top:4px}
.rank-bar{flex:1;height:6px;background:#f0f0f8;border-radius:3px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.rank-bar-fill.b1{background:linear-gradient(90deg,#667eea,#764ba2)}
.rank-bar-fill.b2{background:linear-gradient(90deg,#00b894,#55efc4)}
.rank-bar-fill.b3{background:linear-gradient(90deg,#fdcb6e,#f39c12)}
.rank-bar-fill.b4{background:linear-gradient(90deg,#fd79a8,#e84393)}
.rank-bar-fill.b5{background:linear-gradient(90deg,#74b9ff,#0984e3)}
.rank-count{font-size:0.76em;font-weight:800;flex-shrink:0;min-width:30px;text-align:right}
.rank-count.c1{color:#667eea}
.rank-count.c2{color:#00b894}
.rank-count.c3{color:#f39c12}
.rank-count.cn{color:#c0c3d8}

.ni{padding:10px 0;border-bottom:1px solid #f5f5ff;display:flex;align-items:flex-start;gap:12px}
.ni:last-child{border-bottom:none}
.ni-date{flex-shrink:0;text-align:center;min-width:42px}
.ni-date .nd-day{font-size:1.2em;font-weight:900;color:#667eea;line-height:1}
.ni-date .nd-month{font-size:0.56em;color:#c0c3d8;margin-top:2px}
.ni-body{flex:1;min-width:0}
.ni .ni-title{font-size:0.82em;color:#1a1a2e;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:5px}
.ni .ni-title .top-tag{background:linear-gradient(135deg,#fd79a8,#e84393);color:#fff;padding:2px 6px;border-radius:4px;font-size:0.62em;font-weight:700}
.ni .ni-content{font-size:0.74em;color:#a0a3bd;line-height:1.5;margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.showcase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.sc-card{background:#fafaff;border-radius:14px;overflow:hidden;transition:all .25s;cursor:pointer;border:1px solid #f0f0f8}
.sc-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(102,126,234,0.1);border-color:#d5d8f0}
.sc-card img{width:100%;height:100px;object-fit:cover}
.sc-card .no-img{width:100%;height:100px;background:linear-gradient(135deg,rgba(102,126,234,0.04),rgba(118,75,162,0.04));display:flex;align-items:center;justify-content:center;font-size:2em;color:#d5d8f0}
.sc-card .sc-info{padding:10px 12px}
.sc-card .sc-name{font-size:0.84em;font-weight:700;color:#1a1a2e}
.sc-card .sc-desc{font-size:0.66em;color:#a0a3bd;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:pre-wrap;word-break:break-word}

.th-post textarea{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #eee;background:#fafaff;color:#1a1a2e;font-size:0.86em;outline:none;min-height:60px;resize:vertical;font-family:inherit;transition:all .2s}
.th-post textarea:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.08)}
.th-post textarea::placeholder{color:#c8cade}
.th-post .th-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px}
.th-post select{padding:6px 10px;border-radius:8px;border:1.5px solid #eee;background:#fafaff;color:#1a1a2e;font-size:0.78em;outline:none;cursor:pointer}
.th-post select option{background:#fff;color:#1a1a2e}
.th-submit{padding:7px 18px;border-radius:8px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:0.8em;font-weight:700;cursor:pointer;transition:all .2s}
.th-submit:hover{box-shadow:0 3px 12px rgba(102,126,234,0.3)}
.th-tabs{display:flex;gap:6px;margin-bottom:12px}
.th-tab{padding:6px 14px;border-radius:8px;font-size:0.76em;cursor:pointer;background:#f0f0f8;color:#a0a3bd;transition:all .2s;font-weight:600;border:none}
.th-tab:hover{color:#6b6d8a}
.th-tab.active{background:linear-gradient(135deg,rgba(102,126,234,0.1),rgba(118,75,162,0.1));color:#667eea}
.th-list{display:flex;flex-direction:column;gap:2px;margin-top:12px;max-height:320px;overflow-y:auto}
.th-item{padding:10px 0;border-bottom:1px solid #f5f5ff}
.th-item:last-child{border-bottom:none}
.th-item .th-content{font-size:0.84em;line-height:1.6;color:#6b6d8a}
.th-item .th-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px;gap:4px}
.th-item .th-scope{font-size:0.62em;padding:2px 6px;border-radius:4px;font-weight:600}
.th-item .th-scope.public{background:rgba(102,126,234,0.06);color:#667eea}
.th-item .th-scope.club{background:rgba(0,184,148,0.06);color:#00b894}
.th-item .th-time{font-size:0.62em;color:#c8cade}
.th-item .th-warn{background:rgba(253,203,110,0.08);border:1px solid rgba(253,203,110,0.15);border-radius:6px;padding:4px 8px;margin-top:4px;font-size:0.72em;color:#f39c12}
.th-item .th-admin{display:flex;gap:4px;margin-top:4px}
.th-item .th-admin button{padding:3px 8px;border-radius:5px;border:none;font-size:0.64em;cursor:pointer;transition:all .15s;font-weight:600}
.th-item .th-admin .btn-hide{background:#fff5f5;color:#e74c3c}
.th-item .th-admin .btn-warn{background:rgba(253,203,110,0.12);color:#f39c12}
.th-item .th-admin .btn-restore{background:rgba(0,184,148,0.08);color:#00b894}

.empty{text-align:center;padding:28px;color:#c8cade;font-size:0.86em}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:12px;font-size:0.84em;z-index:10000;animation:slideIn .3s;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.toast.success{background:#e8f8f0;border:1px solid #b8e6cc;color:#00b894}
.toast.error{background:#fff5f5;border:1px solid #ffd6d6;color:#e74c3c}
@keyframes slideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

.warn-modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.25);z-index:2000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.warn-modal-overlay.show{display:flex}
.warn-modal{background:#fff;border-radius:16px;padding:24px;width:320px;box-shadow:0 12px 40px rgba(0,0,0,0.1)}
.warn-modal h4{font-size:0.96em;color:#1a1a2e;margin-bottom:12px;font-weight:700}
.warn-modal input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #eee;color:#1a1a2e;font-size:0.86em;outline:none;margin-bottom:12px}
.warn-modal input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.08)}
.warn-modal .wm-btns{display:flex;gap:8px;justify-content:flex-end}
.warn-modal .wm-btns button{padding:8px 16px;border-radius:8px;border:none;font-size:0.82em;cursor:pointer;font-weight:600}
.warn-modal .wm-cancel{background:#f0f0f8;color:#6b6d8a}
.warn-modal .wm-confirm{background:linear-gradient(135deg,#fdcb6e,#f39c12);color:#fff}

.iframe-wrap{width:100%;height:calc(100vh - 56px);border:none;border-radius:12px;background:#fff}

.me-header{display:flex;align-items:center;gap:20px;margin-bottom:24px;padding:24px;background:#fff;border-radius:16px;border:1px solid #f0f0f8;box-shadow:0 2px 12px rgba(0,0,0,0.03)}
.me-avatar-wrap{position:relative;cursor:pointer}
.me-avatar{width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:2em;font-weight:800;overflow:hidden;border:3px solid #f0f0f8;transition:all .2s}
.me-avatar:hover{border-color:#667eea;box-shadow:0 4px 16px rgba(102,126,234,0.2)}
.me-avatar img{width:100%;height:100%;object-fit:cover}
.me-avatar-edit{position:absolute;bottom:-2px;right:-2px;width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:0.6em;color:#fff;border:2px solid #fff;cursor:pointer}
.me-info{flex:1}
.me-name{font-size:1.2em;font-weight:800;color:#1a1a2e}
.me-role-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:0.68em;font-weight:700;margin-top:4px}
.me-role-tag.admin{background:rgba(232,67,147,0.08);color:#e84393}
.me-role-tag.user{background:rgba(102,126,234,0.08);color:#667eea}
.me-role-tag.teacher{background:rgba(243,156,18,0.08);color:#f39c12}
.me-role-tag.student{background:rgba(0,184,148,0.08);color:#00b894}
.me-club{font-size:0.82em;color:#a0a3bd;margin-top:4px}
.me-section{background:#fff;border-radius:16px;padding:22px;margin-bottom:16px;border:1px solid #f0f0f8;box-shadow:0 2px 12px rgba(0,0,0,0.03)}
.me-section-title{font-size:0.94em;font-weight:700;color:#1a1a2e;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.me-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.me-field label{display:block;font-size:0.76em;font-weight:600;color:#6b6d8a;margin-bottom:5px}
.me-field input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #eee;color:#1a1a2e;font-size:0.86em;outline:none;transition:all .2s;background:#fafaff}
.me-field input:focus{border-color:#667eea;background:#fff;box-shadow:0 0 0 3px rgba(102,126,234,0.08)}
.me-field input:read-only{background:#f5f5ff;color:#a0a3bd;cursor:default}
.me-save-row{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}

.carousel{position:relative;width:100%;height:340px;border-radius:16px;overflow:hidden;margin-bottom:24px;background:#1a1a2e}
.carousel-track{display:flex;height:100%;transition:transform .5s ease}
.carousel-slide{min-width:100%;height:100%;position:relative;background-size:cover;background-position:center}
.carousel-slide .cs-overlay{position:absolute;bottom:0;left:0;right:0;padding:24px 28px;background:linear-gradient(transparent,rgba(0,0,0,0.7))}
.carousel-slide .cs-title{color:#fff;font-size:1.4em;font-weight:700;margin-bottom:6px}

<script>
function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('show')}
function closeSidebar(){document.querySelector('.sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('show')}
var api=window.location.origin;

var COLLEGES=['数智科技产业学院','信息商务学院','学前教育学院','育婴育幼学院','人文教育学院','艺术学院','体育学院'];
function collegeOptions(selected){
    var h='<option value="">请选择学院</option>';
    COLLEGES.forEach(function(c){h+='<option value="'+esc(c)+'"'+(c===selected?' selected':'')+'>'+esc(c)+'</option>'});
    return h;
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function escJs(s){if(s==null)return '';return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,'\\n').replace(/\r/g,'\\r')}
function escHtml(s){if(!s)return '';return esc(s).replace(/\n/g,'<br>')}
function renderText(s){if(!s)return '';return '<p>'+escHtml(s)+'</p>'}
function safeHtml(h){var d=document.createElement('div');d.innerHTML=h;var scripts=d.querySelectorAll('script,iframe,object,embed,form');for(var i=0;i<scripts.length;i++){scripts[i].remove()}var attrs=d.querySelectorAll('[onclick],[onerror],[onload],[onmouseover]');for(var i=0;i<attrs.length;i++){attrs[i].removeAttribute('onclick');attrs[i].removeAttribute('onerror');attrs[i].removeAttribute('onload');attrs[i].removeAttribute('onmouseover')}return d.innerHTML}
function toast(msg,type){var d=document.createElement('div');d.className='toast '+type;d.textContent=msg;document.body.appendChild(d);setTimeout(function(){d.remove()},3000)}

var _pagSize=20;
function renderPagination(containerId,items,renderFn,page){
    if(!page)page=1;
    var total=Math.ceil(items.length/_pagSize)||1;
    var start=(page-1)*_pagSize;
    var slice=items.slice(start,start+_pagSize);
    var box=document.getElementById(containerId);if(!box)return;
    var h=renderFn(slice);
    if(items.length>_pagSize){
        h+='<div style="display:flex;justify-content:center;align-items:center;gap:8px;margin-top:16px;padding:8px 0">';
        h+='<button class="btn btn-sm btn-ghost" '+(page<=1?'disabled':'')+' onclick="gotoPage(\''+containerId+'\','+(page-1)+')">上一页</button>';
        var startP=Math.max(1,page-2),endP=Math.min(total,page+2);
        if(startP>1)h+='<button class="btn btn-sm btn-ghost" onclick="gotoPage(\''+containerId+'\',1)">1</button>';
        if(startP>2)h+='<span style="color:#a0a3bd">...</span>';
        for(var p=startP;p<=endP;p++){
            h+='<button class="btn btn-sm '+(p===page?'btn-primary':'btn-ghost')+'" onclick="gotoPage(\''+containerId+'\','+p+')">'+p+'</button>';
        }
        if(endP<total-1)h+='<span style="color:#a0a3bd">...</span>';
        if(endP<total)h+='<button class="btn btn-sm btn-ghost" onclick="gotoPage(\''+containerId+'\','+total+')">'+total+'</button>';
        h+='<button class="btn btn-sm btn-ghost" '+(page>=total?'disabled':'')+' onclick="gotoPage(\''+containerId+'\','+(page+1)+')">下一页</button>';
        h+='<span style="font-size:0.78em;color:#a0a3bd;margin-left:8px">共 '+items.length+' 条</span>';
        h+='</div>';
    }
    box.innerHTML=h;
    window['_pagData_'+containerId]=items;
    window['_pagRender_'+containerId]=renderFn;
    window['_pagPage_'+containerId]=page;
}
function gotoPage(containerId,page){
    var items=window['_pagData_'+containerId];
    var renderFn=window['_pagRender_'+containerId];
    if(!items||!renderFn)return;
    renderPagination(containerId,items,renderFn,page);
}

function searchToolbar(id,placeholder,onSearch){

    h+='<span id="'+id+'Count" style="font-size:0.78em;color:#a0a3bd"></span>';
    h+='</div>';
    return h;
}

var _dismissedBadges={};
var _dismissedCounts={};
try{var _sd=localStorage.getItem('dismissedBadges');if(_sd)_dismissedCounts=JSON.parse(_sd)}catch(e){}
function _saveDismissed(){try{localStorage.setItem('dismissedBadges',JSON.stringify(_dismissedCounts))}catch(e){}}
function dismissBadge(feature){
    _dismissedBadges[feature]=true;
    var keys=[feature];
    if(feature==='enroll')keys=['enroll','volunteer','member'];
    keys.forEach(function(k){
        var b=document.getElementById('navBadge-'+k);
        if(b){_dismissedCounts[k]=parseInt(b.textContent)||0;b.classList.remove('show')}
    });
    _saveDismissed();
    fetch(api+'/api/feature-read/'+feature,{method:'POST'}).then(function(){delete _dismissedBadges[feature]}).catch(function(){delete _dismissedBadges[feature]});
}

    var page=document.getElementById('page-'+id);

        try{iframe.contentWindow.postMessage({action:'pageHidden'},'*')}catch(e){}

function loadStudentTools(){
    var typeFilter=(document.getElementById('stuToolTypeFilter')||{}).value||'';
    fetch(api+'/api/tools').then(function(r){return r.json()}).then(function(res){
        if(!res.success){document.getElementById('stuToolList').innerHTML='<div class="empty">加载失败</div>';return}
        var tools=res.data||[];
        if(typeFilter)tools=tools.filter(function(t){return t.toolType===typeFilter});
        var c=document.getElementById('stuToolList');
        if(!tools.length){c.innerHTML='<div class="empty">暂无社团工具</div>';return}
        window._stuToolsCache=tools;
        var typeNames={chain:'🔢 接龙',signup:'📝 报名',vote:'🗳️ 投票',survey:'📊 问卷'};
        var typeColors={chain:'#667eea',signup:'#00b894',vote:'#fdcb6e',survey:'#e17055'};
        var h='';
        tools.forEach(function(t){
            var color=typeColors[t.toolType]||'#667eea';
            var isExpired=t.deadline&&new Date(t.deadline)<new Date();
            h+='<div class="card" style="margin-bottom:12px;border-left:3px solid '+color+'">';
            h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">';
            h+='<div style="flex:1;min-width:0">';
            h+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
            h+='<span style="font-size:0.72em;padding:2px 8px;border-radius:4px;background:'+color+'18;color:'+color+';font-weight:600">'+(typeNames[t.toolType]||t.toolType)+'</span>';
            h+='<span style="font-size:0.92em;font-weight:600;color:#1a1a2e">'+esc(t.title)+'</span>';
            if(isExpired)h+='<span style="font-size:0.68em;padding:2px 6px;border-radius:4px;background:#ffe5e5;color:#e74c3c">已截止</span>';
            h+='</div>';
            if(t.description)h+='<div style="font-size:0.82em;color:#6b6d8a;margin-top:6px;line-height:1.5">'+escHtml(t.description)+'</div>';
            h+='<div style="display:flex;gap:12px;margin-top:8px;font-size:0.74em;color:#a0a3bd">';
            h+='<span>👥 '+t.participantCount+'人参与</span>';
            if(t.deadline)h+='<span>⏰ 截止：'+t.deadline+'</span>';
            h+='</div>';
            if(t.toolType==='vote'&&t.options&&t.options.length){
                h+='<div style="margin-top:8px">';
                var canShowVoteResults=t.resultsVisible&&t.showCounts;
                if(canShowVoteResults){
                    var totalV=t.totalVotes||0;
                    t.options.forEach(function(opt,oi){
                        var cnt=t.results?t.results[String(oi)]||0:0;
                        var pct=totalV>0?Math.round(cnt/totalV*100):0;
                        h+='<div style="margin-bottom:4px"><div style="display:flex;justify-content:space-between;font-size:0.78em"><span>'+esc(opt)+'</span><span style="color:#667eea">'+cnt+'票 ('+pct+'%)</span></div>';
                        h+='<div style="height:6px;border-radius:3px;background:#f0f0f8;overflow:hidden"><div style="height:100%;width:'+pct+'%;border-radius:3px;background:linear-gradient(135deg,'+color+','+color+'aa)"></div></div></div>';
                    });
                    h+='<div style="font-size:0.72em;color:#a0a3bd;margin-top:4px">共 '+totalV+' 票</div>';
                }else{
                    t.options.forEach(function(opt){
                        h+='<div style="font-size:0.78em;color:#4a4d6a;margin-bottom:2px">'+esc(opt)+'</div>';
                    });
                    if(!t.resultsVisible)h+='<div style="font-size:0.72em;color:#a0a3bd;margin-top:4px">投票结果仅创建者可见</div>';
                    else if(!t.showCounts)h+='<div style="font-size:0.72em;color:#a0a3bd;margin-top:4px">投票中，票数暂不显示</div>';
                }
                if(t.anonymous)h+='<div style="font-size:0.72em;color:#a0a3bd">🔒 匿名投票</div>';
                if(t.voteMode==='multi')h+='<div style="font-size:0.72em;color:#667eea">☑ 多选</div>';
                h+='</div>';
            }
            if(t.toolType==='signup'){
                var limitTxt=t.limit>0?t.limit:'不限';
                h+='<div style="margin-top:6px;font-size:0.8em;color:#667eea;font-weight:600">已报名 '+t.participantCount+'/'+limitTxt+'</div>';
            }
            if(t.toolType==='survey'&&t.options&&t.options.length){
                h+='<div style="margin-top:6px;font-size:0.76em;color:#a0a3bd">共 '+t.options.length+' 道题目';
                if(t.perUserLimit&&t.perUserLimit>0)h+=' · 每人限填'+t.perUserLimit+'次';
                h+='</div>';
            }
            h+='</div>';
            h+='<div style="flex-shrink:0">';
            h+='<button class="btn btn-sm btn-primary" onclick="openStuToolParticipate('+t.id+')">'+(isExpired?'查看':'参与')+'</button>';
            h+='</div></div></div>';
        });
        c.innerHTML=h;
    });
}

function openStuToolParticipate(tid){
    var tools=window._stuToolsCache||[];
    var t=tools.find(function(x){return x.id===tid});
    if(!t){toast('工具不存在','error');return}
    var toolType=t.toolType;
    var opts=t.options||[];
    var parts=t.participants||[];
    var isExpired=t.deadline&&new Date(t.deadline)<new Date();
    var mc=document.getElementById('stuToolModalContent');
    var h='<div style="margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f0f0f8">';
    h+='<div style="font-size:1.08em;font-weight:600;color:#1a1a2e">'+esc(t.title)+'</div>';
    if(t.description)h+='<div style="font-size:0.82em;color:#6b6d8a;margin-top:4px">'+escHtml(t.description)+'</div>';
    if(isExpired)h+='<div style="margin-top:6px;font-size:0.78em;color:#e74c3c;font-weight:600">⏰ 该活动已截止</div>';

            h+='<div style="font-size:0.92em;font-weight:600;color:#1a1a2e;margin-bottom:10px">🗳️ 投票结果</div>';
            var canShowResults=t.resultsVisible;
            if(canShowResults){
                var totalV=t.totalVotes||0;
                opts.forEach(function(opt,oi){
                    var cnt=t.results?t.results[String(oi)]||0:0;
                    var pct=totalV>0?Math.round(cnt/totalV*100):0;
                    h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:0.84em;margin-bottom:3px"><span>'+esc(opt)+'</span><span style="color:#667eea;font-weight:600">'+cnt+'票 ('+pct+'%)</span></div>';
                    h+='<div style="height:8px;border-radius:4px;background:#f0f0f8;overflow:hidden"><div style="height:100%;width:'+pct+'%;border-radius:4px;background:linear-gradient(135deg,#667eea,#764ba2)"></div></div></div>';

        }else if(toolType==='signup'){

            h+='<h3 style="font-size:1em;color:#1a1a2e;margin-bottom:14px">📊 填写问卷</h3>';
            if(surveyLimit>0){
                h+='<div style="font-size:0.82em;color:'+(canFillSurvey?'#667eea':'#e74c3c')+';font-weight:600;margin-bottom:10px">您已填写 '+mySurveyCount+'/'+surveyLimit+' 次'+(canFillSurvey?'':'，已达上限')+'</div>';
            }
            if(canFillSurvey){
                opts.forEach(function(q,i){
                    h+='<div style="margin-bottom:14px"><div style="font-size:0.88em;font-weight:600;color:#1a1a2e;margin-bottom:6px">'+(i+1)+'. '+esc(q)+'</div>';
                    h+='<textarea id="stuSurveyQ'+i+'" placeholder="请输入你的回答" rows="2" style="width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #eee;background:#fafaff;font-size:0.86em;outline:none;resize:vertical;font-family:inherit"></textarea></div>';
                });
                h+='<div style="text-align:right"><button class="btn btn-primary" onclick="submitStuTool('+tid+',\'survey\')">提交问卷</button></div>';
            }else{
                h+='<div style="text-align:center;padding:20px;color:#a0a3bd;font-size:0.9em">您已达到填写次数上限</div>';
            }
        }
    }
    mc.innerHTML=h;
    document.getElementById('stuToolModal').style.display='block';
    window._stuVoteChoice=-1;
    window._stuVoteChoices=[];
    window._currentStuToolId=tid;
}

function selectStuVote(el,idx){
    var tools=window._stuToolsCache||[];
    var modal=document.getElementById('stuToolModalContent');
    var currentTool=null;
    if(window._currentStuToolId){currentTool=tools.find(function(x){return x.id===window._currentStuToolId})}
    var isMulti=currentTool&&currentTool.voteMode==='multi';
    if(isMulti){
        if(el.classList.contains('selected')){
            el.style.borderColor='#f0f0f8';el.style.background='';el.classList.remove('selected');
            window._stuVoteChoices=(window._stuVoteChoices||[]).filter(function(v){return v!==idx});
        }else{
            el.style.borderColor='#667eea';el.style.background='rgba(102,126,234,0.06)';el.classList.add('selected');
            if(!window._stuVoteChoices)window._stuVoteChoices=[];
            window._stuVoteChoices.push(idx);
        }
    }else{
        document.querySelectorAll('.stu-vote-opt').forEach(function(o){o.style.borderColor='#f0f0f8';o.style.background='';o.classList.remove('selected')});
        el.style.borderColor='#667eea';el.style.background='rgba(102,126,234,0.06)';el.classList.add('selected');
        window._stuVoteChoice=idx;
        window._stuVoteChoices=[idx];
    }
}

function submitStuTool(tid,toolType){
    var data={};
    if(toolType==='chain'){
        data.content=(document.getElementById('stuChainContent')||{}).value||'';
        if(!data.content){toast('请输入接龙内容','error');return}
    }else if(toolType==='signup'){
        data.info=(document.getElementById('stuSignupInfo')||{}).value||'';
        if(!data.info){toast('请输入报名信息','error');return}
    }else if(toolType==='vote'){
        var tools=window._stuToolsCache||[];
        var currentTool=tools.find(function(x){return x.id===tid});
        var isMulti=currentTool&&currentTool.voteMode==='multi';
        if(isMulti){
            if(!window._stuVoteChoices||window._stuVoteChoices.length===0){toast('请选择至少一个投票选项','error');return}
            data.choices=window._stuVoteChoices;
        }else{
            if(window._stuVoteChoice<0){toast('请选择投票选项','error');return}
            data.choice=window._stuVoteChoice;
        }
    }else if(toolType==='survey'){
        var answers={};
        var opts=document.querySelectorAll('[id^="stuSurveyQ"]');
        opts.forEach(function(el){
            var idx=el.id.replace('stuSurveyQ','');
            answers[idx]=el.value.trim();
        });
        data.answers=answers;
    }
    fetch(api+'/api/tools/'+tid+'/participate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){return r.json()}).then(function(res){
        if(res.success){toast('参与成功！','success');closeStuToolModal();loadStudentTools()}
        else{toast(res.error||'操作失败','error')}
    }).catch(function(){toast('操作失败','error')});
}

    document.getElementById('stuToolModal').style.display='none';

}

function toggleOcDownloadPanel(){
    var p=document.getElementById('ocDownloadPanel');if(!p)return;
    if(p.style.display==='none'){
        p.style.display='block';
        var sel=document.getElementById('ocDlClub');
        if(sel&&sel.options.length<=1){
            var clubSet={};
            _ocAllData.forEach(function(d){if(d.clubName)clubSet[d.clubName]=true});
            Object.keys(clubSet).sort().forEach(function(c){
                sel.innerHTML+='<option value="'+esc(c)+'">'+esc(c)+'</option>';
            });
        }

function downloadOcAttachments(){
    var club=(document.getElementById('ocDlClub')||{}).value||'';
    var dateStart=(document.getElementById('ocDlDateStart')||{}).value||'';
    var dateEnd=(document.getElementById('ocDlDateEnd')||{}).value||'';
    var status=(document.getElementById('ocDlStatus')||{}).value||'';
    var url=api+'/api/offcampus/download-attachments?';
    var params=[];
    if(club)params.push('club='+encodeURIComponent(club));
    if(dateStart)params.push('date_start='+encodeURIComponent(dateStart));
    if(dateEnd)params.push('date_end='+encodeURIComponent(dateEnd));
    if(status)params.push('status='+encodeURIComponent(status));
    var fullUrl=url+params.join('&');
    var btn=event.target;if(btn)btn.disabled=true;
    fetch(fullUrl).then(function(r){
        if(!r.ok){
            return r.json().then(function(e){throw new Error(e.error||'下载失败')}).catch(function(){throw new Error('下载失败')});
        }
        var disposition=r.headers.get('Content-Disposition');
        var filename='校外活动附件.zip';
        if(disposition){
            var match=disposition.match(/filename\*?=(?:UTF-8'')?(.+)/i);
            if(match)filename=decodeURIComponent(match[1].replace(/['"]/g,''));
        }
        return r.blob().then(function(blob){return {blob:blob,filename:filename}});
    }).then(function(result){
        var a=document.createElement('a');
        a.href=URL.createObjectURL(result.blob);
        a.download=result.filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        toast('下载成功','success');
    }).catch(function(e){
        toast(e.message||'下载失败','error');
    }).finally(function(){
        if(btn)btn.disabled=false;
    });
}

function loadOffcampusList(){
    fetch(api+'/api/offcampus').then(function(r){return r.json()}).then(function(res){
        if(!res.success||!res.data){_ocAllData=[];filterOffcampus();return}
        _ocAllData=res.data;
        filterOffcampus();
    }).catch(function(e){
        _ocAllData=[];filterOffcampus();
        toast('加载校外活动列表失败：'+(e.message||'网络错误'),'error');
    });
}

function filterOffcampus(){
    var box=document.getElementById('ocList');if(!box)return;
    var isAdmin=currentUser.role==='admin';
    var filtered=_ocAllData;
    if(isAdmin&&ocFilter!=='all')filtered=filtered.filter(function(d){return d.status===ocFilter});
    var ocStart=(document.getElementById('ocStartDate')||{}).value||'';
    var ocEnd=(document.getElementById('ocEndDate')||{}).value||'';
    if(ocStart)filtered=filtered.filter(function(d){var t=(d.time||'').substring(0,10);return t>=ocStart});
    if(ocEnd)filtered=filtered.filter(function(d){var t=(d.time||'').substring(0,10);return t<=ocEnd});
    var q=(document.getElementById('ocSearch')||{}).value||'';
    q=q.trim().toLowerCase();
    if(q)filtered=filtered.filter(function(d){
        return (d.clubName||'').toLowerCase().indexOf(q)>=0||(d.title||'').toLowerCase().indexOf(q)>=0;
    });
    if(!filtered.length){box.innerHTML='<div class="empty">暂无申请记录</div>';return}
    renderPagination('ocList',filtered,function(list){
        var h='';list.forEach(function(d){
            var statusLabel=d.status==='pending'?'待审批':d.status==='approved'?'已通过':'已驳回';
            var statusColor=d.status==='pending'?'#f39c12':d.status==='approved'?'#00b894':'#e74c3c';
            h+='<div style="padding:16px;border:1px solid #f0f0f8;border-radius:12px;margin-bottom:12px;background:#fff">';
            h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
            h+='<div style="font-size:1em;font-weight:700;color:#1a1a2e">'+esc(d.title)+'</div>';
            h+='<span style="font-size:0.78em;color:'+statusColor+';font-weight:600">'+statusLabel+'</span></div>';
            if(isAdmin)h+='<div style="font-size:0.82em;color:#667eea;margin-bottom:6px">'+esc(d.clubName)+'</div>';
            if(d.location)h+='<div style="font-size:0.82em;color:#6b6d8a">'+esc(d.location)+'</div>';
            if(d.activityDate)h+='<div style="font-size:0.82em;color:#6b6d8a">'+esc(d.activityDate)+'</div>';
            if(d.description)h+='<div style="font-size:0.82em;color:#6b6d8a;margin-top:6px;line-height:1.5">'+escHtml(d.description)+'</div>';
            if(d.fileName)h+='<div style="font-size:0.78em;color:#667eea;margin-top:6px">附件：<a href="'+api+d.fileUrl+'" target="_blank" style="color:#667eea">'+esc(d.fileName)+'</a></div>';
            h+='<div style="font-size:0.72em;color:#a0a3bd;margin-top:6px">'+esc(d.time)+'</div>';
            if(d.status==='rejected'&&d.rejectReason)h+='<div style="font-size:0.82em;color:#e74c3c;margin-top:6px">驳回原因：'+esc(d.rejectReason)+'</div>';
            if(isAdmin&&d.status==='pending'){
                h+='<div style="display:flex;gap:8px;margin-top:12px">';
                h+='<button class="btn btn-sm btn-success" onclick="approveOffcampus('+d.id+')">通过</button>';
                h+='<button class="btn btn-sm btn-danger" onclick="showRejectOffcampus('+d.id+')">驳回</button>';
                h+='<div id="ocReject'+d.id+'" style="display:none;margin-top:8px;width:100%">';
                h+='<input id="ocRejectReason'+d.id+'" placeholder="请输入驳回原因" style="width:100%;padding:8px;border:1px solid #e0e0e8;border-radius:8px;font-size:0.88em" />';
                h+='<div style="margin-top:6px"><button class="btn btn-sm btn-danger" onclick="rejectOffcampus('+d.id+')">确认驳回</button></div></div>';
                h+='</div>';
            }
            if(d.status==='pending'&&!isAdmin){
                h+='<button class="btn btn-sm btn-danger" style="margin-top:8px" onclick="deleteOffcampus('+d.id+')">撤回申请</button>';
            }
            h+='</div>';
        });return h;
    });
}

function submitOffcampus(){
    var title=document.getElementById('ocTitle').value.trim();
    var location=document.getElementById('ocLocation').value.trim();
    var dateStart=document.getElementById('ocDateStart').value;
    var dateEnd=document.getElementById('ocDateEnd').value;
    var description=document.getElementById('ocDesc').value.trim();
    var fileInput=document.getElementById('ocFile');
    if(!title){toast('请填写活动名称','error');return}
    if(!dateStart){toast('请选择活动开始时间','error');return}
    if(!dateEnd){toast('请选择活动结束时间','error');return}
    if(dateEnd&&dateStart&&new Date(dateEnd.replace(/-/g,'/'))<=new Date(dateStart.replace(/-/g,'/'))){toast('活动结束时间必须晚于开始时间','error');return}
    var activityDate=dateStart.replace('T',' ')+' ~ '+dateEnd.replace('T',' ');
    var fd=new FormData();
    fd.append('title',title);
    fd.append('location',location);
    fd.append('activityDate',activityDate);
    fd.append('description',description);
    if(fileInput.files&&fileInput.files[0])fd.append('file',fileInput.files[0]);
    fetch(api+'/api/offcampus',{method:'POST',body:fd}).then(function(r){
        if(!r.ok)return r.text().then(function(t){try{var e=JSON.parse(t);throw new Error(e.error||'提交失败')}catch(err){if(err.message&&err.message!=='提交失败')throw err;throw new Error('提交失败('+r.status+')')}});
        return r.json();
    }).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('申请已提交，等待管理员审批','success');
        document.getElementById('ocTitle').value='';
        document.getElementById('ocLocation').value='';
        document.getElementById('ocDateStart').value='';
        document.getElementById('ocDateEnd').value='';
        document.getElementById('ocDesc').value='';
        document.getElementById('ocFile').value='';
        loadOffcampusList();
    }).catch(function(e){toast(e.message||'提交失败','error')});
}

        toast('已通过审批','success');loadOffcampusList();pollAdminNotifyBadge();

}

function showRejectOffcampus(id){

function rejectOffcampus(id){
    var reasonEl=document.getElementById('ocRejectReason'+id);
    var reason=reasonEl?reasonEl.value.trim():'';
    if(!reason){toast('请输入驳回原因','error');return}
    fetch(api+'/api/offcampus/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'reject',rejectReason:reason})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('已驳回申请','success');loadOffcampusList();pollAdminNotifyBadge();
    });
}

    if(c.teachers&&c.teachers.length)h+='<div style="padding:10px;background:#fff0f8;border-radius:8px"><div style="font-size:0.78em;color:#a0a3bd">指导老师</div><div style="font-weight:600">'+c.teachers.map(function(t){return esc(t.name)}).join('、')+'</div></div>';
    if(c.leaders&&c.leaders.length)h+='<div style="padding:10px;background:#f8f0ff;border-radius:8px"><div style="font-size:0.78em;color:#a0a3bd">负责人账号</div><div style="font-weight:600">'+c.leaders.map(function(l){return esc(l.username)}).join('、')+'</div></div>';
    h+='</div></div>';
    if(c.departments&&c.departments.length){
        h+='<div class="card" style="margin-top:12px"><div class="card-title">部门结构 <span class="badge">'+c.totalDepts+'</span></div>';
        var deptMap={};
        c.departments.forEach(function(d){deptMap[d.id]=d});
        var roots=c.departments.filter(function(d){return !d.parentId||d.parentId===0});
        var childrenMap={};
        c.departments.forEach(function(d){
            var pid=d.parentId||0;
            if(!childrenMap[pid])childrenMap[pid]=[];
            childrenMap[pid].push(d);
        });
        function renderDept(dept,level){
            var indent=level*24;
            var hh='<div style="margin-left:'+indent+'px;padding:10px 14px;border-left:3px solid '+(level===0?'#667eea':'#a0a3bd')+';margin-bottom:8px;background:#fafbff;border-radius:0 8px 8px 0">';
            hh+='<div style="display:flex;justify-content:space-between;align-items:center">';
            hh+='<div style="font-weight:600;color:#1a1a2e">'+esc(dept.name)+'</div>';
            hh+='<span style="font-size:0.78em;color:#667eea">'+dept.memberCount+'人</span></div>';
            if(dept.description)hh+='<div style="font-size:0.82em;color:#6b6d8a;margin-top:4px">'+esc(dept.description)+'</div>';
            if(dept.members&&dept.members.length){
                hh+='<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">';
                dept.members.forEach(function(m){
                    hh+='<span style="font-size:0.78em;background:#f0f2ff;color:#4a4d8a;padding:3px 10px;border-radius:12px">'+esc(m.realName||m.className)+'</span>';
                });
                hh+='</div>';
            }
            hh+='</div>';
            var kids=childrenMap[dept.id]||[];
            kids.forEach(function(k){hh+=renderDept(k,level+1)});
            return hh;
        }
        roots.forEach(function(r){h+=renderDept(r,0)});
        h+='</div>';
    }
    if(c.unassignedMembers&&c.unassignedMembers.length){
        h+='<div class="card" style="margin-top:12px"><div class="card-title">未分配部门成员 <span class="badge">'+c.unassignedMembers.length+'</span></div>';
        h+='<div style="display:flex;flex-wrap:wrap;gap:6px;padding:8px 0">';
        c.unassignedMembers.forEach(function(m){
            h+='<span style="font-size:0.82em;background:#fff0f0;color:#8a4a4a;padding:4px 12px;border-radius:12px">'+esc(m.realName||m.className)+'</span>';
        });
        h+='</div></div>';
    }
    h+='</div>';
    box.innerHTML=h;
    box.scrollIntoView({behavior:'smooth'});
}

function saveClubLeaderEdit(id){

        realName:document.getElementById('elRealName').value.trim(),
        studentId:document.getElementById('elStudentId').value.trim(),
        college:document.getElementById('elCollege').value.trim(),

        phone:document.getElementById('elPhone').value.trim()

                h+='<th style="text-align:left;padding:6px 8px;border-bottom:1px solid #f0f0f8;color:#6b6d8a;font-size:0.72em">班级</th>';

function teacherScoringReviewAction(reviewId,action){
    var oldModals=document.querySelectorAll('div[data-review-modal]');
    for(var i=0;i<oldModals.length;i++)oldModals[i].remove();
    var overlay=document.createElement('div');
    overlay.setAttribute('data-review-modal','1');
    overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:9999;display:flex;justify-content:center;align-items:center';
    var card=document.createElement('div');
    card.style.cssText='background:#fff;border-radius:20px;padding:0;max-width:380px;width:90%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.15)';
    var header=document.createElement('div');
    if(action==='approve'){
        header.style.cssText='background:linear-gradient(135deg,#00b894,#55efc4);padding:20px 24px';
        header.innerHTML='<div style="color:#fff;font-size:1em;font-weight:700">确认通过赋分</div><div style="color:rgba(255,255,255,0.8);font-size:0.78em;margin-top:4px">通过后赋分将进入下一环节</div>';
    }else{
        header.style.cssText='background:linear-gradient(135deg,#e74c3c,#c0392b);padding:20px 24px';
        header.innerHTML='<div style="color:#fff;font-size:1em;font-weight:700">驳回赋分</div><div style="color:rgba(255,255,255,0.8);font-size:0.78em;margin-top:4px">驳回后社团负责人可重新修改赋分</div>';
    }
    card.appendChild(header);
    var body=document.createElement('div');
    body.style.cssText='padding:24px';
    if(action==='reject'){
        var warn=document.createElement('div');
        warn.style.cssText='background:#fff8f0;border:1px solid #ffe0b2;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:0.82em;color:#e67e22;line-height:1.6';
        warn.textContent='驳回后赋分将退回草稿状态，社团负责人可重新修改并提交。';
        body.appendChild(warn);
    }
    var label=document.createElement('label');
    label.style.cssText='display:block;font-size:0.82em;font-weight:700;color:#1a1a2e;margin-bottom:8px';
    if(action==='reject'){
        label.innerHTML='驳回原因 <span style="color:#e74c3c">*</span>';
    }else{
        label.textContent='备注（可选）';
    }
    body.appendChild(label);
    var ta=document.createElement('textarea');
    ta.rows=action==='reject'?3:2;
    ta.placeholder=action==='reject'?'请说明驳回原因...':'可填写审核备注...';
    ta.style.cssText='width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid #e8e8f0;background:#fafaff;font-size:0.88em;resize:vertical;line-height:1.6;font-family:inherit;outline:none;box-sizing:border-box';
    if(action==='reject'){
        ta.onfocus=function(){ta.style.borderColor='#e74c3c'};
        ta.onblur=function(){ta.style.borderColor='#e8e8f0'};
    }
    body.appendChild(ta);
    var btnRow=document.createElement('div');
    btnRow.style.cssText='display:flex;gap:10px;justify-content:flex-end;margin-top:16px';
    var cancelBtn=document.createElement('button');
    cancelBtn.className='btn btn-ghost';
    cancelBtn.textContent='取消';
    cancelBtn.onclick=function(){overlay.remove()};
    btnRow.appendChild(cancelBtn);
    var confirmBtn=document.createElement('button');
    if(action==='approve'){
        confirmBtn.className='btn btn-success';
        confirmBtn.textContent='确认通过';
    }else{
        confirmBtn.className='btn';
        confirmBtn.style.cssText='background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;box-shadow:0 3px 12px rgba(231,76,60,0.25)';
        confirmBtn.textContent='确认驳回';
    }
    confirmBtn.onclick=function(){
        var note=ta.value.trim();
        if(action==='reject'&&!note){toast('请填写驳回原因','error');ta.focus();return}
        confirmBtn.disabled=true;
        confirmBtn.textContent='提交中...';
        fetch(api+'/api/scoring/teacher-review/'+reviewId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:action,review_note:note})})
        .then(function(r){return r.json()}).then(function(res){
            if(res.success){toast(res.message||'审核完成','success');overlay.remove();loadTeacherScoringReviews();pollUnreadNotif()}
            else{toast(res.error||'操作失败','error');confirmBtn.disabled=false;confirmBtn.textContent=action==='approve'?'确认通过':'确认驳回'}
        }).catch(function(){toast('操作失败','error');confirmBtn.disabled=false;confirmBtn.textContent=action==='approve'?'确认通过':'确认驳回'});
    };
    btnRow.appendChild(confirmBtn);
    body.appendChild(btnRow);
    card.appendChild(body);
    overlay.appendChild(card);
    overlay.onclick=function(e){if(e.target===overlay)overlay.remove()};
    document.body.appendChild(overlay);
    if(action==='reject'){setTimeout(function(){ta.focus()},100)}
}

function loadCheckinStats(){

        var box=document.getElementById('maCheckinStats');if(!box)return;

        if(!res.success||!res.data||!res.data.length){box.innerHTML='<div class="empty">暂无签到数据</div>';return}
        var maxCount=res.data[0].activityCount||1;

            h+='<td style="text-align:center"><span style="display:inline-block;min-width:24px;padding:2px 8px;border-radius:4px;font-weight:700;color:#667eea;background:rgba(102,126,234,0.06)">'+s.activityCount+'</span></td>';
            h+='<td style="text-align:center"><span style="color:'+rateColor+';font-weight:600;font-size:0.9em">'+rate+'%</span></td>';
            h+='<td style="text-align:center"><button class="btn btn-sm" style="background:rgba(102,126,234,0.06);color:#667eea;font-size:0.7em;padding:2px 8px" onclick="showCheckinStatsDetail(\''+escJs(s.studentName)+'\')">详情</button></td>';
            h+='</tr>';
        });
        h+='</table>';
        h+='<div style="margin-top:16px"><div style="font-size:0.82em;font-weight:600;color:#1a1a2e;margin-bottom:8px">📊 活动参与排行</div>';

            var barPct=Math.round(s.activityCount/maxCount*100);

            h+='<span style="width:20px;font-size:0.72em;color:#a0a3bd;text-align:right;flex-shrink:0">'+(i+1)+'</span>';

    });

function filterClubList(){
    var search=(document.getElementById('clubSearchInput')||{}).value||'';
    var category=(document.getElementById('clubCategoryFilter')||{}).value||'';
    var data=window._allClubsData||[];
    if(search){var kw=search.toLowerCase();data=data.filter(function(d){return d.clubName.toLowerCase().indexOf(kw)!==-1})}
    if(category){data=data.filter(function(d){return d.category===category})}
    renderClubList(data);
}

function followClub(clubName){
    fetch(api+'/api/club-favorites/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({club_name:clubName})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.success){toast(res.favorited?'已收藏 '+clubName:'已取消收藏 '+clubName,'success')}
        else{toast(res.error||'操作失败','error')}
    }).catch(function(){toast('操作失败','error')});
}

function toggleFavoriteClub(clubName,btn){
    fetch(api+'/api/club-favorites/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({club_name:clubName})})

        if(res.success){

                btn.style.color='#f39c12';

function doHandleQuit(appId,action){
    var handlerNote='';
    if(action==='approve'){
        var noteEl=document.getElementById('approveNote');
        handlerNote=noteEl?noteEl.value.trim():'';
    }else{
        var noteEl=document.getElementById('rejectNote');
        handlerNote=noteEl?noteEl.value.trim():'';
        if(!handlerNote){toast('请填写拒绝原因','error');return}
    }
    fetch(api+'/api/quit-applications/'+appId+'/handle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:action,handler_note:handlerNote})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.success){toast(res.message||'操作成功','success');var m=document.querySelector('div[style*="z-index:9999"]');if(m)m.remove();loadQuitManagePage();pollUnreadNotif()}
        else{toast(res.error||'操作失败','error')}
    }).catch(function(){toast('操作失败','error')});
}

function switchTHScope(scope){
    currentTHScope=scope;
    document.querySelectorAll('.th-tab').forEach(function(t){t.classList.toggle('active',t.dataset.scope===scope)});
    var cs=document.getElementById('thClubSection');
    if(cs){
        if(scope==='club'){cs.style.display='block'}
        else{cs.style.display='none'}
    }
    loadTreeHole();
}

function loadTreeHole(){
    var url;
    if(currentTHScope==='club'){
        var club='';
        if(currentUser&&currentUser.role==='admin'){var sel=document.getElementById('thClubSelect');club=sel?sel.value:''}
        else if(currentUser&&currentUser.clubName){club=currentUser.clubName}
        else{var sel=document.getElementById('thClubSelect');club=sel?sel.value:''}
        if(!club){var c=document.getElementById('thList');if(c)c.innerHTML='<div class="empty">请选择社团</div>';return}
        url=api+'/api/tree-hole?scope=club&club='+encodeURIComponent(club);
    }else{url=api+'/api/tree-hole?scope=public'}
    fetch(url).then(function(r){return r.json()}).then(function(res){
        var c=document.getElementById('thList');if(!c)return;
        if(res.error){c.innerHTML='<div class="empty">'+esc(res.error)+'</div>';return}
        if(!res.success||!res.data||!res.data.length){c.innerHTML='<div class="empty">暂无吐槽</div>';return}
        var h='';res.data.forEach(function(t){
            h+='<div class="th-item"><div class="th-content">'+escHtml(t.content)+'</div><div class="th-meta">';
            h+='<span class="th-scope '+t.scope+'">'+(t.scope==='public'?'🌍 公共':'🏠 '+esc(t.clubName))+'</span>';
            h+='<span class="th-time">'+t.time+'</span></div>';
            if(t.status==='warned'&&t.adminNote)h+='<div class="th-warn">⚠️ '+escHtml(t.adminNote)+'</div>';
            if(currentUser&&currentUser.role==='admin'){
                h+='<div class="th-admin">';
                if(t.status!=='hidden')h+='<button class="btn-hide" onclick="manageTH('+t.id+',\'hide\')">隐藏</button>';
                if(t.status!=='warned')h+='<button class="btn-warn" onclick="manageTH('+t.id+',\'warn\')">警告</button>';
                if(t.status==='warned'||t.status==='hidden')h+='<button class="btn-restore" onclick="manageTH('+t.id+',\'restore\')">恢复</button>';
                h+='</div>';
            }
            h+='</div>';
        });c.innerHTML=h;
    });
}

function postTreeHole(){
    var content=document.getElementById('thContent').value.trim();
    if(!content){toast('请输入内容','error');return}
    var scope=currentTHScope;var club='';
    if(scope==='club'){
        if(currentUser&&currentUser.role==='admin'){var sel=document.getElementById('thClubSelect');club=sel?sel.value:''}
        else if(currentUser&&currentUser.clubName){club=currentUser.clubName}
        else{var sel=document.getElementById('thClubSelect');club=sel?sel.value:''}
        if(!club){toast('请选择社团','error');return}
    }
    fetch(api+'/api/tree-hole',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:content,scope:scope,clubName:club})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.error){toast(res.error,'error');return}
        toast('发表成功','success');document.getElementById('thContent').value='';loadTreeHole();

}

function manageTH(id,action){
    if(action==='warn'){warnTargetId=id;document.getElementById('warnModal').classList.add('show');document.getElementById('warnNote').value='';return}
    fetch(api+'/api/tree-hole/'+id+'/manage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:action})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.success){toast(action==='hide'?'已隐藏':'已恢复','success');loadTreeHole()}else{toast(res.error||'操作失败','error')}

}

function saveProfile(){
    var phoneInput=document.getElementById('mePhone');
    var newPhone=phoneInput?phoneInput.value.trim():'';
    var data={
        realName:(document.getElementById('meRealName')||{}).value||'',
        studentId:(document.getElementById('meStudentId')||{}).value||'',
        grade:(document.getElementById('meGrade')||{}).value||'',
        className:(document.getElementById('meClass')||{}).value||'',
            college:(document.getElementById('meCollege')||{}).value||'',
        phone:newPhone,
        email:(document.getElementById('meEmail')||{}).value||''
    };
    var oldPhone=window._currentPhone||'';
    if(newPhone&&oldPhone&&newPhone!==oldPhone){
        var pass=prompt('修改手机号需要验证身份，请输入当前密码：');
        if(pass===null)return;
        if(!pass){toast('需要输入密码才能修改手机号','error');return}
        data.confirmPassword=pass;
    }
    fetch(api+'/api/my-profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){return r.json().then(function(res){return{ok:r.ok,status:r.status,data:res}})})
    .then(function(result){
        var res=result.data;
        if(!result.ok||res.error){
            if(res.needPassword){toast('密码错误，手机号未修改','error')}
            else if(res.error){toast(res.error,'error')}
            else{toast('保存失败（状态码：'+result.status+'）','error')}
            return;
        }
        if(res.phoneChanged){toast('手机号已更新','success')}
        else{toast('保存成功','success')}
        loadMyProfile();
    }).catch(function(err){toast('保存失败：'+(err.message||'网络错误'),'error')});
}

        }else{toast(res.error||'上传失败','error')}

}

function loadStudentRecruitList(type){
    var boxId=type==='volunteer'?'volunteerList':'memberRecruitList';
    var box=document.getElementById(boxId);if(!box)return;
    var srlStart=(document.getElementById(type==='volunteer'?'volStartDate':'memRecStartDate')||{}).value||'';
    var srlEnd=(document.getElementById(type==='volunteer'?'volEndDate':'memRecEndDate')||{}).value||'';
    var dateParams='';
    if(srlStart)dateParams+='&start_date='+encodeURIComponent(srlStart);
    if(srlEnd)dateParams+='&end_date='+encodeURIComponent(srlEnd);
    fetch(api+'/api/recruitments?'+dateParams).then(function(r){return r.json()}).then(function(res){
        if(!res.success){box.innerHTML='<div class="empty">加载失败</div>';return}
        var list=(res.data||[]).filter(function(r){return r.recruitType===type});
        if(!list.length){box.innerHTML='<div class="empty">暂无'+(type==='volunteer'?'志愿者':'活动成员')+'招募</div>';return}
        fetch(api+'/api/my-recruit-signups').then(function(r2){return r2.json()}).then(function(sres){
            var myIds={};(sres.success?sres.data||[]:[]).forEach(function(s){myIds[s.recruitmentId]=true});
            var h='';
            list.forEach(function(rec){
                var isFull=rec.maxCount>0&&rec.currentCount>=rec.maxCount;
                var alreadySigned=!!myIds[rec.id];
                var isExpired=false;
                if(rec.deadline){
                    try{isExpired=new Date(rec.deadline.replace(' ','T'))<new Date()}catch(e){isExpired=false}
                }
                h+='<div class="card" style="margin-bottom:12px">';
                h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
                h+='<div style="font-size:0.95em;font-weight:700;color:#1a1a2e">'+esc(rec.title)+'</div>';
                if(isExpired)h+='<span style="background:rgba(108,92,231,0.1);color:#6c5ce7;padding:2px 10px;border-radius:10px;font-size:0.72em;font-weight:600">已截止</span>';
                else if(isFull)h+='<span style="background:rgba(232,67,147,0.1);color:#e84393;padding:2px 10px;border-radius:10px;font-size:0.72em;font-weight:600">已满</span>';
                else if(alreadySigned)h+='<span style="background:rgba(0,184,148,0.1);color:#00b894;padding:2px 10px;border-radius:10px;font-size:0.72em;font-weight:600">已报名</span>';
                else h+='<span style="background:rgba(0,184,148,0.1);color:#00b894;padding:2px 10px;border-radius:10px;font-size:0.72em;font-weight:600">报名中</span>';
                h+='</div>';
                h+='<div style="font-size:0.82em;color:#6b6d8a;margin-bottom:6px">🏫 '+esc(rec.clubName)+'</div>';
                if(rec.description)h+='<div class="rec-desc-view" style="font-size:0.82em;color:#4a4d6a;margin-bottom:8px;line-height:1.5">'+safeHtml(rec.description)+'</div>';
                h+='<div style="display:flex;gap:12px;font-size:0.78em;color:#a0a3bd;margin-bottom:10px">';
                h+='<span>👥 '+rec.currentCount+'/'+(rec.maxCount>0?rec.maxCount:'不限')+'</span>';
                if(rec.deadline)h+='<span>⏰ 截止：'+esc(rec.deadline)+'</span>';
                h+='</div>';
                if(!isFull&&!alreadySigned&&!isExpired){
                    h+='<button class="btn btn-sm btn-success" onclick="signupRecruitment('+rec.id+')">✅ 立即报名</button>';
                }
                h+='</div>';
            });
            box.innerHTML=h;
        });
    });
}

function loadRecruitList(){
    var recStart=(document.getElementById('recStartDate')||{}).value||'';
    var recEnd=(document.getElementById('recEndDate')||{}).value||'';
    var dateParams='';
    if(recStart)dateParams+='&start_date='+encodeURIComponent(recStart);
    if(recEnd)dateParams+='&end_date='+encodeURIComponent(recEnd);
    fetch(api+'/api/recruitments?'+dateParams).then(function(r){return r.json()}).then(function(res){
        var managedClubs=res.managedClubs||currentUser.clubs||[];
        if(!res.success||!res.data||!res.data.length){
            if(currentUser.role==='teacher'){
                var myBox=document.getElementById('recruitListMy');
                var otherBox=document.getElementById('recruitListOther');
                if(myBox){document.getElementById('recCountMy').textContent='0';myBox.innerHTML='<div class="empty">暂无招募</div>'}
                if(otherBox){document.getElementById('recCountOther').textContent='0';otherBox.innerHTML='<div class="empty">暂无活动记录</div>'}
            }else{
                var box=document.getElementById('recruitList');
                if(box){document.getElementById('recCount').textContent='0';box.innerHTML='<div class="empty">暂无招募</div>'}
            }
            return;
        }
        var list=res.data;
        if(currentUser.role==='teacher'){
            var myList=[];
            var otherList=[];
            list.forEach(function(rec){
                if(managedClubs.indexOf(rec.clubName)>=0){myList.push(rec)}else{otherList.push(rec)}
            });
            document.getElementById('recCountMy').textContent=myList.length;
            document.getElementById('recCountOther').textContent=otherList.length;
            var myBox=document.getElementById('recruitListMy');
            var otherBox=document.getElementById('recruitListOther');
            if(myBox){
                if(!myList.length){myBox.innerHTML='<div class="empty">暂无本社团招募</div>'}
                else{myBox.innerHTML=myList.map(function(rec){return renderRecruitCard(rec,true,managedClubs)}).join('')}
            }
            if(otherBox){
                if(!otherList.length){otherBox.innerHTML='<div class="empty">暂无其他社团活动记录</div>'}
                else{otherBox.innerHTML=otherList.map(function(rec){return renderRecruitCard(rec,false,managedClubs)}).join('')}
            }
        }else{
            var box=document.getElementById('recruitList');if(!box)return;
            document.getElementById('recCount').textContent=list.length;
            var h='';
            list.forEach(function(rec){h+=renderRecruitCard(rec,currentUser.role==='admin'||currentUser.role==='user',managedClubs)});
            box.innerHTML=h;
        }
    });
}

function renderRecruitCard(rec,canViewSignups,managedClubs){
    var typeTag=rec.recruitType==='volunteer'?'🤝 志愿者':'👥 活动成员';
    var statusTag='';
    if(rec.status==='pending')statusTag='<span style="background:rgba(253,203,110,0.12);color:#f39c12;padding:2px 8px;border-radius:6px;font-size:0.68em;font-weight:600">待审批</span>';
    else if(rec.status==='approved')statusTag='<span style="background:rgba(0,184,148,0.1);color:#00b894;padding:2px 8px;border-radius:6px;font-size:0.68em;font-weight:600">已通过</span>';
    else if(rec.status==='rejected')statusTag='<span style="background:rgba(232,67,147,0.08);color:#e84393;padding:2px 8px;border-radius:6px;font-size:0.68em;font-weight:600">已拒绝</span>';
    var isFull=rec.maxCount>0&&rec.currentCount>=rec.maxCount;
    var canManage=currentUser.role==='admin'||(currentUser.role==='teacher'&&managedClubs.indexOf(rec.clubName)>=0)||(currentUser.role==='user'&&currentUser.clubName===rec.clubName);
    var canApprove=currentUser.role==='admin'||(currentUser.role==='teacher'&&managedClubs.indexOf(rec.clubName)>=0);

var scCropState={img:null,naturalW:0,naturalH:0,canvasW:0,canvasH:0,scale:1,cropX:0,cropY:0,cropW:0,cropH:0,dragging:false,dragType:'',dragStartX:0,dragStartY:0,startCropX:0,startCropY:0,startCropW:0,startCropH:0};
var scCroppedBlob=null;

function onScImageSelected(input){
    scCroppedBlob=null;
    if(!input.files||!input.files[0]){var ca=document.getElementById('scCropArea');if(ca)ca.style.display='none';return}
    var file=input.files[0];
    if(!file.type.startsWith('image/')){var ca2=document.getElementById('scCropArea');if(ca2)ca2.style.display='none';return}
    var reader=new FileReader();
    reader.onload=function(e){
        var img=new Image();
        img.onload=function(){
            scCropState.img=img;
            scCropState.naturalW=img.naturalWidth;
            scCropState.naturalH=img.naturalHeight;
            var maxW=600;
            var scale=Math.min(maxW/img.naturalWidth,1);
            scCropState.scale=scale;
            scCropState.canvasW=Math.round(img.naturalWidth*scale);
            scCropState.canvasH=Math.round(img.naturalHeight*scale);
            var canvas=document.getElementById('scCropCanvas');
            if(!canvas)return;
            canvas.width=scCropState.canvasW;
            canvas.height=scCropState.canvasH;
            var ctx=canvas.getContext('2d');
            ctx.drawImage(img,0,0,scCropState.canvasW,scCropState.canvasH);
            scCropState.cropX=0;scCropState.cropY=0;
            scCropState.cropW=scCropState.canvasW;scCropState.cropH=scCropState.canvasH;
            scCropUpdateOverlay();
            document.getElementById('scCropArea').style.display='block';
            var ci=document.getElementById('scCurrentImage');if(ci)ci.style.display='none';
        };
        img.src=e.target.result;
    };
    reader.readAsDataURL(file);
}

function scCropUpdateOverlay(){
    var overlay=document.getElementById('scCropOverlay');if(!overlay)return;
    overlay.style.left=scCropState.cropX+'px';
    overlay.style.top=scCropState.cropY+'px';
    overlay.style.width=scCropState.cropW+'px';
    overlay.style.height=scCropState.cropH+'px';
    var realW=Math.round(scCropState.cropW/scCropState.scale);
    var realH=Math.round(scCropState.cropH/scCropState.scale);
    var sz=document.getElementById('scCropSize');if(sz)sz.textContent=realW+' x '+realH+' px';
}

function scCropReset(){
    if(!scCropState.img)return;
    scCropState.cropX=0;scCropState.cropY=0;
    scCropState.cropW=scCropState.canvasW;scCropState.cropH=scCropState.canvasH;
    scCropUpdateOverlay();
}

function scCropFit16x9(){scCropFitRatio(16/9)}
function scCropFit4x3(){scCropFitRatio(4/3)}

function scCropFitRatio(ratio){
    if(!scCropState.img)return;
    var cw=scCropState.canvasW,ch=scCropState.canvasH;
    var fitW,fitH;
    if(cw/ch>ratio){fitH=ch;fitW=Math.round(ch*ratio)}
    else{fitW=cw;fitH=Math.round(cw/ratio)}
    scCropState.cropW=fitW;scCropState.cropH=fitH;
    scCropState.cropX=Math.round((cw-fitW)/2);
    scCropState.cropY=Math.round((ch-fitH)/2);
    scCropUpdateOverlay();
}

function scCropGetCroppedBlob(callback){
    if(!scCropState.img){callback(null);return}
    var s=scCropState.scale;
    var sx=Math.round(scCropState.cropX/s);
    var sy=Math.round(scCropState.cropY/s);
    var sw=Math.round(scCropState.cropW/s);
    var sh=Math.round(scCropState.cropH/s);
    sx=Math.max(0,sx);sy=Math.max(0,sy);
    sw=Math.min(sw,scCropState.naturalW-sx);
    sh=Math.min(sh,scCropState.naturalH-sy);
    var tc=document.createElement('canvas');
    tc.width=sw;tc.height=sh;
    var tctx=tc.getContext('2d');
    tctx.drawImage(scCropState.img,sx,sy,sw,sh,0,0,sw,sh);
    tc.toBlob(function(blob){callback(blob)},'image/jpeg',0.92);
}

function initScCropDrag(){
    var canvas=document.getElementById('scCropCanvas');
    if(!canvas)return;
    var dragging=false;
    var dragType='';
    var startX=0,startY=0;
    var startCX=0,startCY=0,startCW=0,startCH=0;
    var HANDLE=10;
    function getPos(e){
        var rect=canvas.getBoundingClientRect();
        var x=(e.clientX||e.touches[0].clientX)-rect.left;
        var y=(e.clientY||e.touches[0].clientY)-rect.top;
        return {x:x,y:y};
    }
    function getZone(x,y){
        var s=scCropState;var cx=s.cropX,cy=s.cropY,cw=s.cropW,ch=s.cropH;
        if(x>=cx-cw*0.1&&x<=cx+cw*0.1&&y>=cy-HANDLE&&y<=cy+HANDLE)return 'tl';
        if(x>=cx+cw*0.4&&x<=cx+cw*0.6&&y>=cy-HANDLE&&y<=cy+HANDLE)return 't';
        if(x>=cx+cw*0.9-cw*0.1&&x<=cx+cw*0.9+cw*0.1&&y>=cy-HANDLE&&y<=cy+HANDLE)return 'tr';
        if(x>=cx+cw-HANDLE&&x<=cx+cw+HANDLE&&y>=cy+ch*0.4&&y<=cy+ch*0.6)return 'r';
        if(x>=cx+cw-HANDLE&&x<=cx+cw+HANDLE&&y>=cy+ch*0.9-HANDLE&&y<=cy+ch*0.9+HANDLE)return 'br';
        if(x>=cx+cw*0.4&&x<=cx+cw*0.6&&y>=cy+ch-HANDLE&&y<=cy+ch+HANDLE)return 'b';
        if(x>=cx-HANDLE&&x<=cx+HANDLE&&y>=cy+ch*0.9-HANDLE&&y<=cy+ch*0.9+HANDLE)return 'bl';
        if(x>=cx-HANDLE&&x<=cx+HANDLE&&y>=cy+ch*0.4&&y<=cy+ch*0.6)return 'l';
        if(x>=cx&&x<=cx+cw&&y>=cy&&y<=cy+ch)return 'move';
        return '';
    }
    function onDown(e){
        e.preventDefault();var p=getPos(e);var zone=getZone(p.x,p.y);
        if(!zone)return;dragging=true;dragType=zone;
        startX=p.x;startY=p.y;startCX=scCropState.cropX;startCY=scCropState.cropY;
        startCW=scCropState.cropW;startCH=scCropState.cropH;
    }
    function onMove(e){
        if(!dragging)return;e.preventDefault();var p=getPos(e);
        var dx=p.x-startX,dy=p.y-startY;var s=scCropState;var minSize=30;
        if(dragType==='move'){
            s.cropX=Math.max(0,Math.min(s.canvasW-s.cropW,startCX+dx));
            s.cropY=Math.max(0,Math.min(s.canvasH-s.cropH,startCY+dy));
        }else{
            var nx=startCX,ny=startCY,nw=startCW,nh=startCH;
            if(dragType.indexOf('l')>=0){nx=startCX+dx;nw=startCW-dx;if(nw<minSize){nw=minSize;nx=startCX+startCW-minSize}}
            if(dragType.indexOf('r')>=0){nw=startCW+dx;if(nw<minSize)nw=minSize}
            if(dragType.indexOf('t')>=0){ny=startCY+dy;nh=startCH-dy;if(nh<minSize){nh=minSize;ny=startCY+startCH-minSize}}
            if(dragType.indexOf('b')>=0){nh=startCH+dy;if(nh<minSize)nh=minSize}
            nx=Math.max(0,nx);ny=Math.max(0,ny);
            if(nx+nw>s.canvasW)nw=s.canvasW-nx;
            if(ny+nh>s.canvasH)nh=s.canvasH-ny;
            s.cropX=nx;s.cropY=ny;s.cropW=nw;s.cropH=nh;
        }
        scCropUpdateOverlay();
    }
    function onUp(){dragging=false;dragType=''}
    canvas.addEventListener('mousedown',onDown);
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    canvas.addEventListener('touchstart',onDown,{passive:false});
    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('touchend',onUp);
}

function extractGrade(m){
    var cn=m.className||'';
    var p=m.profile||{};
    if(!cn&&p.className)cn=p.className;
    var grade='';
    if(cn){
        var m2=cn.match(/^(\d{2,4})/);
        if(m2){grade=m2[1];if(grade.length===4)grade=grade.slice(2);grade+='级'}
    }
    if(!grade&&p.grade){
        grade=String(p.grade).replace('级','');
        if(grade.length===4)grade=grade.slice(2);
        grade+='级';
    }
    return grade;
}

var _allActivities=[];
var _actPage=1;
var _actTotal=0;
var _actHasMore=true;
var _actLoading=false;
var _excellentIds=[];
function loadAdminActivityList(){
    var search=(document.getElementById('alSearch')||{}).value||'';
    var alStart=(document.getElementById('alStartDate')||{}).value||'';
    var alEnd=(document.getElementById('alEndDate')||{}).value||'';
    var dateParams='';
    if(alStart)dateParams+='&start_date='+encodeURIComponent(alStart);
    if(alEnd)dateParams+='&end_date='+encodeURIComponent(alEnd);
    if(!_allActivities.length||_actPage===1){
        _actLoading=true;
        fetch(api+'/api/excellent-activities').then(function(r){return r.json()}).then(function(eaRes){
            _excellentIds=[];
            if(eaRes.success&&eaRes.data){
                _excellentIds=eaRes.data.map(function(d){return d.groupId});
            }
            fetch(api+'/api/all-completed-activities?page='+_actPage+'&per_page=30'+dateParams).then(function(r){return r.json()}).then(function(res){
            _actLoading=false;
            if(!res.success){document.getElementById('alList').innerHTML='<div class="empty">'+esc(res.error||'加载失败')+'</div>';return}
            if(_actPage===1){_allActivities=res.data||[]}
            else{_allActivities=_allActivities.concat(res.data||[])}
            _actTotal=res.total||0;
            _actHasMore=_allActivities.length<_actTotal;
            renderActivityList(search);
        }).catch(function(){_actLoading=false;document.getElementById('alList').innerHTML='<div class="empty">加载失败</div>'});
        });
    }else{
        renderActivityList(search);
    }
}
function loadMoreActivities(){
    if(_actLoading||!_actHasMore)return;
    _actPage++;
    _actLoading=true;
    var alStart=(document.getElementById('alStartDate')||{}).value||'';
    var alEnd=(document.getElementById('alEndDate')||{}).value||'';
    var dateParams='';
    if(alStart)dateParams+='&start_date='+encodeURIComponent(alStart);
    if(alEnd)dateParams+='&end_date='+encodeURIComponent(alEnd);
    fetch(api+'/api/all-completed-activities?page='+_actPage+'&per_page=30'+dateParams).then(function(r){return r.json()}).then(function(res){
        _actLoading=false;
        if(!res.success){_actPage--;return}
        _allActivities=_allActivities.concat(res.data||[]);
        _actTotal=res.total||0;
        _actHasMore=_allActivities.length<_actTotal;
        renderActivityList((document.getElementById('alSearch')||{}).value||'');
    }).catch(function(){_actLoading=false;_actPage--});
}

function renderActivityList(search){
    var data=_allActivities;
    if(search){
        var q=search.toLowerCase();
        data=data.filter(function(a){return (a.clubName||'').toLowerCase().indexOf(q)>=0||(a.activityName||'').toLowerCase().indexOf(q)>=0});
    }
    var clubs={};
    var totalCheckins=0;
    data.forEach(function(a){clubs[a.clubName]=1;totalCheckins+=(a.checkinCount||0)});
    document.getElementById('alTotal').textContent=data.length;
    document.getElementById('alClubs').textContent=Object.keys(clubs).length;
    document.getElementById('alCheckins').textContent=totalCheckins;
    document.getElementById('alCount').textContent=data.length;
    var c=document.getElementById('alList');
    if(!data.length){c.innerHTML='<div class="empty">暂无已完成的活动</div>';return}
    var h='';
    data.forEach(function(a,idx){
        var isWarned=a.warning==='warned';
        var gid='session_'+a.id;
        var isExcellent=_excellentIds.indexOf(gid)>=0;

function toggleActDetail(id){
    var el=document.getElementById('act-'+id);
    var arrow=document.getElementById('act-arrow-'+id);
    if(!el)return;
    if(el.style.display==='none'){el.style.display='block';if(arrow)arrow.style.transform='rotate(0deg)'}
    else{el.style.display='none';if(arrow)arrow.style.transform='rotate(-90deg)'}
}

function toggleExcellentActivity(gid){
    fetch(api+'/api/excellent-activities/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({group_id:gid})})
    .then(function(r){return r.json()}).then(function(res){
        if(res.success){toast(res.message,'success');_allActivities=[];loadAdminActivityList()}

function showWarnModal(sid){
    var modal=document.createElement('div');
    modal.id='activityWarnModal';
    modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)';
    modal.innerHTML='<div style="background:#fff;border-radius:14px;padding:24px;width:380px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,0.12)">'+
